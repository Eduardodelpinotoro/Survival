<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CRÓNICAS DE UN CASO CERRADO · novela completa (18 capítulos + epílogo)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Georgia', 'Times New Roman', serif;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #1a1e24;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px;
        }
        .gamebook {
            max-width: 700px;
            width: 100%;
            background: #2c3e4f;
            border-radius: 40px 40px 28px 28px;
            box-shadow: 0 25px 45px #000000dd;
            border: 2px solid #4a6a8a;
            overflow: hidden;
        }
        .top-bar {
            background: #1e3142;
            padding: 10px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #3f5770;
        }
        .time-section {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .time-bg {
            width: 140px;
            height: 18px;
            background: #1f364a;
            border-radius: 30px;
            border: 1px solid #4a6a8a;
            box-shadow: inset 0 2px 4px #0b1a27;
        }
        .time-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #3e6b9e, #5f9ea0);
            border-radius: 30px;
            transition: width 0.2s;
        }
        .time-number {
            color: #f2e0c0;
            font-weight: 800;
            font-size: 1.4rem;
            min-width: 60px;
            text-shadow: 0 2px 3px black;
        }
        .inventory-button {
            background: #253d53;
            border: 2px solid #6083a8;
            border-radius: 40px;
            padding: 6px 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            box-shadow: 0 4px 0 #102433;
            transition: 0.08s linear;
            touch-action: manipulation;
        }
        .inventory-button:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #102433;
        }
        .inv-icon {
            font-size: 1.8rem;
            color: #ffd78c;
        }
        .inv-text {
            color: white;
            font-weight: 600;
            font-size: 1rem;
        }
        .inventory-panel {
            background: #1d3143;
            border-bottom: 3px solid #4f6f90;
            padding: 16px 20px;
            display: none;
            flex-wrap: wrap;
            gap: 16px 24px;
            align-items: center;
            box-shadow: inset 0 1px 6px #00000055;
        }
        .inventory-panel.visible {
            display: flex;
        }
        .inventory-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            background: #2b4058;
            padding: 10px 15px;
            border-radius: 30px;
            border: 1px solid #769dc9;
            min-width: 90px;
        }
        .item-emoji {
            font-size: 2.5rem;
            filter: drop-shadow(2px 4px 4px black);
        }
        .item-label {
            color: #f0f4fa;
            font-size: 0.9rem;
            font-weight: 600;
            background: #1c3142;
            padding: 4px 12px;
            border-radius: 30px;
            white-space: nowrap;
        }
        .chapter-tag {
            background: #1f3345;
            color: #d7e7ff;
            padding: 12px 22px;
            font-size: 1rem;
            font-weight: 600;
            border-bottom: 2px solid #3b5773;
        }
        .novel-area {
            background: #14222f;
            padding: 32px 28px 40px;
            color: #ecf5ff;
            font-size: 1.18rem;
            line-height: 1.7;
            border-bottom: 2px solid #1f3345;
            max-height: 500px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #527a9e #1c2e3f;
        }
        .novel-area::-webkit-scrollbar {
            width: 8px;
        }
        .novel-area::-webkit-scrollbar-track {
            background: #1c2e3f;
        }
        .novel-area::-webkit-scrollbar-thumb {
            background: #527a9e;
            border-radius: 10px;
        }
        .options-area {
            background: #11212e;
            padding: 24px 22px 28px;
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
            border-top: 2px solid #2a4055;
        }
        .choice-btn {
            background: #263f56;
            border: none;
            border-bottom: 5px solid #102433;
            color: #f5fbff;
            font-size: 1.05rem;
            font-weight: 500;
            padding: 14px 20px;
            border-radius: 50px;
            box-shadow: 0 6px 0 #0d1f2e;
            transition: 0.06s linear;
            cursor: pointer;
            touch-action: manipulation;
            flex: 1 1 180px;
            min-width: 150px;
            text-align: center;
            line-height: 1.3;
        }
        .choice-btn:active {
            transform: translateY(5px);
            border-bottom-width: 2px;
            background: #1d3348;
        }
        .footer {
            background: #1c2b39;
            padding: 14px 20px 16px;
            text-align: center;
            border-top: 2px solid #38536d;
        }
        .restart-btn {
            background: #324252;
            border: 1px solid #7089a8;
            color: #ffefd3;
            padding: 12px 28px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: bold;
            border-bottom: 5px solid #1c2938;
            cursor: pointer;
            display: inline-block;
            min-width: 220px;
        }
        .restart-btn:active {
            transform: translateY(5px);
            border-bottom-width: 2px;
        }
        .footnote {
            color: #5f7c9c;
            font-size: 0.8rem;
            margin-top: 8px;
        }
    </style>
</head>
<body>
<div class="gamebook">
    <div class="top-bar">
        <div class="time-section">
            <div class="time-bg"><div class="time-fill" id="timeFill" style="width:100%"></div></div>
            <div class="time-number" id="timeValue">168h</div>
        </div>
        <div class="inventory-button" id="inventoryToggle">
            <span class="inv-icon">📦</span>
            <span class="inv-text">pruebas</span>
        </div>
    </div>

    <div class="inventory-panel" id="inventoryPanel"></div>

    <div class="chapter-tag" id="chapterDisplay">DÍA 1 · EL PERIODISTA Y LA VERDAD</div>
    
    <div class="novel-area" id="novelText"></div>

    <div class="options-area" id="optionsContainer"></div>

    <div class="footer">
        <div class="restart-btn" id="restartButton">↻ REINICIAR INVESTIGACIÓN</div>
        <div class="footnote">18 capítulos + epílogo · Caso 0893</div>
    </div>
</div>

<script>
    (function() {
        let state = {
            health: 100,
            maxHealth: 100,
            tiempo: 168,
            step: 1,
            inventory: {
                cartaSilvia: false,
                llave089: false,
                pendrive: false,
                muestrasSangre: false,
                libretaMendoza: false,
                cartaJ: false
            },
            pistas: {
                silviaHablado: false,
                vidalContactado: false,
                enricDetenido: false
            }
        };

        const timeFill = document.getElementById('timeFill');
        const timeValue = document.getElementById('timeValue');
        const chapterDisplay = document.getElementById('chapterDisplay');
        const novelText = document.getElementById('novelText');
        const optionsContainer = document.getElementById('optionsContainer');
        const inventoryPanel = document.getElementById('inventoryPanel');
        const inventoryToggle = document.getElementById('inventoryToggle');
        const restartBtn = document.getElementById('restartButton');

        inventoryToggle.addEventListener('click', (e) => {
            e.preventDefault();
            inventoryPanel.classList.toggle('visible');
            updateInventoryPanel();
        });

        function updateUI() {
            const percent = (state.tiempo / 168) * 100;
            timeFill.style.width = percent + '%';
            timeValue.innerText = state.tiempo + 'h';
            
            if (state.health <= 0) {
                showGameOver();
            }
        }

        function applyDamage(amount) {
            state.health = Math.max(0, state.health - amount);
            if (state.health <= 0) showGameOver();
        }

        function heal(amount) {
            state.health = Math.min(state.maxHealth, state.health + amount);
        }

        function restarTiempo(horas) {
            state.tiempo = Math.max(0, state.tiempo - horas);
            if (state.tiempo <= 0) {
                showTimeOut();
            }
        }

        function addItem(item) {
            if (item === 'cartaSilvia') state.inventory.cartaSilvia = true;
            if (item === 'llave089') state.inventory.llave089 = true;
            if (item === 'pendrive') state.inventory.pendrive = true;
            if (item === 'muestrasSangre') state.inventory.muestrasSangre = true;
            if (item === 'libretaMendoza') state.inventory.libretaMendoza = true;
            if (item === 'cartaJ') state.inventory.cartaJ = true;
            if (inventoryPanel.classList.contains('visible')) updateInventoryPanel();
        }

        function updateInventoryPanel() {
            let html = '<div class="inventory-item"><span class="item-emoji">📋</span><span class="item-label">Caso 0893</span></div>';
            if (state.inventory.cartaSilvia) html += '<div class="inventory-item"><span class="item-emoji">💌</span><span class="item-label">Carta Silvia</span></div>';
            if (state.inventory.llave089) html += '<div class="inventory-item"><span class="item-emoji">🔑</span><span class="item-label">Llave 089</span></div>';
            if (state.inventory.pendrive) html += '<div class="inventory-item"><span class="item-emoji">💾</span><span class="item-label">Pendrive</span></div>';
            if (state.inventory.muestrasSangre) html += '<div class="inventory-item"><span class="item-emoji">🧪</span><span class="item-label">Muestras</span></div>';
            if (state.inventory.libretaMendoza) html += '<div class="inventory-item"><span class="item-emoji">📓</span><span class="item-label">Libreta</span></div>';
            if (state.inventory.cartaJ) html += '<div class="inventory-item"><span class="item-emoji">📄</span><span class="item-label">Carta "J"</span></div>';
            if (html === '<div class="inventory-item"><span class="item-emoji">📋</span><span class="item-label">Caso 0893</span></div>') {
                html = '<div class="inventory-item"><span class="item-emoji">📭</span><span class="item-label">vacío</span></div>';
            }
            inventoryPanel.innerHTML = html;
        }

        function showGameOver() {
            chapterDisplay.innerText = '❌ HAS MUERTO';
            novelText.innerText = 'Tu cuerpo yace en el puerto de Barcelona. El coleccionista ha añadido una pieza más a su macabra colección. El caso 0893 quedará para siempre sin resolver.';
            optionsContainer.innerHTML = '';
        }

        function showTimeOut() {
            chapterDisplay.innerText = '⏰ TIEMPO AGOTADO';
            novelText.innerText = 'Siete días. Has tenido siete días y no has conseguido las pruebas suficientes. El archivo del caso 0893 ha sido destruido. El asesino de Mateo Vidal nunca será encontrado.';
            optionsContainer.innerHTML = '';
        }

        const chapters = {
            1: {
                title: 'DÍA 1 · EL PERIODISTA Y LA VERDAD',
                text: 'Barcelona, 14 de marzo de 2025. 8:47 AM. Calle de la Diputación, 243.\n\nEl olor a café quemado y a pisos viejos te recibe en el rellano. El 2º 2ª, el de Mateo Vidal, tiene el precinto de la policía roto. La puerta está entornada.\n\nEmpujas la madera. El piso es pequeño, abarrotado de libros y periódicos viejos. Mateo vivía para su trabajo. En la mesa del comedor, un portátil con la pantalla rota. En el suelo, junto al sofá, el cuerpo estuvo ahí hasta hace dos días.\n\nEl informe oficial dice: suicidio por sobredosis. Pero tú conoces a los suicidas. Los suicidas no tienen las uñas rotas de arañar el suelo. Los suicidas no tienen un golpe en la nuca.\n\nTu móvil vibra. Es un mensaje anónimo: "Mira en la papelera del baño."\n\nEn la papelera, entre restos de pasta de dientes y algodones sucios, encuentras una carta arrugada. Es de su exmujer, Silvia. "Mateo, deja de investigar. Por los viejos tiempos, déjalo. Van a por ti." Fechada hace tres días.\n\nGuardas la carta en el bolsillo. Alguien quería que la encontrases. La pregunta es: ¿quién?\n\nEn la calle, un hombre te observa desde un coche negro. Al verte, arranca y se pierde en el tráfico.\n\nTienes 7 días. El reloj empieza a correr.',
                options: [
                    { text: '🚗 Seguir al coche negro', tiempo: 2, next: 2 },
                    { text: '📞 Llamar a Silvia', tiempo: 1, next: 3 },
                    { text: '🔍 Registrar el piso a fondo', tiempo: 3, next: 4 }
                ],
                onEnter: () => { addItem('cartaSilvia'); }
            },
            2: {
                title: 'DÍA 1 · LA SOMBRA QUE HUYE',
                text: 'Barcelona, 14 de marzo. 9:15 AM. Calles del Eixample.\n\nSales corriendo escaleras abajo. El coche negro ya dobla la esquina de la Gran Vía. No tienes matrícula, no tienes nada. Solo la certeza de que alguien te vigilaba.\n\nCorres hasta la bocacalle, pero el tráfico se lo ha tragado. Has perdido al testigo.\n\n—¿Agente Cross?\n\nLa voz viene de atrás. Una mujer joven, treinta y pocos, morena, con una cámara colgada al cuello y una mochila de periodista.\n\n—María Torres —dice, tendiéndote la mano—. Nos conocemos de Providence. Bueno, yo sé quién es usted. Investigué lo de Tethys. Usted era el agente que entró solo.\n\nLa reconoces. Era la periodista que te ayudó en El Acuario. La que estuvo contigo en los sótanos.\n\n—¿Qué haces aquí, María?\n\n—Mi trabajo. Mateo Vidal era amigo. Colega. Periodistas los dos. Llevaba meses investigando algo grande. Algo en el puerto. Me mandó un mensaje hace una semana: "Si me pasa algo, mira en el depósito de la Estación de Francia."\n\n—¿Fuiste?\n\n—Esta mañana. Antes de venir aquí. Encontré esto.\n\nTe tiende una llave. Pequeña, metálica, con un número grabado: 089.\n\n—¿Qué abre?\n\n—No lo sé. Pero en el depósito había taquillas. Cientos. Esta es de una de ellas.\n\nMirás la llave. Luego mirás el edificio de Mateo. Luego a María.\n\n—Trabajamos juntos —dices.\n\n—Pensé que dirías eso.',
                options: [
                    { text: '🔑 Ir a la Estación de Francia', tiempo: 2, next: 4 },
                    { text: '📞 Llamar a Silvia desde aquí', tiempo: 1, next: 3 },
                    { text: '🕵️ Volver al piso a buscar más', tiempo: 2, next: 4 }
                ],
                onEnter: () => { addItem('llave089'); }
            },
            3: {
                title: 'DÍA 1 · LA VOZ DE LA EXMUJER',
                text: 'Barcelona, 14 de marzo. 10:30 AM. Café junto al piso de Mateo.\n\nSilvia aceptó verte en media hora. Llega puntual: cuarenta años, morena, bien vestida, pero con ojeras profundas. Ha estado llorando. O no ha dormido. O ambas.\n\n—Usted es del FBI —dice, sentándose—. ¿Qué hace el FBI en Barcelona?\n\n—Investigación internacional. Mateo tenía contactos en Estados Unidos. ¿Lo sabía?\n\nSilvia niega con la cabeza.\n\n—Mateo y yo nos divorciamos hace cinco años. No hablábamos. Solo... solo me escribió hace unas semanas. Me dijo que si le pasaba algo, que hablara con alguien del periódico. Con Vicente.\n\n—¿Vicente?\n\n—Vicente Márquez. El editor. Su jefe. También... también fue su amante. Durante un tiempo. Cuando estábamos casados.\n\nMaría, que te acompaña, levanta una ceja.\n\n—¿Sabía lo de la relación?\n\n—Lo supe después. Cuando nos separamos. Mateo era... complicado. Necesitaba secretos. Necesitaba mentiras. Yo no podía vivir así.\n\n—La carta que le escribió —dices—. "Deja de investigar. Van a por ti." ¿Qué investigaba?\n\nSilvia duda. Mira su café, luego la calle, luego sus manos.\n\n—No lo sé. Solo sé que le tenía miedo a alguien. Los últimos meses, cuando hablábamos por teléfono, notaba que miraba hacia atrás. Como si esperara que alguien lo siguiera.\n\n—¿A quién temía?\n\n—No dijo nombres. Pero una vez mencionó... mencionó un lugar. "El Depósito". Dijo: "Si desaparezco, busca en El Depósito."',
                options: [
                    { text: '🚉 Ir a la Estación de Francia', tiempo: 2, next: 4 },
                    { text: '📰 Hablar con Vicente Márquez', tiempo: 2, next: 5 },
                    { text: '🔍 Preguntar más a Silvia', tiempo: 1, next: 3 }
                ],
                onEnter: () => { state.pistas.silviaHablado = true; }
            },
            4: {
                title: 'DÍA 1 · EL DEPÓSITO',
                text: 'Barcelona, 14 de marzo. 12:15 PM. Estación de Francia.\n\nLa Estación de Francia es una de esas estaciones antiguas que ya no son lo que fueron. Techos altos, hierro forjado, butacas de madera. Y al fondo, junto a las taquillas de consigna, un pasillo con cientos de taquillas metálicas.\n\nLa 089 está al final, casi escondida. Introduces la llave. Gira.\n\nDentro hay una carpeta. Gruesa. Llena de papeles. Y un pendrive.\n\nMaría abre la carpeta mientras tú examinas el pendrive.\n\n—Dios mío —susurra ella.\n\n—¿Qué?\n\n—Mateo estaba investigando a Prometeo. La constructora. ¿La conoces?\n\nNo. No la conoces.\n\n—Es la empresa que está construyendo medio Barcelona. Puerto, aeropuerto, rondas. Contratos públicos por cientos de millones. Y mira esto.\n\nTe enseña un documento. Un listado de transferencias bancarias. De Prometeo a cuentas en paraísos fiscales. Y al lado, nombres. Políticos. Altos cargos.\n\n—Esto es soborno —dices.\n\n—Esto es mucho más —responde María, pasando páginas—. Mira la última hoja.\n\nLa última hoja es un informe médico. Análisis de sangre. Nombre del paciente: Jordi Costa. Fecha: hace tres meses. Diagnóstico: intoxicación por compuesto no identificado. Sospecha de envenenamiento.\n\n—Jordi Costa —dice María—. Era el arquitecto jefe de Prometeo. Murió hace dos meses. Accidente de coche, dijeron.\n\nMirás el informe. Las palabras te golpean: "Las marcas en el cuello presentan pequeñas lesiones circulares compatibles con mordeduras de origen desconocido."\n\nMordeduras. Como los cadáveres de Boston. Como los de Providence.\n\n—María —dices—. Esto no es solo corrupción. Esto es otra cosa.',
                options: [
                    { text: '💾 Analizar el pendrive', tiempo: 2, next: 5 },
                    { text: '🚗 Ir a la sede de Prometeo', tiempo: 2, next: 6 },
                    { text: '📞 Contactar familia de Jordi Costa', tiempo: 1, next: 5 }
                ],
                onEnter: () => { addItem('pendrive'); }
            },
            5: {
                title: 'DÍA 1 · LA VIUDA DEL ARQUITECTO',
                text: 'Barcelona, 14 de marzo. 4:30 PM. Barrio de Sarrià.\n\nMercè Costa vive sola en un piso amplio, demasiado grande para una persona. Tiene sesenta años, el pelo cano, y una expresión de duelo reciente mal disimulado.\n\n—Mi hijo murió en accidente —dice, nada más sentarnos—. Eso dice la policía. Eso dice todo el mundo.\n\n—¿Usted no lo cree? —pregunta María.\n\nMercè duda. Luego se levanta, va a una habitación y vuelve con una libreta.\n\n—Jordi era meticuloso. Apuntaba todo. Sus proyectos, sus reuniones, sus sospechas. Los últimos meses, escribía mucho. Y siempre lo mismo: "Me vigilan." "Me siguen." "No sé quién, pero me vigilan."\n\nLe pasas el informe médico que encontraste en la taquilla.\n\n—¿Reconoce esto?\n\nMercè lo lee. Sus ojos se humedecen.\n\n—Sí. Me lo enseñó Jordi la semana antes de morir. Dijo que los análisis eran... extraños. Que los médicos no sabían qué tenía. Le hicieron pruebas, muchas pruebas. Y entonces, el accidente.\n\n—¿Quién más sabía de esto?\n\n—Su socio. Enric. Enric Font. Trabajaban juntos en Prometeo. Jordi confiaba en él. Demasiado, creo yo.\n\n—¿Por qué dice eso?\n\n—Porque Enric es el único que salió ganando con su muerte. Ahora es el arquitecto jefe. Y vive en un piso nuevo. Y conduce un coche nuevo. Y no para de sonreír.',
                options: [
                    { text: '👤 Interrogar a Enric Font', tiempo: 2, next: 6 },
                    { text: '🔬 Investigar accidente de Jordi', tiempo: 3, next: 7 },
                    { text: '🏢 Volver a la taquilla', tiempo: 2, next: 4 }
                ]
            },
            6: {
                title: 'DÍA 2 · EL SOCIO',
                text: 'Barcelona, 15 de marzo. 9:00 AM. Oficinas de Prometeo.\n\nEnric Font te recibe en su despacho. Cuarenta y cinco años, traje caro, sonrisa de político. Demasiado perfecto. Demasiado preparado.\n\n—Agente Cross —dice, tendiendo la mano—. ¿FBI en Barcelona? Qué honor. ¿En qué puedo ayudarle?\n\n—Jordi Costa.\n\nLa sonrisa se congela un segundo. Solo un segundo. Luego vuelve.\n\n—Pobre Jordi. Un gran profesional. Una pérdida terrible. ¿Qué quiere saber?\n\n—Trabajaban juntos. ¿Sabía que estaba investigando algo? ¿Algo relacionado con la empresa?\n\n—Jordi siempre investigaba —Enric se encoge de hombros—. Era meticuloso. Obsesivo, a veces. Pero todo dentro de lo profesional. Proyectos, materiales, normativas. Nada fuera de lo común.\n\n—¿Y los análisis de sangre? ¿Sabía que le encontraron un compuesto extraño?\n\nEnric pestañea. Solo una vez.\n\n—No. No sabía nada de eso. Los médicos dijeron que fue un accidente. ¿No?\n\n—Eso dicen.\n\n—Pues eso. Accidentes pasan. Jordi conducía rápido. Siempre conducía rápido. Le gustaba la velocidad.\n\n—¿Y los sobornos?\n\nEl silencio se alarga. Enric te mira fijamente.\n\n—No sé de qué habla.\n\nMaría saca una copia del listado de transferencias.\n\n—Esto. Cuentas en paraísos fiscales. Nombres de políticos. ¿Reconoce alguno?\n\nEnric coge el papel. Lo lee. Su cara cambia. Ya no sonríe.\n\n—Esto... esto es falso. Alguien ha manipulado esto.\n\n—¿Quién?\n\n—No lo sé. Pero no es verdad. Prometeo es una empresa limpia.\n\n—Jordi no lo creía así.\n\n—Jordi estaba enfermo —Enric se levanta, nervioso—. Los últimos meses... no era él. Decía cosas raras. Paranoias. Conspiraciones. Todo el mundo lo notaba.\n\n—¿Qué cosas?\n\n—Habla con su psiquiatra. El doctor Biel. Le recetaba medicación. Pregúntenle a él.',
                options: [
                    { text: '👨‍⚕️ Visitar al Dr. Biel', tiempo: 2, next: 7 },
                    { text: '📂 Conseguir registros médicos', tiempo: 3, next: 8 },
                    { text: '🔍 Seguir presionando a Enric', tiempo: 2, next: 6 }
                ]
            },
            7: {
                title: 'DÍA 2 · EL PSIQUIATRA',
                text: 'Barcelona, 15 de marzo. 12:30 PM. Consulta del Dr. Biel.\n\nEl doctor Biel es un hombre mayor, sesenta y cinco años, con aspecto de haber visto demasiado. Su consulta huele a madera vieja y a libros antiguos.\n\n—Jordi Costa —dice, asintiendo—. Sí, fue paciente mío. Los últimos seis meses.\n\n—¿Por qué acudió a usted?\n\n—Ansiedad. Insomnio. Paranoia, al principio leve, luego más intensa. Creía que lo seguían, que lo vigilaban. Le receté ansiolíticos. Le ayudaron, al principio.\n\n—¿Y después?\n\n—Empeoró. Dejó de venir las últimas semanas. Le llamé, pero no respondía. Luego... luego lo del accidente.\n\nMaría saca el informe médico.\n\n—Doctor, ¿vio este análisis?\n\nBiel lo examina. Frunce el ceño.\n\n—No. Esto no es mío. Esto es del hospital. ¿Mordeduras?\n\n—¿Podría estar relacionado con su estado mental?\n\n—No lo sé. Las mordeduras son físicas. La paranoia es psicológica. Pero... hay algo que no me cuadra.\n\n—¿El qué?\n\n—Jordi mencionó una vez un nombre. Una empresa. Dijo: "Lo de Tethys está pasando otra vez." Le pregunté qué significaba, pero no quiso decir más. Solo repitió: "Las piezas. Las piezas vuelven."',
                options: [
                    { text: '🔬 Conseguir muestras de sangre', tiempo: 3, next: 8 },
                    { text: '🏭 Investigar conexión Tethys', tiempo: 3, next: 9 },
                    { text: '📝 Leer notas del psiquiatra', tiempo: 1, next: 7 }
                ]
            },
            8: {
                title: 'DÍA 2 · EL ARCHIVO SECRETO',
                text: 'Barcelona, 16 de marzo. 10:00 AM. Hospital Clínic.\n\nCon la autorización de Mercè Costa, consigues acceso a las muestras de sangre de Jordi. El laboratorio del hospital es moderno, lleno de máquinas que pitan y gente con batas blancas.\n\nLa doctora Anna Rius es la jefa de toxicología. Tiene treinta y ocho años, aspecto serio y mirada inteligente.\n\n—He analizado las muestras otra vez —dice—. Cuando vi el caso, algo me llamó la atención.\n\n—¿Qué?\n\n—El compuesto. No lo reconocí. Lo envié a un colega en Estados Unidos. Al FBI. A un tal agente Cross.\n\nTú la miras fijamente.\n\n—Soy Cross.\n\nElla se sorprende.\n\n—¿Usted? ¿El mismo?\n\n—El mismo.\n\n—Pues entonces ya sabe lo que es. Me respondió hace dos meses. Dijo que era un prión modificado. Algo llamado... Tethys. Me pidió más información, pero cuando volví a escribirle, el caso estaba cerrado. Suicidio, dijeron. No necesitaban más análisis.\n\n—¿Y usted qué cree?\n\nAnna Rius duda. Luego baja la voz.\n\n—Creo que alguien quiere que esto se olvide. Que Jordi no murió en accidente. Que lo mataron. Y que el compuesto que le inyectaron... viene de algún laboratorio. De algún experimento.\n\n—¿Tiene las muestras?\n\n—Sí. Las guardé. En secreto. Por si alguien preguntaba.\n\n—Alguien pregunta ahora.',
                options: [
                    { text: '💉 Enviar muestras a Sarah Chen', tiempo: 1, next: 9 },
                    { text: '🏛️ Denunciar a Prometeo', tiempo: 3, next: 10 },
                    { text: '🕵️ Seguir investigando', tiempo: 2, next: 9 }
                ],
                onEnter: () => { addItem('muestrasSangre'); }
            },
            9: {
                title: 'DÍA 3 · EL HOMBRE DEL COCHE NEGRO',
                text: 'Barcelona, 16 de marzo. 9:00 PM. Hotel de Cross.\n\nEsa noche, mientras cenas en un bar cerca del hotel, alguien se sienta a tu lado. Un hombre. Cincuenta años, traje oscuro, expresión seria.\n\n—Agente Cross —dice—. Necesito hablar con usted.\n\n—¿Quién es usted?\n\n—Me llamo Ignacio Vidal. Soy policía. Mossos d\'Esquadra. Y fui yo quien le envió el mensaje anónimo. El de la papelera.\n\nTú te quedas helado.\n\n—¿Usted?\n\n—Sí. Yo investigué la muerte de Mateo. Y me obligaron a cerrar el caso. Amenazas, presiones, de arriba. Pero no podía dejarlo. Mateo era... era mi amigo.\n\nIgnacio Vidal parece sincero. Tiene las manos callosas de quien ha trabajado en la calle, y los ojos cansados de quien ha visto demasiado.\n\n—¿Qué sabe? —preguntas.\n\n—Sé que Prometeo está podrido. Que los sobornos llegan hasta el ayuntamiento. Que el accidente de Jordi Costa no fue accidente. Y que Mateo lo descubrió.\n\n—¿Tiene pruebas?\n\n—Algunas. Pero necesito ayuda. El FBI puede protegerlas. Yo, solo, no puedo.\n\n—¿Qué quiere que haga?\n\nVidal saca un sobre y lo desliza hacia ti.\n\n—Ahí dentro hay direcciones. Testigos que Mateo entrevistó antes de morir. Gente que trabajó en Prometeo y que desapareció después. Y un nombre: Rubén. El hombre del coche negro. El que lo seguía todo.\n\n—¿Dónde encuentro a Rubén?\n\n—En el puerto. Trabaja en la terminal de contenedores. Turno de noche. Pero tenga cuidado. No está solo.',
                options: [
                    { text: '🚢 Ir al puerto a buscar a Rubén', tiempo: 4, next: 10 },
                    { text: '📖 Leer el sobre con calma', tiempo: 1, next: 9 },
                    { text: '🤝 Confiar en Vidal', tiempo: 2, next: 10 }
                ],
                onEnter: () => { state.pistas.vidalContactado = true; }
            },
            10: {
                title: 'DÍA 4 · EL PUERTO DE NOCHE',
                text: 'Barcelona, 17 de marzo. 2:00 AM. Terminal de contenedores.\n\nEl puerto de noche es un laberinto de luces amarillas y sombras alargadas. Contenedores apilados como bloques de juguete, grúas gigantes que parecen dormidas, y el rumor constante del mar.\n\nRubén trabaja en la zona 7. Lo sabes por los papeles de Vidal. Llevas una hora esperando, escondido tras unos contenedores, cuando lo ves salir de una caseta.\n\nCincuenta años, barba descuidada, ropa de trabajo sucia. Camina rápido, mirando atrás. Como si alguien lo siguiera.\n\nTe acercas.\n\n—¿Rubén?\n\nSe gira, asustado. Te mira, ve tu placa, y su expresión cambia.\n\n—¿Policía?\n\n—FBI. Necesito hablar con usted.\n\n—No tengo nada que decir.\n\n—Mateo Vidal. El periodista. Sé que habló con él.\n\nRubén duda. Mira hacia la caseta, hacia las sombras, hacia ningún sitio.\n\n—Sí. Hablé con él. Y me arrepiento. Desde entonces no duermo tranquilo.\n\n—¿Qué le dijo?\n\n—Le dije lo que vi. Una noche, hará seis meses. Estaba descargando un contenedor. Un contenedor especial, con medidas de seguridad. Frío, muy frío. Del barco que venía de Estados Unidos.\n\n—¿Qué había dentro?\n\nRubén traga saliva.\n\n—Cuerpos. No, no cuerpos. Personas. Pero no... no eran personas normales. Estaban... conectadas. Como si las hubieran cosido juntas. Y se movían. Se movían dentro del contenedor.\n\nTú sientes que la sangre se te hiela.\n\n—¿Está seguro?\n\n—Las vi. A través de un respiradero. Eran... eran muchas. Todas juntas. Una masa. Y respiraban. Hacían ruidos. Gemidos.\n\n—¿Y qué pasó?\n\n—Vinieron hombres. Trajeados. Se llevaron el contenedor. No pregunté. No quise preguntar. Pero Mateo sí preguntó. Y ahora Mateo está muerto.\n\nDe repente, un ruido. Pasos. Varias personas acercándose.\n\nRubén palidece.\n\n—Nos han encontrado —susurra—. Váyase. Váyase ya.',
                options: [
                    { text: '🔫 Enfrentarse a los hombres', tiempo: 2, next: 11 },
                    { text: '🏃 Huir con Rubén', tiempo: 1, next: 11 },
                    { text: '🕵️ Esconderse y observar', tiempo: 1, next: 11 }
                ]
            },
            11: {
                title: 'DÍA 4 · LA EMBOSCADA',
                text: 'Puerto de Barcelona. 2:30 AM.\n\nNo tienes tiempo de decidir. Los hombres aparecen de entre los contenedores. Tres, vestidos de negro, con pistolas. Rubén intenta correr, pero uno le dispara. Cae al suelo.\n\nTú sacas tu arma y te cubres tras un contenedor. Los disparos suenan, secos, en la noche del puerto. Respondes dos veces. Un hombre cae.\n\nLos otros dos siguen disparando. Las balas rebotan en el metal. Te mueves, cambias de posición, buscas un ángulo mejor.\n\nEntonces oyes una sirena. Lejana, pero acercándose. Los hombres dudan. Se miran. Y huyen, corriendo entre los contenedores.\n\nCuando te acercas a Rubén, ya es tarde. Le han dado en el pecho. Respira con dificultad, la sangre brotando entre sus dedos.\n\n—Lo siento —susurras.\n\n—No... no lo sienta. Yo ya... ya estaba muerto desde que vi... aquello.\n\n—¿Qué más sabe? ¿Adónde llevaron el contenedor?\n\nRubén intenta hablar, pero la tos le interrumpe. Escupe sangre.\n\n—Polígon... Polígono Zona Franca. Nave 17. Allí... allí hacen...\n\n—¿Qué hacen?\n\nPero Rubén ya no responde. Sus ojos se quedan abiertos, mirando las estrellas que apenas se ven sobre el puerto.\n\nLlega la policía portuaria. Tú enseñas la placa, explicas lo mínimo. Un tiroteo, hombres armados, un testigo muerto. No mencionas el contenedor. No mencionas Tethys.\n\nAún no.',
                options: [
                    { text: '🏭 Ir al Polígono Zona Franca', tiempo: 3, next: 12 },
                    { text: '📞 Llamar a Vidal', tiempo: 1, next: 12 },
                    { text: '🚑 Esperar a la policía oficial', tiempo: 4, next: 12 }
                ]
            },
            12: {
                title: 'DÍA 4 · LA NAVE 17',
                text: 'Barcelona, 17 de marzo. 4:45 AM. Polígono Zona Franca.\n\nLa nave 17 está al final de una calle sin salida, rodeada de almacenes abandonados y solares vacíos. Es grande, de chapa metálica, con una única puerta de acceso y ventanas selladas con ladrillos.\n\nLlegas con Vidal. El detective de los Mossos ha venido en cuanto le has llamado. Su cara, al ver la nave, es de incredulidad.\n\n—¿Estás seguro de que esto tiene que ver con Mateo?\n\n—Más que seguro.\n\nForzáis la puerta trasera. Dentro, el olor es insoportable. A podrido, a químico, a muerte. Encendéis las linternas.\n\nLo que veis os deja sin palabras.\n\nLa nave es un laboratorio. Mesas de operaciones, máquinas de soporte vital, tanques de cristal. Y en los tanques, cuerpos. Flotando en líquido verdoso. Conectados por tubos. Unidos entre sí.\n\nComo la masa que viste en Providence. Como el coleccionista.\n\n—Dios mío —susurra Vidal—. ¿Qué es esto?\n\n—Una colección —respondes—. Piezas.\n\nTe acercas a los tanques. En cada uno, una chapa metálica. Números. Del 001 al 023. Y luego, vacío. El 024 nunca llegó.\n\nO quizá sí.\n\nEn una mesa, junto a los tanques, hay una libreta abierta. La coges. Está escrita a mano, con letra temblorosa.\n\n"Diario de experimentos. Sujeto 024: Mateo Vidal. Fase 1: extracción. Fase 2: fusión. Pendiente de ejecución. El periodista supo demasiado. Será una pieza magnífica."\n\nMateo iba a ser el siguiente. Lo mataron antes de que pudieran traerlo aquí.\n\nVidal encuentra algo más. Detrás de los tanques, una puerta acorazada. Abierta. Dentro, un despacho. Ordenadores, archivos, y en la pared, un mapa. Barcelona, con varias zonas marcadas. Y una foto. La foto de un hombre.\n\n—¿Lo conoces? —pregunta Vidal.\n\nMiras la foto. El corazón te da un vuelco.\n\nEs Enric Font. El socio de Jordi Costa.',
                options: [
                    { text: '🔍 Registrar el despacho', tiempo: 2, next: 13 },
                    { text: '📸 Hacer fotos de todo', tiempo: 1, next: 13 },
                    { text: '🚔 Llamar a la policía científica', tiempo: 3, next: 13 }
                ]
            },
            13: {
                title: 'DÍA 5 · EL ARRESTO',
                text: 'Barcelona, 17 de marzo. 8:00 AM. Sede de Prometeo.\n\nCon las pruebas de la nave 17, Vidal consigue una orden de arresto. Vais a buscar a Enric Font a su despacho. Pero cuando llegáis, está vacío.\n\n—Salió hace una hora —dice la recepcionista—. Llevaba una maleta. Dijo que iba de viaje.\n\n—¿A dónde?\n\n—No lo dijo. Solo que... que no sabía cuándo volvería.\n\nRegistráis su despacho. En la papelera, papeles quemados a medio destruir. Entre ellos, un billete de avión. Barcelona-Zúrich. Para hoy. Las 11:30.\n\nMirás el reloj. Son las 9:15. Tenéis dos horas.',
                options: [
                    { text: '✈️ Ir al aeropuerto', tiempo: 2, next: 14 },
                    { text: '📞 Pedir a policía suiza', tiempo: 1, next: 14 },
                    { text: '🔍 Registrar su casa', tiempo: 3, next: 14 }
                ]
            },
            14: {
                title: 'DÍA 5 · LA PERSECUCIÓN',
                text: 'Aeropuerto de Barcelona-El Prat. 11:15 AM.\n\nLlegáis corriendo a la terminal. El vuelo a Zúrich ya está embarcando. Vidal muestra la placa a seguridad, os dejan pasar.\n\nRecorréis la pasarela de embarque. Los pasajeros ya están sentados. Buscáis con la mirada. Fila 14, asiento 23A. Vacío.\n\n—Se ha escondido —dice Vidal.\n\n—O no ha llegado.\n\nEntonces lo ves. Al fondo de la pasarela, una puerta de servicio. Abierta. Corréis hacia ella.\n\nDetrás, las escaleras de bajada a la pista. Y Enric Font, corriendo hacia un vehículo de servicio.\n\n—¡Alto! —gritas.\n\nÉl no se detiene. Sigue corriendo. Vidal dispara al aire. Enric tropieza, cae. Cuando llegáis, está en el suelo, jadeando, con las manos en la cabeza.\n\n—No me maten —suplica—. No me maten, yo solo... yo solo hacía lo que me decían.\n\n—¿Quién te lo decía?\n\n—Gente. Gente importante. De la empresa. Del gobierno. Yo no sabía lo de los cuerpos. No sabía nada.\n\n—Mientes.\n\nEnric levanta la cabeza. Tiene los ojos llenos de lágrimas.\n\n—Vale, lo sabía. Pero no podía parar. Me amenazaron. A mí, a mi familia. Dijeron que si hablaba, me convertirían en una de esas... cosas.\n\n—¿Quién dirige esto? ¿Quién está detrás?\n\n—No lo sé. De verdad. Solo tengo un nombre. Un contacto. En Suiza. En Ginebra. Un banco. La cuenta donde iba el dinero. El banco Lagrange.',
                options: [
                    { text: '🔐 Interrogar a Enric', tiempo: 2, next: 15 },
                    { text: '🏦 Contactar con banco Lagrange', tiempo: 1, next: 15 },
                    { text: '📦 Registrar su equipaje', tiempo: 1, next: 15 }
                ],
                onEnter: () => { state.pistas.enricDetenido = true; }
            },
            15: {
                title: 'DÍA 5 · LA CONFESIÓN',
                text: 'Comisaría de los Mossos. 17 de marzo. 6:00 PM.\n\nEnric Font lleva horas declarando. Ha contado todo: los sobornos, las amenazas, el laboratorio de la Zona Franca. Pero lo más importante lo cuenta al final, cuando ya solo estáis tú y Vidal en la sala.\n\n—El proyecto —dice—. Lo llamaban Proyecto Inmortalidad. Vino de Estados Unidos. De una empresa que quebró. Tethys. Alguien compró la tecnología. Los estudios. Los priones. Y los trajo aquí.\n\n—¿Para qué?\n\n—Para hacer negocio. Gente rica, muy rica, que no quiere morir. Que quiere... seguir. Fusionados con otros. Viviendo para siempre en una masa de carne. Es una locura, lo sé. Pero pagan. Pagan millones.\n\n—¿Y los cuerpos? ¿Los que vimos en la nave?\n\n—Son los que no funcionaron. Los que no soportaron la fusión. Los desechos. Los iban a incinerar, pero... pero alguien decidió guardarlos. El coleccionista, lo llamaban.\n\n—¿Quién es el coleccionista?\n\n—No lo sé. Solo sé que es español. O vive aquí. Y que le gusta... coleccionar. Elegir piezas especiales. Como Mateo. Como Jordi.\n\nVidal y tú os miráis. El coleccionista. Otra vez.\n\n—¿Dónde está ahora?\n\n—No lo sé. Pero si quieren respuestas, hablen con el banco Lagrange. Todo el dinero pasa por allí. Todas las órdenes. Es la única conexión.',
                options: [
                    { text: '🏦 Viajar a Ginebra', tiempo: 6, next: 16 },
                    { text: '📞 Contactar con policía suiza', tiempo: 2, next: 16 },
                    { text: '🔒 Cerrar el caso aquí', tiempo: 1, next: 18 }
                ]
            },
            16: {
                title: 'DÍA 6 · EL BANCO LAGRANGE',
                text: 'Ginebra, Suiza. 19 de marzo. 10:00 AM.\n\nEl banco Lagrange está en el centro antiguo, en un edificio de piedra que parece un museo. Madera oscura, suelos de mármol, silencio absoluto. Tú y María esperáis en una sala privada mientras un hombre con traje a medida os observa.\n\n—Señor Cross —dice, con acento francés—. Soy Étienne Moreau, director de relaciones internacionales. ¿En qué puedo ayudar al FBI?\n\nNecesitas ser cuidadoso. Los bancos suizos no sueltan información fácilmente.\n\n—Investigo un caso de asesinato. El asesinato de un periodista español, Mateo Vidal. Y de un arquitecto, Jordi Costa. El dinero que los mató pasó por este banco.\n\nMoreau no se inmuta.\n\n—Comprendo. Pero necesitará una orden judicial suiza. Y eso lleva tiempo. Semanas. Meses.\n\n—No tengo semanas.\n\n—Lo siento. Son las normas.\n\nMaría saca una foto. La foto de Enric Font esposado.\n\n—Este hombre va a declarar. Va a decir que el banco Lagrange lavó dinero para una empresa criminal. ¿Quiere que su banco aparezca en todos los periódicos? Porque yo escribo la noticia.\n\nMoreau la mira largamente. Luego suspira.\n\n—Tiene cinco minutos.\n\nOs lleva a un archivo. Saca una carpeta. Dentro, documentos. Transferencias. Y un nombre.\n\n—El destinatario final de los fondos —dice Moreau—. Una cuenta en las Islas Caimán. Titular: un hombre llamado...\n\nSe detiene.\n\n—¿Llamado?\n\n—Álvaro Mendoza. Empresario español. Con domicilio en Barcelona.',
                options: [
                    { text: '✈️ Volver a Barcelona', tiempo: 6, next: 17 },
                    { text: '🔍 Pedir más información', tiempo: 2, next: 16 },
                    { text: '📞 Contactar con Vidal', tiempo: 1, next: 17 }
                ]
            },
            17: {
                title: 'DÍA 7 · EL ÚLTIMO NOMBRE',
                text: 'Barcelona, 20 de marzo. 11:00 AM. Registro de la propiedad.\n\nÁlvaro Mendoza. Sesenta y dos años. Empresario. Dueño de una fortuna inmobiliaria. Y, según los archivos que Vidal consigue, propietario de la nave 17. Y de otras dos naves en el puerto. Y de una clínica privada en las afueras.\n\n—La clínica —dice Vidal—. Se llama Clínica Nova Vita. Especialidades: tratamientos de longevidad, terapias celulares, rejuvenecimiento. Clientes: ricos. Muy ricos.\n\n—Es donde hacen las fusiones —dices—. Donde convierten a la gente en piezas.\n\n—Parece que sí.\n\nVais a la clínica. Es un edificio moderno, rodeado de jardines, en una zona residencial cara. En recepción, una enfermera os mira con desconfianza.\n\n—¿El señor Mendoza? No está. Lleva una semana sin venir.\n\n—¿Dónde podemos encontrarlo?\n\n—No lo sé. En su casa, quizá. Pero no creo que les reciba.\n\nEn casa de Mendoza, el vigilante os dice lo mismo. No está. Nadie sabe dónde está.\n\nPero tú sí lo sabes. Miras a María.\n\n—El aeropuerto. Otra vez.\n\nLlegáis a El Prat a las 4 de la tarde. En la terminal de vuelos privados, un Learjet está preparándose para despegar. Destino: Dubái.\n\nMendoza está subiendo la escalerilla cuando lo veis.\n\n—¡Alto! —gritas, mostrando la placa.\n\nÉl se gira. Sesenta años, bien vestido, expresión de incredulidad.\n\n—¿Qué quiere el FBI conmigo?\n\n—Asesinato. Tráfico de personas. Experimentos ilegales. Elija.\n\nMendoza sonríe. Una sonrisa fría.\n\n—No tiene pruebas.\n\n—Tenemos la nave 17. Tenemos los tanques. Tenemos a Enric Font. Tenemos el banco Lagrange. Y tenemos a Mateo Vidal, Jordi Costa y otros veintitrés muertos.\n\nLa sonrisa se congela.\n\n—No va a detenerme —dice—. Tengo amigos. Amigos muy poderosos.\n\n—Pues llámelos —respondes—. Desde la comisaría.',
                options: [
                    { text: '🔒 Detener a Mendoza', tiempo: 2, next: 18 },
                    { text: '🔍 Registrar la clínica', tiempo: 4, next: 18 },
                    { text: '📝 Interrogarle aquí', tiempo: 2, next: 18 }
                ]
            },
            18: {
                title: 'DÍA 7 · LA CLÍNICA',
                text: 'Clínica Nova Vita. 20 de marzo. 7:00 PM.\n\nCon Mendoza detenido, registráis la clínica con orden judicial. Lo que encontráis es peor que la nave 17.\n\nEn el sótano, un laboratorio completo. Tanques de criopreservación. Quirófanos. Y archivos. Miles de archivos. Pacientes adinerados que pagaron por "tratamientos de extensión vital". Y junto a los archivos, otro tipo de documentos.\n\nPiezas. Catalogadas. Numeradas. Fotografiadas.\n\nLa colección de Mendoza. El coleccionista español.\n\nEntre los papeles, una fotografía. Un grupo de personas en una cena de empresa. Mendoza, Enric Font, y otros que no reconoces. Al fondo, un hombre mayor, de pie junto a una ventana. La cara está borrosa, pero la postura te resulta familiar.\n\n—¿Quién es? —pregunta María.\n\nNo lo sabes. Pero algo en tu interior te dice que no es la última vez que verás esa cara.\n\nEn el cajón del despacho de Mendoza, una carta. Escrita a mano. Con membrete: "Proyecto Inmortalidad - Dirección Europea".\n\n"Querido Álvaro: La operación Barcelona ha sido un éxito. Las piezas están aseguradas. El próximo objetivo es Madrid. Prepare los permisos. Nos vemos en la reunión de diciembre. — J."\n\nJ. Solo una inicial. Pero tú sabes qué nombre empieza por J.\n\nJulian.\n\nPero Julian Moss murió. Se ahogó en su propio tanque en Providence. ¿O no?',
                options: [
                    { text: '🔍 Investigar la inicial J', tiempo: 1, next: 19 },
                    { text: '📦 Cerrar el caso', tiempo: 1, next: 19 }
                ],
                onEnter: () => { addItem('libretaMendoza'); addItem('cartaJ'); }
            },
            19: {
                title: 'EPÍLOGO · MADRID',
                text: 'Barcelona, 30 de marzo de 2025. Aeropuerto.\n\nEl caso está cerrado. Mendoza está en prisión preventiva. Enric Font testifica contra él a cambio de reducción de condena. La Clínica Nova Vita está sellada. Las piezas, las que sobrevivieron, han sido identificadas y devueltas a sus familias.\n\nMateo Vidal tiene una placa en el cementerio de Montjuïc. Periodista asesinado por investigar la verdad.\n\nTú y María esperáis el vuelo de vuelta a Boston. Ella escribe su artículo. El más importante de su carrera. Tú miras por la ventana, pensando.\n\n—¿Crees que Moss sigue vivo? —pregunta María.\n\n—No lo sé. El cuerpo nunca apareció.\n\n—Pero te ahogaste con él en esa sala. Viste cómo el agua lo cubría.\n\n—Vi cómo el agua lo cubría. No vi cómo moría.\n\nMaría guarda silencio.\n\n—¿Y ahora qué?\n\n—Ahora, a casa. Sarah me espera para cenar.\n\n—¿Y después?\n\n—Después... no lo sé. Hay una carta. La de Mendoza. La inicial J. Si Moss está vivo, si está en Europa... volveremos a encontrarnos.\n\n—¿Madrid?\n\n—Madrid. O Ginebra. O París. Da igual. Si colecciona piezas, dejará rastro.\n\nEl altavoz anuncia el embarque. Recogéis las maletas.\n\nAntes de cruzar la puerta, miras una última vez Barcelona. La ciudad que te ha dado respuestas. Y más preguntas.\n\n—Vamos —dices—. Hay trabajo esperando.\n\nFIN',
                options: [
                    { text: '🔁 VOLVER A EMPEZAR', final: true }
                ]
            }
        };

        function loadChapter(step) {
            if (state.tiempo <= 0) {
                showTimeOut();
                return;
            }
            if (state.health <= 0) {
                showGameOver();
                return;
            }

            const chap = chapters[step];
            if (!chap) return;

            chapterDisplay.innerText = chap.title;
            novelText.innerText = chap.text;
            if (chap.onEnter) chap.onEnter();

            optionsContainer.innerHTML = '';
            chap.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.innerText = opt.text;
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    if (opt.tiempo) restarTiempo(opt.tiempo);
                    
                    if (state.tiempo <= 0) {
                        showTimeOut();
                        return;
                    }
                    if (state.health <= 0) return;

                    if (opt.final) {
                        restartGame();
                        return;
                    }

                    const nextStep = opt.next !== undefined ? opt.next : step + 1;
                    state.step = nextStep;
                    loadChapter(state.step);
                });
                optionsContainer.appendChild(btn);
            });

            updateUI();
            inventoryPanel.classList.remove('visible');
        }

        function restartGame() {
            state = {
                health: 100,
                maxHealth: 100,
                tiempo: 168,
                step: 1,
                inventory: {
                    cartaSilvia: false,
                    llave089: false,
                    pendrive: false,
                    muestrasSangre: false,
                    libretaMendoza: false,
                    cartaJ: false
                },
                pistas: {
                    silviaHablado: false,
                    vidalContactado: false,
                    enricDetenido: false
                }
            };
            loadChapter(1);
        }

        restartBtn.addEventListener('click', restartGame);
        loadChapter(1);
    })();
</script>
