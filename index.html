<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <title>EL CASO DEL ARQUITECTO · novela completa (18 capítulos + epílogo)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Georgia', 'Times New Roman', serif;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #1a1e24;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px;
        }
        .gamebook {
            max-width: 700px;
            width: 100%;
            background: #2c3e4f;
            border-radius: 40px 40px 28px 28px;
            box-shadow: 0 25px 45px #000000dd;
            border: 2px solid #4a6a8a;
            overflow: hidden;
        }
        .top-bar {
            background: #1e3142;
            padding: 10px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #3f5770;
        }
        .inventory-button {
            background: #253d53;
            border: 2px solid #6083a8;
            border-radius: 40px;
            padding: 6px 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            box-shadow: 0 4px 0 #102433;
            transition: 0.08s linear;
            touch-action: manipulation;
        }
        .inventory-button:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #102433;
        }
        .inv-icon {
            font-size: 1.8rem;
            color: #ffd78c;
        }
        .inv-text {
            color: white;
            font-weight: 600;
            font-size: 1rem;
        }
        .inventory-panel {
            background: #1d3143;
            border-bottom: 3px solid #4f6f90;
            padding: 16px 20px;
            display: none;
            flex-wrap: wrap;
            gap: 16px 24px;
            align-items: center;
            box-shadow: inset 0 1px 6px #00000055;
        }
        .inventory-panel.visible {
            display: flex;
        }
        .inventory-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            background: #2b4058;
            padding: 10px 15px;
            border-radius: 30px;
            border: 1px solid #769dc9;
            min-width: 90px;
        }
        .item-emoji {
            font-size: 2.5rem;
            filter: drop-shadow(2px 4px 4px black);
        }
        .item-label {
            color: #f0f4fa;
            font-size: 0.9rem;
            font-weight: 600;
            background: #1c3142;
            padding: 4px 12px;
            border-radius: 30px;
            white-space: nowrap;
        }
        .chapter-tag {
            background: #1f3345;
            color: #d7e7ff;
            padding: 12px 22px;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 1px;
            border-bottom: 2px solid #3b5773;
        }
        .novel-area {
            background: #14222f;
            padding: 32px 28px 40px;
            color: #ecf5ff;
            font-size: 1.18rem;
            line-height: 1.7;
            border-bottom: 2px solid #1f3345;
            max-height: 500px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #527a9e #1c2e3f;
        }
        .novel-area::-webkit-scrollbar {
            width: 8px;
        }
        .novel-area::-webkit-scrollbar-track {
            background: #1c2e3f;
        }
        .novel-area::-webkit-scrollbar-thumb {
            background: #527a9e;
            border-radius: 10px;
        }
        .options-area {
            background: #11212e;
            padding: 24px 22px 28px;
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
            border-top: 2px solid #2a4055;
        }
        .choice-btn {
            background: #263f56;
            border: none;
            border-bottom: 5px solid #102433;
            color: #f5fbff;
            font-size: 1.05rem;
            font-weight: 500;
            padding: 14px 20px;
            border-radius: 50px;
            box-shadow: 0 6px 0 #0d1f2e;
            transition: 0.06s linear;
            cursor: pointer;
            touch-action: manipulation;
            flex: 1 1 180px;
            min-width: 150px;
            text-align: center;
            line-height: 1.3;
        }
        .choice-btn:active {
            transform: translateY(5px);
            border-bottom-width: 2px;
            background: #1d3348;
        }
        .footer {
            background: #1c2b39;
            padding: 14px 20px 16px;
            text-align: center;
            border-top: 2px solid #38536d;
        }
        .restart-btn {
            background: #324252;
            border: 1px solid #7089a8;
            color: #ffefd3;
            padding: 12px 28px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: bold;
            border-bottom: 5px solid #1c2938;
            cursor: pointer;
            display: inline-block;
            min-width: 220px;
        }
        .restart-btn:active {
            transform: translateY(5px);
            border-bottom-width: 2px;
        }
        .footnote {
            color: #5f7c9c;
            font-size: 0.8rem;
            margin-top: 8px;
        }
    </style>
</head>
<body>
<div class="gamebook">
    <div class="top-bar">
        <div class="inventory-button" id="inventoryToggle">
            <span class="inv-icon">📦</span>
            <span class="inv-text">pruebas</span>
        </div>
    </div>

    <div class="inventory-panel" id="inventoryPanel"></div>

    <div class="chapter-tag" id="chapterDisplay">LA LLAMADA DE SALEM</div>
    
    <div class="novel-area" id="novelText"></div>

    <div class="options-area" id="optionsContainer"></div>

    <div class="footer">
        <div class="restart-btn" id="restartButton">↻ REINICIAR INVESTIGACIÓN</div>
        <div class="footnote">18 capítulos + epílogo · Caso del Arquitecto</div>
    </div>
</div>

<script>
    (function() {
        let state = {
            step: 1,
            inventory: {
                cartaLaura: false,
                informeToxico: false,
                transferencias: false,
                mensajesMovil: false,
                reciboKetamina: false,
                cartaDavid: false
            }
        };

        const chapterDisplay = document.getElementById('chapterDisplay');
        const novelText = document.getElementById('novelText');
        const optionsContainer = document.getElementById('optionsContainer');
        const inventoryPanel = document.getElementById('inventoryPanel');
        const inventoryToggle = document.getElementById('inventoryToggle');
        const restartBtn = document.getElementById('restartButton');

        inventoryToggle.addEventListener('click', (e) => {
            e.preventDefault();
            inventoryPanel.classList.toggle('visible');
            updateInventoryPanel();
        });

        function addItem(item) {
            if (item === 'cartaLaura') state.inventory.cartaLaura = true;
            if (item === 'informeToxico') state.inventory.informeToxico = true;
            if (item === 'transferencias') state.inventory.transferencias = true;
            if (item === 'mensajesMovil') state.inventory.mensajesMovil = true;
            if (item === 'reciboKetamina') state.inventory.reciboKetamina = true;
            if (item === 'cartaDavid') state.inventory.cartaDavid = true;
            if (inventoryPanel.classList.contains('visible')) updateInventoryPanel();
        }

        function updateInventoryPanel() {
            let html = '<div class="inventory-item"><span class="item-emoji">📋</span><span class="item-label">Caso 0893</span></div>';
            if (state.inventory.cartaLaura) html += '<div class="inventory-item"><span class="item-emoji">💌</span><span class="item-label">Carta de Laura</span></div>';
            if (state.inventory.informeToxico) html += '<div class="inventory-item"><span class="item-emoji">🧪</span><span class="item-label">Informe toxicológico</span></div>';
            if (state.inventory.transferencias) html += '<div class="inventory-item"><span class="item-emoji">💰</span><span class="item-label">Transferencias</span></div>';
            if (state.inventory.mensajesMovil) html += '<div class="inventory-item"><span class="item-emoji">📱</span><span class="item-label">Mensajes</span></div>';
            if (state.inventory.reciboKetamina) html += '<div class="inventory-item"><span class="item-emoji">🧴</span><span class="item-label">Recibo Ketamina</span></div>';
            if (state.inventory.cartaDavid) html += '<div class="inventory-item"><span class="item-emoji">💔</span><span class="item-label">Carta de David</span></div>';
            inventoryPanel.innerHTML = html;
        }

        const chapters = {
            1: {
                title: 'LA LLAMADA DE SALEM',
                text: 'Boston, Massachusetts. Despacho del FBI. 10 de marzo de 2025. 9:15 AM.\n\nEl agente especial Daniel Cross llevaba semanas sin casos importantes cuando el teléfono sonó. Era un viejo conocido, el detective Victor Ramos del departamento de policía de Salem.\n\n—Daniel, soy Victor. ¿Tienes un momento?\n\n—Para ti siempre, Victor. ¿Qué pasa?\n\n—Tenemos un caso complicado. Un arquitecto, Michael Stone, murió en accidente de coche hace tres meses. Oficialmente cerrado. Pero su madre no descansa. Y ahora ha aparecido un periodista muerto, Thomas Reed, que estaba investigando el caso.\n\n—¿Conexión?\n\n—Los análisis de sangre. Ambos tenían el mismo compuesto. Ketamina. Alguien los drogó antes de morir.\n\nDaniel frunció el ceño.\n\n—¿Ketamina? Eso es anestésico veterinario.\n\n—Exacto. Y hay más. Thomas Reed trabajaba para el Salem Chronicle. Su editor, David Morrison, era su pareja. Y según su exmujer, Laura Reed, lo amenazó para que dejara la investigación.\n\n—¿Amenazas?\n\n—Sí. Y ahora Morrison ha desaparecido.\n\nDaniel dudó un momento.\n\n—Voy para allá. ¿Puedes avisar a María Torres?\n\n—¿La periodista?\n\n—La misma. Dile que la necesito en Salem.\n\n—De acuerdo. Te espero.',
                options: [
                    { text: '🚗 Viajar a Salem', next: 2 },
                    { text: '📞 Llamar a María primero', next: 2 }
                ]
            },
            2: {
                title: 'SALEM',
                text: 'Salem, Massachusetts. 10 de marzo de 2025. 11:30 AM. Comisaría de Salem.\n\nDaniel llegó a la comisaría y encontró a Victor Ramos esperándole. El detective había envejecido desde la última vez que se vieron, pero conservaba la misma mirada cansada.\n\n—Gracias por venir, Daniel.\n\n—María viene de camino. ¿Qué tenemos?\n\n—Dos muertos. Michael Stone, arquitecto de Stone & Associates, fallecido en accidente de tráfico hace tres meses. Y Thomas Reed, periodista del Salem Chronicle, aparecido muerto en su piso hace una semana.\n\n—¿Autopsias?\n\n—Ambos tenían ketamina en sangre. Un anestésico veterinario. En el caso de Stone, la dosis era suficiente para dejarlo inconsciente. Perdió el control del coche. En el de Reed, lo inmovilizaron y luego le inyectaron algo más.\n\n—¿Algo más?\n\n—Los forenses encontraron marcas en su cuello. Como de agujas. Alguien lo sedó y luego lo mató.\n\n—¿Por qué cerraron el caso de Stone?\n\n—Porque Stone & Associates es una empresa poderosa. Contratos con el ayuntamiento, con el estado. Si esto sale a la luz, caen muchos nombres.\n\nMaría entró en ese momento, con su mochila y su cámara colgada al cuello.\n\n—¿Me perdí algo?\n\n—Acabas de llegar —dijo Daniel—. Vamos al piso de Thomas Reed.',
                options: [
                    { text: '🏢 Ir al piso de Thomas Reed', next: 3 },
                    { text: '👵 Hablar con Margaret Stone (madre de Michael)', next: 4 },
                    { text: '🔍 Ver los informes de Victor primero', next: 5 }
                ]
            },
            3: {
                title: 'EL PISO DE THOMAS REED',
                text: 'Salem, 10 de marzo. 2:00 PM. Federal Street, 245.\n\nEl piso de Thomas Reed era pequeño, abarrotado de libros y periódicos. Olía a cerrado, a muerte reciente.\n\n—Era meticuloso —dijo Victor—. Guardaba todo. Sus investigaciones, sus entrevistas.\n\nEn el dormitorio, Daniel encontró una libreta en la mesilla. La abrió. Las últimas páginas estaban escritas con letra temblorosa.\n\n"Hoy hablé con Margaret Stone. Me enseñó los papeles de Michael. Alguien lo drogó antes del accidente. Voy a investigar a Stone & Associates. Van a pagar por lo que hicieron."\n\nY más abajo, una entrada diferente:\n\n"David me ha amenazado. Dice que si publico lo de Stone & Associates, arruinará mi carrera. No sé hasta dónde es capaz de llegar."\n\nDaniel guardó la libreta.\n\n—¿Quién es David? —preguntó.\n\n—David Morrison —respondió Victor—. El editor del Salem Chronicle. También... también fue su pareja. Hasta hace unos meses.\n\n—¿Sabe algo de esto?\n\n—No lo sé. Pero podemos preguntarle.\n\nEn el cajón de la mesilla, junto a la cama, María encontró una carta. Estaba arrugada, como si la hubieran tirado y luego recuperado.\n\nEra de Laura Reed, la exmujer de Thomas.\n\n"Thomas: Te lo pido por última vez. Deja de investigar. David me ha llamado. Está furioso. Tiene contactos, dinero, poder. No sé de qué es capaz, pero tengo miedo. Por ti. Por mí. Por favor, déjalo."\n\n—Esto es importante —dijo Daniel—. Una amenaza directa.',
                options: [
                    { text: '👩 Hablar con Laura Reed', next: 6 },
                    { text: '📰 Hablar con David Morrison', next: 7 },
                    { text: '🔍 Seguir registrando el piso', next: 3 }
                ],
                onEnter: () => { addItem('cartaLaura'); }
            },
            4: {
                title: 'LA MADRE DEL ARQUITECTO',
                text: 'Salem, 10 de marzo. 4:30 PM. Collins Street, 78.\n\nMargaret Stone vivía sola en una casa modesta. Tenía sesenta y cinco años, el pelo cano, y una expresión de duelo reciente.\n\n—Gracias por venir —dijo, sirviendo café—. Nadie más quiso escucharme.\n\n—Cuénteme lo que sabe, señora Stone.\n\n—Mi hijo era meticuloso. Apuntaba todo. Sus proyectos, sus reuniones, sus sospechas. Los últimos meses, escribía mucho. Y siempre lo mismo: "Me vigilan." "Me siguen." "No sé quién, pero me vigilan."\n\n—¿Tenía enemigos?\n\n—En el trabajo, sí. Stone & Associates es muy competitiva. Michael había descubierto algo. Algo sobre sobornos. Iba a denunciar.\n\n—¿A quién?\n\n—A su socio, Richard Stone. Su propio hermano. Y a otros. Gente del ayuntamiento.\n\n—¿Y qué pasó?\n\n—El accidente. Una semana antes de denunciar. La policía dijo que se salió de la carretera. Que iba demasiado rápido. Pero Michael no conducía rápido. Era prudente. Alguien lo drogó.\n\n—¿Tiene pruebas?\n\nMargaret fue a una habitación y volvió con una carpeta.\n\n—Los informes médicos. Los análisis de sangre que le hicieron en el hospital. Tiene ketamina. Un anestésico de animales. ¿Qué hacía eso en la sangre de mi hijo?',
                options: [
                    { text: '📂 Recoger los informes', next: 5 },
                    { text: '🔍 Preguntar por Richard Stone', next: 8 },
                    { text: '🏥 Ir al hospital', next: 9 }
                ],
                onEnter: () => { addItem('informeToxico'); }
            },
            5: {
                title: 'LOS INFORMES',
                text: 'Salem, 10 de marzo. 6:00 PM. Comisaría de Salem.\n\nVictor les mostró los informes oficiales. Daniel los examinó con atención.\n\nEl informe de Michael Stone: accidente de tráfico. El toxicólogo mencionaba "presencia de ketamina" en la sangre, pero lo atribuía a medicación que el arquitecto pudiera estar tomando.\n\nEl informe de Thomas Reed: homicidio. Las fotografías mostraban pequeñas marcas en el cuello. Como de agujas.\n\n—Lo inmovilizaron con ketamina y luego... luego le inyectaron algo más —dijo Daniel.\n\n—¿El qué?\n\n—No lo sé. Pero la ketamina es la clave. Alguien la compró, la tuvo en su poder, la usó.\n\n—He investigado —dijo Victor—. La ketamina es de uso veterinario. Solo se vende con receta. Y hay un único distribuidor en Massachusetts. Una farmacia veterinaria en el puerto de Salem.\n\n—¿Podemos conseguir los registros de venta?\n\n—Ya lo hice. Vendieron ketamina a varias clínicas y particulares. Pero hay una compra que me llamó la atención. Hace cuatro meses. Un particular. Pagó en efectivo. Dio un nombre falso.\n\n—¿Cómo lo sabe?\n\n—Porque el nombre que dio era "Michael Stone". Pero Michael Stone estaba muerto una semana después. No pudo comprarlo él mismo.',
                options: [
                    { text: '🚢 Ir a la farmacia veterinaria', next: 10 },
                    { text: '👤 Investigar a Richard Stone', next: 8 },
                    { text: '📰 Ir al periódico', next: 7 }
                ]
            },
            6: {
                title: 'LA EXMUJER',
                text: 'Salem, 11 de marzo. 11:00 AM. Derby Street Cafe.\n\nLaura Reed llegó puntual. Cuarenta años, morena, bien vestida, con ojeras profundas.\n\n—Thomas y yo nos divorciamos hace cinco años —dijo—. Pero manteníamos contacto. Era el padre de mi hija.\n\n—¿Cuándo habló con él por última vez?\n\n—Una semana antes de morir. Estaba asustado. Me dijo que había descubierto algo grande. Algo sobre la muerte de un arquitecto, Michael Stone.\n\n—¿Le dijo qué?\n\n—Que no era accidente. Que lo habían matado. Y que el asesino era alguien cercano a él.\n\n—¿Alguien cercano?\n\nLaura dudó. Miró su café, luego la calle, luego sus manos.\n\n—David. David Morrison. El editor del periódico. Tuvieron una relación mientras estábamos casados. Thomas la dejó, pero David no lo superó. Le escribía cartas, le llamaba, le acosaba. Y cuando Thomas empezó a investigar a Stone & Associates, David intentó detenerlo.\n\n—¿Cómo?\n\n—Le ofreció dinero, un ascenso, lo que fuera. Thomas no aceptó. Entonces empezaron las amenazas. "Si publicas eso, te arruino." "No volverás a trabajar en este estado."\n\n—¿Cree que David pudo matarlo?\n\n—No lo sé. Pero algo me dice que no es tan inocente como parece. La última vez que hablé con Thomas, me dijo: "Si me pasa algo, busca en la taquilla 089 de la estación de autobuses."',
                options: [
                    { text: '🚉 Ir a la taquilla 089', next: 11 },
                    { text: '📰 Ir al periódico a ver a David', next: 7 },
                    { text: '🔍 Volver al piso de Thomas', next: 3 }
                ]
            },
            7: {
                title: 'EL EDITOR',
                text: 'Salem, 11 de marzo. 4:00 PM. Salem Chronicle.\n\nDavid Morrison era un hombre de cincuenta años, elegante, con una sonrisa que no llegaba a los ojos. Recibió a Daniel en su despacho con amabilidad profesional.\n\n—Agente Cross —dijo—. ¿FBI en mi periódico? Qué sorpresa.\n\n—Investigo la muerte de Thomas Reed.\n\nLa sonrisa se tensó.\n\n—Terrible lo de Thomas. Un gran periodista. Le ofrecí todo lo que pude, pero... bueno, ya sabe, los problemas personales...\n\n—¿Qué problemas?\n\n—Estaba obsesionado. Con una historia. Una historia que no existía. Conspiraciones, sobornos, cosas así. Le dije que lo dejara, que se tomara unas vacaciones. No quiso.\n\n—¿Y usted mantuvo una relación con él?\n\nEl silencio se alargó.\n\n—Eso es asunto privado.\n\n—No cuando alguien está muerto.\n\nDavid se levantó.\n\n—Creo que esta conversación ha terminado.\n\n—Una última pregunta —dijo Daniel—. ¿Dónde estaba usted la noche que murió Thomas?\n\n—En mi casa. Solo. Viendo la televisión.\n\n—¿Alguien puede confirmarlo?\n\n—No. Vivo solo.\n\nCuando salían del despacho, María señaló discretamente un papel en la mesa de David. Era un recibo. De una farmacia veterinaria.\n\n—¿Ha visto eso? —susurró—. Una farmacia de animales.',
                options: [
                    { text: '🔍 Registrar el despacho de David', next: 12 },
                    { text: '🚢 Ir a la farmacia veterinaria', next: 10 },
                    { text: '👤 Seguir a David', next: 13 }
                ]
            },
            8: {
                title: 'EL HERMANO',
                text: 'Salem, 12 de marzo. 10:00 AM. Stone & Associates.\n\nRichard Stone era un hombre de cuarenta y cinco años, traje caro, sonrisa de político. Demasiado perfecto.\n\n—Agente Cross —dijo, tendiendo la mano—. ¿En qué puedo ayudarle?\n\n—Michael Stone. Era su hermano, ¿no?\n\n—Sí. Un gran profesional. Una pérdida terrible.\n\n—¿Sabía que estaba investigando algo? ¿Algo relacionado con la empresa?\n\n—Michael siempre investigaba. Era meticuloso. Pero todo dentro de lo profesional. Proyectos, materiales, normativas.\n\n—¿Y los sobornos?\n\nLa sonrisa de Richard se congeló.\n\n—No sé de qué habla.\n\n—Michael había descubierto algo. Iba a denunciar. Y una semana después, murió.\n\n—Fue un accidente.\n\n—Con ketamina en la sangre.\n\nRichard pestañeó. Solo una vez.\n\n—No sé nada de eso.\n\n—¿Dónde estaba usted la noche del accidente?\n\n—En mi casa. Con mi mujer.\n\n—¿Puede confirmarlo ella?\n\n—Sí.\n\nMaría tomaba notas.\n\n—¿Y qué sabe de Thomas Reed, el periodista que investigaba el caso?\n\n—Nada. Nunca hablé con él.\n\n—¿Nunca?\n\n—Nunca.\n\nCuando salieron, María dijo:\n\n—Miente. He visto su nombre en los papeles de Thomas. Aparecía en una lista de contactos.',
                options: [
                    { text: '🔍 Presionar más a Richard', next: 8 },
                    { text: '🚉 Ir a la taquilla 089', next: 11 },
                    { text: '🏠 Investigar la coartada de Richard', next: 14 }
                ]
            },
            9: {
                title: 'EL HOSPITAL',
                text: 'Salem, 12 de marzo. 12:30 PM. Salem Hospital.\n\nLa doctora Sarah Chen era la jefa de toxicología. Una mujer seria, con mirada inteligente. Prima lejana de Daniel, aunque apenas se veían.\n\n—Daniel —dijo—. Victor me dijo que vendrías. Supongo que es por el caso Stone.\n\n—Sí. Tú hiciste los análisis.\n\n—Encontré ketamina en su sangre. Un anestésico veterinario. Se lo dije a la policía, pero no quisieron seguir investigando. Accidente, dijeron. Caso cerrado.\n\n—¿Y tú qué crees?\n\n—Que alguien lo drogó. La dosis era suficiente para dejarlo inconsciente. Perdió el control del coche. Pero antes de eso, alguien tuvo que inyectarle o hacerle ingerir la sustancia.\n\n—¿Guardaste las muestras?\n\n—Sí. Las guardé. Por si alguien preguntaba algún día.\n\n—Alguien pregunta ahora.\n\nSarah fue a un congelador y sacó un pequeño tubo de ensayo.\n\n—Aquí tienes. La sangre de Michael Stone. Con la ketamina.\n\nDaniel guardó el tubo con cuidado.\n\n—Gracias, Sarah.\n\n—Que atrapen al culpable, Daniel. Ese chico no merecía morir así.',
                options: [
                    { text: '🚉 Ir a la taquilla 089', next: 11 },
                    { text: '📰 Volver al periódico', next: 7 },
                    { text: '🔍 Analizar las muestras', next: 9 }
                ]
            },

        function loadChapter(step) {
            const chap = chapters[step];
            if (!chap) return;

            chapterDisplay.innerText = chap.title;
            novelText.innerText = chap.text;
            if (chap.onEnter) chap.onEnter();

            optionsContainer.innerHTML = '';
            chap.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.innerText = opt.text;
                btn.addEventListener('click', (e) => {
                    e.preventDefault();

                    if (opt.final) {
                        restartGame();
                        return;
                    }

                    const nextStep = opt.next !== undefined ? opt.next : step + 1;
                    state.step = nextStep;
                    loadChapter(state.step);
                });
                optionsContainer.appendChild(btn);
            });

            inventoryPanel.classList.remove('visible');
        }

        function restartGame() {
            state = {
                step: 1,
                inventory: {
                    cartaLaura: false,
                    informeToxico: false,
                    transferencias: false,
                    mensajesMovil: false,
                    reciboKetamina: false,
                    cartaDavid: false
                }
            };
            loadChapter(1);
        }

        restartBtn.addEventListener('click', restartGame);
        loadChapter(1);
    })();
