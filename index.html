<body>
<div class="gamebook">
    <div class="top-bar">
        <div class="inventory-button" id="inventoryToggle">
            <span class="inv-icon">📦</span>
            <span class="inv-text">evidencias</span>
        </div>

<script>
    (function() {
        let state = {
            step: 1,
            inventory: {
                informeAutopsia: false,
                llamada911: false,
                cuchillo: false,
                billetera: false,
                ropaSangrienta: false,
                declaracionPortero: false,
                declaracionPadresDaphne: false,
                declaracionMadreChristopher: false,
                mensajeTelefonico: false,
                reciboFarmacia: false,
                diarioPersonal: false,
                fotografiaPareja: false,
                registroLavanderia: false,
                testimonioCompaneros: false,
                confesionDaphne: false,
                ordenRegistro: false
            },
            interrogatorios: {
                daphne: false,
                christopher: false,
                angelo: false,
                catherine: false,
                madreChristopher: false
            },
            lugaresVisitados: {
                centralPark: false,
                edificioMajestic: false,
                comisaria: false,
                casaChristopher: false,
                lavanderia: false,
                juzgado: false
            },
            pistas: {
                llamadaRecibida: false,
                sangreEncontrada: false,
                coartadaRota: false,
                acusacionesCruzadas: false,
                ordenJudicial: false
            }
        };

        const chapterDisplay = document.getElementById('chapterDisplay');
        const novelText = document.getElementById('novelText');
        const optionsContainer = document.getElementById('optionsContainer');
        const inventoryPanel = document.getElementById('inventoryPanel');
        const inventoryToggle = document.getElementById('inventoryToggle');
        const restartBtn = document.getElementById('restartButton');

        inventoryToggle.addEventListener('click', (e) => {
            e.preventDefault();
            inventoryPanel.classList.toggle('visible');
            updateInventoryPanel();
        });

        function addItem(item) {
            state.inventory[item] = true;
            if (inventoryPanel.classList.contains('visible')) updateInventoryPanel();
        }

        function marcarInterrogatorio(persona) {
            state.interrogatorios[persona] = true;
        }

        function marcarLugar(lugar) {
            state.lugaresVisitados[lugar] = true;
        }

        function updateInventoryPanel() {
            let html = '<div class="inventory-item"><span class="item-emoji">🗽</span><span class="item-label">Caso Central Park</span></div>';
            
            const items = [
                { key: 'informeAutopsia', emoji: '🔬', label: 'Informe autopsia' },
                { key: 'llamada911', emoji: '📞', label: 'Llamada 911' },
                { key: 'cuchillo', emoji: '🔪', label: 'Cuchillo' },
                { key: 'billetera', emoji: '👛', label: 'Billetera víctima' },
                { key: 'ropaSangrienta', emoji: '👕', label: 'Ropa manchada' },
                { key: 'declaracionPortero', emoji: '🚪', label: 'Portero' },
                { key: 'declaracionPadresDaphne', emoji: '👨‍👩', label: 'Padres Daphne' },
                { key: 'declaracionMadreChristopher', emoji: '👩', label: 'Madre Christopher' },
                { key: 'mensajeTelefonico', emoji: '📱', label: 'Mensajes' },
                { key: 'reciboFarmacia', emoji: '💊', label: 'Recibo Zoloft' },
                { key: 'diarioPersonal', emoji: '📓', label: 'Diario Daphne' },
                { key: 'fotografiaPareja', emoji: '📸', label: 'Foto pareja' },
                { key: 'registroLavanderia', emoji: '🧺', label: 'Registro lavandería' },
                { key: 'testimonioCompaneros', emoji: '👥', label: 'Compañeros' },
                { key: 'confesionDaphne', emoji: '⚖️', label: 'Confesión' },
                { key: 'ordenRegistro', emoji: '📄', label: 'Orden registro' }
            ];
            
            items.forEach(item => {
                if (state.inventory[item.key]) {
                    html += `<div class="inventory-item"><span class="item-emoji">${item.emoji}</span><span class="item-label">${item.label}</span></div>`;
                }
            });
            
            inventoryPanel.innerHTML = html;
        }

        const chapters = {
            // CAPÍTULO 1 - INTRODUCCIÓN
            1: {
                title: 'EL SECRETO DE CENTRAL PARK',
                text: 'Nueva York, 23 de mayo de 1997. 6:30 AM. Central Park, Manhattan.\n\nEl detective Robert Sullivan llevaba veinte años en el Departamento de Policía de Nueva York, los últimos doce en homicidios. Había visto de todo, pero nada como esto.\n\nSu compañero, el detective Lee Furman, se acercó con el termo de café y cara de haber visto un fantasma.\n\n—Bob, tienes que verlo.\n\nEl sol comenzaba a iluminar el lago cuando Sullivan se asomó. Un cuerpo flotaba boca arriba, pero no era un ahogado. La cabeza apenas se sostenía del cuello, la cara era irreconocible, y del abdomen abierto sobresalían los intestinos.\n\n—¿Identidad?\n\n—Michael McMorrow, 44 años. Agente inmobiliario. Vivía con su madre en el Upper West Side. Anoche salió a beber con unos amigos y no volvió.\n\nSullivan observó las heridas. Puñaladas, muchas. Y luego, el trabajo de destripamiento fue... metódico.\n\n—Esto no es un robo que salió mal. Es una ejecución. Pero... ¿quién hace algo así?\n\nFurman señaló algo.\n\n—Eso no es todo. A las 12:47 de esta madrugada, un matrimonio del edificio Majestic denunció la desaparición de su hija de 15 años. Se llama Daphne Abdela. Y a la 1:34, una chica llamó al 911 diciendo que había un cadáver en el lago.\n\n—¿Y?\n\n—La llamada se hizo desde el edificio Majestic. Desde el mismo domicilio de la chica desaparecida.\n\nSullivan sintió un escalofrío.\n\n—Vamos a Majestic.',
                options: [
                    { text: 'Comenzar la investigación', next: 2 }
                ]
            },
            
            // CAPÍTULO 2 - OFICINA DE DETECTIVES (MENÚ PRINCIPAL - FASE 1)
            2: {
                title: 'OFICINA DE DETECTIVES · NYPD',
                text: 'Nueva York, 23 de mayo de 1997. 10:30 AM. Oficina de Detectives del NYPD.\n\nSullivan y Furman revisaron las primeras informaciones. El capitán Thomas Reilly los reunió.\n\n—Tenéis dos sospechosos menores de edad, ambos de 15 años. Daphne Abdela, hija adoptiva de un ejecutivo israelí multimillonario, vive en el Majestic, uno de los edificios más exclusivos de Central Park West. Christopher Vásquez, hijo de madre soltera, vive en East Harlem, es monaguillo y boy scout. Son novios desde hace seis semanas [citation:2][citation:8].\n\n—¿Cómo se conocieron?\n\n—Patinando en Central Park [citation:2].\n\n—¿Y qué hacían con McMorrow?\n\n—No lo sabemos. Ambos están en custodia. Ella dice que lo vio todo y que Christopher es el asesino. Él dice que ella lo hizo. Pero hay algo más: a las 12:47, el padre de Daphne llamó denunciando su desaparición. Cuando la policía llegó al edificio, el portero dijo que la chica estaba en la lavandería de la planta baja con un chico. Los agentes abrieron la puerta y los encontraron desnudos en una bañera, lavándose mutuamente [citation:2][citation:5].\n\n—¿Lavándose?\n\n—Sí. Dijeron que habían caído patinando. Pero había sangre en el suelo [citation:4].\n\n—Quiero interrogarlos. Y quiero registrar todo.',
                options: [
                    { text: '🔍 Interrogar a Daphne Abdela', next: 3 },
                    { text: '🔍 Interrogar a Christopher Vásquez', next: 4 },
                    { text: '🏢 Ir al edificio Majestic', next: 5 },
                    { text: '🗽 Inspeccionar la escena del crimen', next: 6 },
                    { text: '👥 Hablar con los padres de Daphne', next: 7 },
                    { text: '📂 Revisar informe de autopsia', next: 8 }
                ]
            },
            
            // CAPÍTULO 3 - INTERROGATORIO DAPHNE
            3: {
                title: 'INTERROGATORIO · DAPHNE ABDELA',
                text: '23 de mayo de 1997. 2:30 PM. Centro de Detención Juvenil Spofford, Bronx.\n\nDaphne Abdela tenía 15 años, pero su mirada era fría y calculadora. Hija adoptiva de Angelo Abdela, vicepresidente de una multinacional de alimentación, y Catherine Abdela, exmodelo francesa [citation:2][citation:3]. Vivía en un ático de 2 millones de dólares en el Majestic, frente a Central Park [citation:3][citation:7].\n\n—No fui yo —dijo nada más sentarse—. Fue Christopher. Yo solo estaba allí.\n\n—Cuéntame qué pasó.\n\n—Estábamos en el parque, bebiendo. Michael se acercó, hablamos. Christopher se puso celoso porque Michael me abrazó para darme calor cuando salí del agua. Sacó una navaja y lo apuñaló. Yo intenté pararlo, pero no pude. Me amenazó con matarme a mí también [citation:1][citation:3].\n\n—¿Y después?\n\n—Me dijo que le ayudara a deshacerse del cuerpo. Que lo destripáramos para que no flotara. Yo no quería, pero tuve miedo.\n\n—¿Quién dio la orden de degollarlo?\n\n—Él.\n\n—¿Y la llamada al 911?\n\n—La hice yo. Para que encontraran el cuerpo. Quería ayudar.\n\nSullivan la observó. No había una sola lágrima.\n\n—Tus padres denunciaron tu desaparición a las 12:47. A la 1:34 llamaste al 911. ¿Dónde estuviste esa hora?\n\n—En casa.\n\n—¿Lavándote la sangre?\n\nDaphne dudó.\n\n—Fui al lavadero. Tenía una herida.\n\n—¿Dónde está la ropa que llevabas?\n\n—No lo sé.\n\nSullivan guardó silencio.\n\n—Mañana hablaremos otra vez.',
                options: [
                    { text: 'Volver a la oficina', next: 2 }
                ],
                onEnter: () => { 
                    marcarInterrogatorio('daphne'); 
                    addItem('confesionDaphne');
                }
            },
            
            // CAPÍTULO 4 - INTERROGATORIO CHRISTOPHER
            4: {
                title: 'INTERROGATORIO · CHRISTOPHER VÁSQUEZ',
                text: '23 de mayo de 1997. 4:30 PM. Centro de Detención Juvenil Spofford, Bronx.\n\nChristopher Vásquez era el opuesto de Daphne. Callado, educado, con ojos de niño asustado. Monaguillo en una iglesia católica, boy scout, estudiante del tradicional colegio privado Beekman. Su madre hacía enormes esfuerzos para pagarle la escuela [citation:1][citation:2][citation:8].\n\n—Yo no lo maté —susurró—. Fue ella.\n\n—Cuéntame.\n\n—Estábamos en el lago. Daphne propuso nadar desnudos. Hacía frío, al salir temblábamos. Michael me dio su chaqueta. Luego abrazó a Daphne para darle calor. Ella se rió. Yo no sentí celos, no sé por qué dice eso. Luego ella sacó una navaja y empezó a apuñalarlo. Yo intenté detenerla, pero no pude [citation:3].\n\n—¿Tú no tocaste el cuchillo?\n\n—No.\n\n—¿Quién ordenó destriparlo?\n\n—Ella. Dijo: "Destriápalo, así no flota". Me obligó a ayudarla a mover el cuerpo. Me amenazó.\n\n—¿Por qué no huiste?\n\n—Tenía miedo. Ella es... no sé cómo explicarlo. Cuando se enfada, da miedo.\n\n—Fuisteis juntos a su edificio. Os lavasteis juntos.\n\n—Ella dijo que teníamos que limpiarnos. Me llevó al lavadero.\n\n—¿Y la sangre en tus manos?\n\nChristopher miró sus manos.\n\n—Intenté pararla. Cuando vi a Michael en el suelo, intenté reanimarlo. Me manché.\n\n—Pero no llamaste a la policía.\n\n—Ella dijo que no. Que si llamábamos, nos mataría.\n\n—¿Tomas algo? ¿Medicación?\n\n—Tomo Zoloft. Por la separación de mis padres. Mi abogado dice que la mezcla con alcohol pudo afectarme [citation:1].\n\nSullivan asintió.\n\n—Mañana seguimos.',
                options: [
                    { text: 'Volver a la oficina', next: 2 }
                ],
                onEnter: () => { 
                    marcarInterrogatorio('christopher'); 
                    addItem('reciboFarmacia');
                }
            },
            
            // CAPÍTULO 5 - EDIFICIO MAJESTIC
            5: {
                title: 'EL EDIFICIO MAJESTIC',
                text: '23 de mayo de 1997. 12:00 PM. 115 Central Park West, edificio Majestic.\n\nEl Majestic era una joya arquitectónica art déco, con vistas privilegiadas a Central Park. Seguridad 24 horas, conserjes, porteros de uniforme. El ático de los Abdela valía 2 millones de dólares [citation:2][citation:7].\n\nEl detective Furman habló con el portero de la noche anterior.\n\n—Sí, vi llegar a Daphne con el chico sobre la 1 de la madrugada —dijo el portero—. Estaban mojados. Fueron directos al área de lavandería, en la planta baja [citation:2].\n\n—¿Los vio entrar al lavadero?\n\n—Sí.\n\n—¿Vio sangre?\n\n—No, pero... ahora que lo dice, el chico llevaba las manos así, como escondiéndolas.\n\nFueron al lavadero. Aún había restos de agua en el suelo. Las huellas de sangre eran tenues, pero el luminol las revelaría después. En un rincón, una toalla manchada de marrón.\n\n—Esto es sangre —dijo el forense.\n\n—Y allí —señaló Furman—, una chaqueta. Parece de hombre.\n\nEra la chaqueta de Michael McMorrow. La había llevado Christopher, la que Michael le prestó para darle calor [citation:4].\n\nSullivan examinó el lugar.\n\n—Daphne conocía este edificio. Sabía que aquí podía limpiarse sin que nadie la viera. Sabía que el portero no la detendría. Esto no fue improvisado del todo.',
                options: [
                    { text: 'Volver a la oficina', next: 2 }
                ],
                onEnter: () => { 
                    marcarLugar('edificioMajestic'); 
                    marcarLugar('lavanderia');
                    addItem('declaracionPortero');
                    addItem('registroLavanderia');
                    addItem('ropaSangrienta');
                }
            },
            
            // CAPÍTULO 6 - ESCENA DEL CRIMEN
            6: {
                title: 'LA ESCENA · CENTRAL PARK',
                text: '23 de mayo de 1997. 9:00 AM. Central Park, orilla del lago.\n\nLos forenses trabajaban alrededor del cuerpo. Sullivan observó los alrededores. El lugar estaba apartado, cerca de una caseta de botes. Perfecto para no ser visto.\n\nEl médico forense se acercó.\n\n—38 puñaladas. Seis de ellas alcanzaron el corazón. Pero lo peor vino después: le cortaron las orejas, la nariz, la mano derecha, y lo destriparon mientras aún respiraba o acababa de morir [citation:2][citation:10].\n\n—¿Con qué arma?\n\n—Un cuchillo de unos 15 centímetros. Filho doble. No lo hemos encontrado.\n\n—¿Y esto?\n\nEl forense mostró una bolsa. Dentro, una billetera.\n\n—La billetera de McMorrow. Estaba a unos metros, entre los arbustos. Sin dinero, pero con documentos. El asesino la arrojó allí.\n\n—¿Huellas?\n\n—Muchas. De los dos, probablemente.\n\n—¿Por qué arrojar la billetera y no quedársela?\n\n—Quizá no querían que pareciera un robo. O quizá solo querían borrar pruebas.\n\nSullivan observó el lago. El cuerpo había sido lastrado con piedras, pero no lo suficiente. Por eso flotó [citation:2].\n\n—"Destriápalo, así no flota" —murmuró—. Alguien sabía algo de anatomía. O había visto demasiadas películas.',
                options: [
                    { text: 'Volver a la oficina', next: 2 }
                ],
                onEnter: () => { 
                    marcarLugar('centralPark'); 
                    addItem('informeAutopsia');
                    addItem('billetera');
                }
            },
            
            // CAPÍTULO 7 - PADRES DE DAPHNE
            7: {
                title: 'LOS PADRES DE DAPHNE',
                text: '23 de mayo de 1997. 5:30 PM. Edificio Majestic, ático de los Abdela.\n\nCatherine y Angelo Abdela los recibieron en un salón decorado con obras de arte y un gran retrato de Leah Rabin, viuda del primer ministro israelí [citation:3][citation:7]. Catherine, exmodelo francesa de 42 años, tenía los ojos hinchados de llorar. Angelo, empresario israelí de 41, mantenía la compostura a duras penas [citation:2].\n\n—Dimos todo lo mejor —dijo Catherine—. Viajes, cultura, libros, más de 300 en su habitación. Nunca quisimos mimarla en exceso, solo darle libertad. Pero cuando empezó a dar problemas, todo se complicó [citation:3][citation:7].\n\n—¿Qué problemas?\n\n—En octavo grado, el Columbia Grammar nos pidió que la sacáramos. Demasiado rebelde. La matriculamos en Loyola, un colegio jesuita muy estricto. Pero solo empeoró. La expulsaron por conducta [citation:2][citation:8].\n\n—¿Drogas? ¿Alcohol?\n\n—Sí. La llevamos a rehabilitación. Fue un par de veces, pero no sirvió.\n\n—Su hija amenazó a alguien esa noche.\n\nAngelo asintió.\n\n—Discutió con unos jóvenes en el parque. Les gritó: "Voy a matar a alguien esta noche" [citation:2][citation:10].\n\n—¿Por qué no nos lo dijo antes?\n\n—Creímos que era una bravuconada. Ella siempre decía cosas así.\n\n—¿Y la orden de alejamiento que solicitó contra su hija?\n\nAngelo enmudeció.\n\n—Hubo momentos... difíciles. Temíamos por nuestra seguridad.\n\nCatherine rompió a llorar.\n\n—No entendemos qué pasó. Dimos todo. Todo.\n\nSullivan guardó silencio.\n\n—Gracias por su colaboración.',
                options: [
                    { text: 'Volver a la oficina', next: 2 }
                ],
                onEnter: () => { 
                    marcarInterrogatorio('angelo'); 
                    marcarInterrogatorio('catherine');
                    addItem('declaracionPadresDaphne');
                    addItem('diarioPersonal');
                }
            },
            
            // CAPÍTULO 8 - INFORME AUTOPSIA
            8: {

        function loadChapter(step) {
            const chap = chapters[step];
            if (!chap) return;

            chapterDisplay.innerText = chap.title;
            novelText.innerText = chap.text;
            if (chap.onEnter) chap.onEnter();

            // Generar opciones dinámicamente
            let availableOptions = chap.options ? [...chap.options] : [];
            
            // Añadir opciones condicionales según el progreso
            if (step === 2) {
                availableOptions = [
                    { text: '🔍 Interrogar a Daphne Abdela', next: 3 },
                    { text: '🔍 Interrogar a Christopher Vásquez', next: 4 },
                    { text: '🏢 Ir al edificio Majestic', next: 5 },
                    { text: '🗽 Inspeccionar la escena del crimen', next: 6 },
                    { text: '👥 Hablar con los padres de Daphne', next: 7 },
                    { text: '📂 Revisar informe de autopsia', next: 8 }
                ];
                
                // Si ya hemos ido a Majestic, podemos hablar con la madre de Christopher
                if (state.lugaresVisitados.edificioMajestic && !state.interrogatorios.madreChristopher) {
                    availableOptions.push({ text: '👩 Hablar con madre de Christopher', next: 9 });
                }
                
                // Si ya tenemos las declaraciones de los padres, podemos registrar casa de Daphne
                if (state.interrogatorios.catherine && !state.lugaresVisitados.casaChristopher) {
                    availableOptions.push({ text: '🔍 Registrar habitación de Daphne', next: 10 });
                }
                
                // Si ya tenemos el registro, pasamos a fase 2
                if (state.lugaresVisitados.casaChristopher && !state.pistas.llamadaRecibida) {
                    availableOptions = [
                        { text: '📞 Investigar llamada al 911', next: 12 },
                        { text: '👥 Hablar con compañeros de colegio', next: 13 },
                        { text: '🔪 Buscar el arma homicida', next: 14 },
                        { text: 'Volver a la oficina', next: 2 }
                    ];
                }
                
                // Si ya tenemos el arma, podemos ver acusaciones
                if (state.pistas.sangreEncontrada && !state.pistas.acusacionesCruzadas) {
                    availableOptions = [
                        { text: '⚖️ Investigar acusaciones cruzadas', next: 15 },
                        { text: 'Volver a la oficina', next: 2 }
                    ];
                }
                
                // Si ya tenemos acusaciones, vamos al acuerdo
                if (state.pistas.acusacionesCruzadas && !state.inventory.confesionDaphne) {
                    availableOptions = [
                        { text: '📝 Ver acuerdo de Daphne', next: 16 },
                        { text: 'Volver a la oficina', next: 2 }
                    ];
                }
                
                // Si ya tenemos confesión, vamos al juicio
                if (state.inventory.confesionDaphne && !state.lugaresVisitados.juzgado) {
                    availableOptions = [
                        { text: '⚖️ Juicio de Christopher', next: 17 },
                        { text: 'Volver a la oficina', next: 2 }
                    ];
                }
            }

            optionsContainer.innerHTML = '';
            availableOptions.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.innerText = opt.text;
                btn.addEventListener('click', (e) => {
                    e.preventDefault();

                    const nextStep = opt.next !== undefined ? opt.next : step + 1;
                    state.step = nextStep;
                    
                    loadChapter(state.step);
                });
                optionsContainer.appendChild(btn);
            });

            inventoryPanel.classList.remove('visible');
        }

        function restartGame() {
            state = {
                step: 1,
                inventory: {
                    informeAutopsia: false,
                    llamada911: false,
                    cuchillo: false,
                    billetera: false,
                    ropaSangrienta: false,
                    declaracionPortero: false,
                    declaracionPadresDaphne: false,
                    declaracionMadreChristopher: false,
                    mensajeTelefonico: false,
                    reciboFarmacia: false,
                    diarioPersonal: false,
                    fotografiaPareja: false,
                    registroLavanderia: false,
                    testimonioCompaneros: false,
                    confesionDaphne: false,
                    ordenRegistro: false
                },
                interrogatorios: {
                    daphne: false,
                    christopher: false,
                    angelo: false,
                    catherine: false,
                    madreChristopher: false
                },
                lugaresVisitados: {
                    centralPark: false,
                    edificioMajestic: false,
                    comisaria: false,
                    casaChristopher: false,
                    lavanderia: false,
                    juzgado: false
                },
                pistas: {
                    llamadaRecibida: false,
                    sangreEncontrada: false,
                    coartadaRota: false,
                    acusacionesCruzadas: false,
                    ordenJudicial: false
                }
            };
            loadChapter(1);
        }

        restartBtn.addEventListener('click', restartGame);
        loadChapter(1);
    })();
