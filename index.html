<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CRÓNICAS DE UN CASO CERRADO · novela completa (18 capítulos + epílogo)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Georgia', 'Times New Roman', serif;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #1a1e24;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px;
        }
        .gamebook {
            max-width: 700px;
            width: 100%;
            background: #2c3e4f;
            border-radius: 40px 40px 28px 28px;
            box-shadow: 0 25px 45px #000000dd;
            border: 2px solid #4a6a8a;
            overflow: hidden;
        }
        .top-bar {
            background: #1e3142;
            padding: 10px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #3f5770;
        }
        .time-section {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .time-bg {
            width: 140px;
            height: 18px;
            background: #1f364a;
            border-radius: 30px;
            border: 1px solid #4a6a8a;
            box-shadow: inset 0 2px 4px #0b1a27;
        }
        .time-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #3e6b9e, #5f9ea0);
            border-radius: 30px;
            transition: width 0.2s;
        }
        .time-number {
            color: #f2e0c0;
            font-weight: 800;
            font-size: 1.4rem;
            min-width: 60px;
            text-shadow: 0 2px 3px black;
        }
        .inventory-button {
            background: #253d53;
            border: 2px solid #6083a8;
            border-radius: 40px;
            padding: 6px 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            box-shadow: 0 4px 0 #102433;
            transition: 0.08s linear;
            touch-action: manipulation;
        }
        .inventory-button:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #102433;
        }
        .inv-icon {
            font-size: 1.8rem;
            color: #ffd78c;
        }
        .inv-text {
            color: white;
            font-weight: 600;
            font-size: 1rem;
        }
        .inventory-panel {
            background: #1d3143;
            border-bottom: 3px solid #4f6f90;
            padding: 16px 20px;
            display: none;
            flex-wrap: wrap;
            gap: 16px 24px;
            align-items: center;
            box-shadow: inset 0 1px 6px #00000055;
        }
        .inventory-panel.visible {
            display: flex;
        }
        .inventory-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            background: #2b4058;
            padding: 10px 15px;
            border-radius: 30px;
            border: 1px solid #769dc9;
            min-width: 90px;
        }
        .item-emoji {
            font-size: 2.5rem;
            filter: drop-shadow(2px 4px 4px black);
        }
        .item-label {
            color: #f0f4fa;
            font-size: 0.9rem;
            font-weight: 600;
            background: #1c3142;
            padding: 4px 12px;
            border-radius: 30px;
            white-space: nowrap;
        }
        .chapter-tag {
            background: #1f3345;
            color: #d7e7ff;
            padding: 12px 22px;
            font-size: 1rem;
            font-weight: 600;
            border-bottom: 2px solid #3b5773;
        }
        .novel-area {
            background: #14222f;
            padding: 32px 28px 40px;
            color: #ecf5ff;
            font-size: 1.18rem;
            line-height: 1.7;
            border-bottom: 2px solid #1f3345;
            max-height: 500px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #527a9e #1c2e3f;
        }
        .novel-area::-webkit-scrollbar {
            width: 8px;
        }
        .novel-area::-webkit-scrollbar-track {
            background: #1c2e3f;
        }
        .novel-area::-webkit-scrollbar-thumb {
            background: #527a9e;
            border-radius: 10px;
        }
        .options-area {
            background: #11212e;
            padding: 24px 22px 28px;
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
            border-top: 2px solid #2a4055;
        }
        .choice-btn {
            background: #263f56;
            border: none;
            border-bottom: 5px solid #102433;
            color: #f5fbff;
            font-size: 1.05rem;
            font-weight: 500;
            padding: 14px 20px;
            border-radius: 50px;
            box-shadow: 0 6px 0 #0d1f2e;
            transition: 0.06s linear;
            cursor: pointer;
            touch-action: manipulation;
            flex: 1 1 180px;
            min-width: 150px;
            text-align: center;
            line-height: 1.3;
        }
        .choice-btn:active {
            transform: translateY(5px);
            border-bottom-width: 2px;
            background: #1d3348;
        }
        .footer {
            background: #1c2b39;
            padding: 14px 20px 16px;
            text-align: center;
            border-top: 2px solid #38536d;
        }
        .restart-btn {
            background: #324252;
            border: 1px solid #7089a8;
            color: #ffefd3;
            padding: 12px 28px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: bold;
            border-bottom: 5px solid #1c2938;
            cursor: pointer;
            display: inline-block;
            min-width: 220px;
        }
        .restart-btn:active {
            transform: translateY(5px);
            border-bottom-width: 2px;
        }
        .footnote {
            color: #5f7c9c;
            font-size: 0.8rem;
            margin-top: 8px;
        }
    </style>
</head>
<body>
<div class="gamebook">
    <div class="top-bar">
        <div class="time-section">
            <div class="time-bg"><div class="time-fill" id="timeFill" style="width:100%"></div></div>
            <div class="time-number" id="timeValue">168h</div>
        </div>
        <div class="inventory-button" id="inventoryToggle">
            <span class="inv-icon">📦</span>
            <span class="inv-text">pruebas</span>
        </div>
    </div>

    <div class="inventory-panel" id="inventoryPanel"></div>

    <div class="chapter-tag" id="chapterDisplay">CAPÍTULO 1 · EL PERIODISTA Y LA VERDAD</div>
    
    <div class="novel-area" id="novelText"></div>

    <div class="options-area" id="optionsContainer"></div>

    <div class="footer">
        <div class="restart-btn" id="restartButton">↻ REINICIAR INVESTIGACIÓN</div>
        <div class="footnote">18 capítulos + epílogo · Caso 0893</div>
    </div>
</div>

<script>
    (function() {
        let state = {
            health: 100,
            maxHealth: 100,
            tiempo: 168,
            step: 1,
            inventory: {
                cartaSilvia: false,
                llave089: false,
                pendrive: false,
                muestrasSangre: false,
                libretaMendoza: false,
                cartaJ: false
            },
            pistas: {
                silviaHablado: false,
                vidalContactado: false,
                enricDetenido: false
            }
        };

        const timeFill = document.getElementById('timeFill');
        const timeValue = document.getElementById('timeValue');
        const chapterDisplay = document.getElementById('chapterDisplay');
        const novelText = document.getElementById('novelText');
        const optionsContainer = document.getElementById('optionsContainer');
        const inventoryPanel = document.getElementById('inventoryPanel');
        const inventoryToggle = document.getElementById('inventoryToggle');
        const restartBtn = document.getElementById('restartButton');

        inventoryToggle.addEventListener('click', (e) => {
            e.preventDefault();
            inventoryPanel.classList.toggle('visible');
            updateInventoryPanel();
        });

        function updateUI() {
            const percent = (state.tiempo / 168) * 100;
            timeFill.style.width = percent + '%';
            timeValue.innerText = state.tiempo + 'h';
            
            if (state.health <= 0) {
                showGameOver();
            }
        }

        function applyDamage(amount) {
            state.health = Math.max(0, state.health - amount);
            if (state.health <= 0) showGameOver();
        }

        function heal(amount) {
            state.health = Math.min(state.maxHealth, state.health + amount);
        }

        function restarTiempo(horas) {
            state.tiempo = Math.max(0, state.tiempo - horas);
            if (state.tiempo <= 0) {
                showTimeOut();
            }
        }

        function addItem(item) {
            if (item === 'cartaSilvia') state.inventory.cartaSilvia = true;
            if (item === 'llave089') state.inventory.llave089 = true;
            if (item === 'pendrive') state.inventory.pendrive = true;
            if (item === 'muestrasSangre') state.inventory.muestrasSangre = true;
            if (item === 'libretaMendoza') state.inventory.libretaMendoza = true;
            if (item === 'cartaJ') state.inventory.cartaJ = true;
            if (inventoryPanel.classList.contains('visible')) updateInventoryPanel();
        }

        function updateInventoryPanel() {
            let html = '<div class="inventory-item"><span class="item-emoji">📋</span><span class="item-label">Caso 0893</span></div>';
            if (state.inventory.cartaSilvia) html += '<div class="inventory-item"><span class="item-emoji">💌</span><span class="item-label">Carta Silvia</span></div>';
            if (state.inventory.llave089) html += '<div class="inventory-item"><span class="item-emoji">🔑</span><span class="item-label">Llave 089</span></div>';
            if (state.inventory.pendrive) html += '<div class="inventory-item"><span class="item-emoji">💾</span><span class="item-label">Pendrive</span></div>';
            if (state.inventory.muestrasSangre) html += '<div class="inventory-item"><span class="item-emoji">🧪</span><span class="item-label">Muestras</span></div>';
            if (state.inventory.libretaMendoza) html += '<div class="inventory-item"><span class="item-emoji">📓</span><span class="item-label">Libreta</span></div>';
            if (state.inventory.cartaJ) html += '<div class="inventory-item"><span class="item-emoji">📄</span><span class="item-label">Carta "J"</span></div>';
            if (html === '<div class="inventory-item"><span class="item-emoji">📋</span><span class="item-label">Caso 0893</span></div>') {
                html = '<div class="inventory-item"><span class="item-emoji">📭</span><span class="item-label">vacío</span></div>';
            }
            inventoryPanel.innerHTML = html;
        }

        function showGameOver() {
            chapterDisplay.innerText = '❌ HAS MUERTO';
            novelText.innerText = 'El cuerpo de Daniel Cross yace en el puerto de Barcelona. El coleccionista ha añadido una pieza más a su macabra colección. El caso 0893 quedará para siempre sin resolver.';
            optionsContainer.innerHTML = '';
        }

        function showTimeOut() {
            chapterDisplay.innerText = '⏰ TIEMPO AGOTADO';
            novelText.innerText = 'Siete días. Daniel ha tenido siete días y no ha conseguido las pruebas suficientes. El archivo del caso 0893 ha sido destruido. El asesino de Mateo Vidal nunca será encontrado.';
            optionsContainer.innerHTML = '';
        }

        const chapters = {
            1: {
                title: 'CAPÍTULO 1 · EL PERIODISTA Y LA VERDAD',
                text: 'Boston, Massachusetts. Despacho del FBI. 10 de marzo de 2025. 9:15 AM.\n\nEl agente especial Daniel Cross llevaba tres meses intentando olvidar Providence cuando el teléfono sonó. No era Sarah Chen. Era un número internacional. De España.\n\n—¿Agente Cross? —la voz era de mujer, joven, con acento español—. Me llamo María Torres. Somos... colegas. Investigamos lo de Tethys juntos, en Providence. ¿Se acuerda de mí?\n\nDaniel la recordaba. La periodista que se coló con él en El Acuario. La que vio la masa de cuerpos fusionados.\n\n—¿Qué pasa, María?\n\n—Barcelona. Un periodista. Amigo mío. Lo han matado. La policía dice que fue suicidio, pero no lo fue. Tenía las mismas marcas. Las mismas que vimos allí.\n\nDaniel sintió un escalofrío.\n\n—¿Mordeduras? ¿En el cuello?\n\n—Sí. Y algo más. Una llave. Encontré una llave que me dejó antes de morir. Abre una taquilla en la Estación de Francia. Dentro hay documentos. Sobre una constructora llamada Prometeo. Y sobre un arquitecto que murió en accidente. Jordi Costa.\n\nDaniel miró el reloj. El próximo vuelo a Barcelona salía en cuatro horas.\n\n—Voy para allá.',
                options: [
                    { text: '✈️ Viajar a Barcelona inmediatamente', tiempo: 6, next: 2 },
                    { text: '📞 Llamar a Sarah Chen antes de ir', tiempo: 1, next: 2 },
                    { text: '🔍 Investigar a Prometeo desde Boston', tiempo: 3, next: 2 }
                ]
            },
            2: {
                title: 'CAPÍTULO 2 · LA LLEGADA',
                text: 'Barcelona, 12 de marzo de 2025. 11:30 AM. Aeropuerto de El Prat.\n\nDaniel cruzó la puerta de llegadas y vio a María esperándole. Había envejecido desde Providence, o quizá era la preocupación. Llevaba una mochila y la misma cámara colgada al cuello.\n\n—Gracias por venir —dijo ella—. No sabía a quién más recurrir.\n\n—Enséñame la llave.\n\nMaría le tendió una pequeña llave metálica con el número 089 grabado. Daniel la examinó mientras caminaban hacia el aparcamiento.\n\n—¿Dónde está la taquilla?\n\n—Estación de Francia. Pero antes quiero que veas algo. El piso de Mateo. Aún está precintado, pero puedo entrar. Conozco al policía que llevó el caso.\n\n—¿El policía cree que fue suicidio?\n\n—Eso dice oficialmente. Extraoficialmente... no está tan seguro.\n\nSubieron a un coche de alquiler y se dirigieron hacia el centro. Barcelona era una ciudad hermosa, pero Daniel no vino a hacer turismo.',
                options: [
                    { text: '🚉 Ir primero a la Estación de Francia', tiempo: 2, next: 3 },
                    { text: '🏢 Ir al piso de Mateo', tiempo: 2, next: 4 },
                    { text: '📞 Hablar con el policía del caso', tiempo: 1, next: 5 }
                ]
            },
            3: {
                title: 'CAPÍTULO 3 · LA TAQUILLA 089',
                text: 'Barcelona, 12 de marzo. 1:30 PM. Estación de Francia.\n\nLa estación era imponente, con techos altos de hierro forjado y butacas de madera que recordaban tiempos pasados. El depósito de taquillas estaba al fondo, en una sala poco iluminada.\n\nDaniel introdujo la llave en la cerradura 089. Giro. La puerta se abrió.\n\nDentro había una carpeta marrón, gruesa, llena de papeles. Daniel la cogió y la abrió sobre un banco cercano. María se acercó a mirar.\n\n—Esto es... —murmuró ella—. Es el informe de Jordi Costa. El arquitecto que murió.\n\nDaniel hojeó los documentos. Análisis de sangre, informes médicos, fotografías. Y entonces las vio. Las marcas en el cuello. Las mismas. Pequeñas mordeduras circulares.\n\n—Igual que en Providence —dijo.\n\n—Sí. Y mira esto.\n\nMaría señaló un documento al final de la carpeta. Era un listado de transferencias bancarias. Grandes cantidades de dinero moviéndose desde una cuenta de Prometeo a paraísos fiscales. Y al lado, nombres. Políticos. Empresarios.\n\n—Sobornos —dijo Daniel.\n\n—Eso creo. Y Mateo lo descubrió. Por eso lo mataron.',
                options: [
                    { text: '🔍 Investigar a Prometeo', tiempo: 3, next: 5 },
                    { text: '🏥 Ir al hospital donde trataron a Jordi', tiempo: 2, next: 6 },
                    { text: '📞 Contactar con algún político de la lista', tiempo: 2, next: 7 }
                ],
                onEnter: () => { addItem('pendrive'); }
            },
            4: {
                title: 'CAPÍTULO 4 · EL PISO DE MATEO',
                text: 'Barcelona, 12 de marzo. 2:00 PM. Calle de la Diputación, 243.\n\nEl piso de Mateo olía a cerrado, a muerte reciente, a papel viejo. Daniel recorrió las habitaciones mientras María le explicaba.\n\n—Era meticuloso. Guardaba todo. Sus investigaciones, sus entrevistas, sus sospechas. Si algo le preocupaba, lo apuntaba.\n\nEn el dormitorio, Daniel encontró una libreta en la mesilla. La abrió. Las últimas páginas estaban escritas con letra temblorosa, como de quien tiene miedo.\n\n"Me siguen. Lo sé. Desde que empecé con lo de Prometeo, noto que alguien me observa. Ayer vi un coche negro aparcado frente al portal. Hoy ha vuelto. He hablado con Silvia, mi exmujer. Le he dicho que si me pasa algo, que hable con Vicente. Él sabe más."\n\nDaniel guardó la libreta.\n\n—¿Quién es Silvia? —preguntó.\n\n—Su exmujer. Vive en Barcelona. Podemos hablar con ella.\n\n—Y Vicente.\n\n—Vicente Márquez. El editor del periódico. También... también fue amante de Mateo. Durante un tiempo.',
                options: [
                    { text: '👩 Hablar con Silvia', tiempo: 2, next: 8 },
                    { text: '📰 Hablar con Vicente Márquez', tiempo: 2, next: 9 },
                    { text: '🔍 Seguir registrando el piso', tiempo: 3, next: 4 }
                ],
                onEnter: () => { addItem('libretaMendoza'); }
            },
            5: {
                title: 'CAPÍTULO 5 · EL POLICÍA',
                text: 'Barcelona, 12 de marzo. 5:00 PM. Cafetería del centro.\n\nIgnacio Vidal llegó puntual. Era un hombre de unos cincuenta años, con aspecto cansado y ojos que habían visto demasiado. Detective de los Mossos d\'Esquadra.\n\n—Agente Cross —dijo, sentándose—. María me ha hablado de usted. Del caso de Providence. Dice que vieron cosas... raras.\n\n—Cosas que no deberían existir —respondió Daniel—. Y creo que aquí está pasando lo mismo.\n\nVidal asintió.\n\n—Yo investigué la muerte de Mateo. Y la de Jordi Costa, el arquitecto. Oficialmente, accidente y suicidio. Pero no me lo creí. Las marcas en los cuellos... no son normales. Las envié a analizar. El laboratorio dijo que eran mordeduras. Pero de qué, no supieron decirme.\n\n—¿Tiene acceso a los informes?\n\n—Los tengo. Y también tengo algo más. Una dirección. Una nave en el polígono de la Zona Franca. Propiedad de una empresa fantasma. La misma empresa que aparece en los papeles de Mateo.\n\nDaniel sintió que el corazón se aceleraba.\n\n—¿Podemos entrar?\n\n—Podemos intentarlo. Pero será peligroso. Si lo que sospecho es cierto, hay gente muy poderosa detrás de todo esto.',
                options: [
                    { text: '🚗 Ir a la nave del polígono', tiempo: 3, next: 10 },
                    { text: '🔍 Pedir los informes a Vidal', tiempo: 1, next: 6 },
                    { text: '🤝 Confiar en Vidal y mostrarle las pruebas', tiempo: 2, next: 7 }
                ]
            },
            6: {
                title: 'CAPÍTULO 6 · EL HOSPITAL',
                text: 'Barcelona, 13 de marzo. 10:00 AM. Hospital Clínic.\n\nLa doctora Anna Rius era la jefa de toxicología. Una mujer de treinta y ocho años, seria, con mirada inteligente. Recibió a Daniel y María en su laboratorio.\n\n—El detective Vidal me dijo que vendrían —dijo—. Supongo que es por el caso Costa.\n\n—Sí. ¿Usted lo trató?\n\n—Analicé sus muestras de sangre. Encontré algo muy extraño. Un compuesto que no reconocí. Lo envié a Estados Unidos, al FBI. Me respondió un tal agente Cross.\n\nDaniel la miró fijamente.\n\n—Ese agente soy yo.\n\nAnna Rius se sorprendió.\n\n—¿Usted? ¿El mismo?\n\n—El mismo. Y sé lo que era ese compuesto. Un prión modificado. Lo llamaban... el coleccionista.\n\n—¿Coleccionista?\n\n—Alguien que colecciona personas. Las convierte en... otra cosa. ¿Guardó las muestras?\n\nAnna dudó un momento. Luego asintió.\n\n—Las guardé. En secreto. Por si alguien preguntaba.',
                options: [
                    { text: '💉 Recoger las muestras', tiempo: 1, next: 7 },
                    { text: '🔬 Analizarlas aquí mismo', tiempo: 3, next: 7 },
                    { text: '📞 Llamar a Sarah Chen para que las revise', tiempo: 1, next: 7 }
                ],
                onEnter: () => { addItem('muestrasSangre'); }
            },
            7: {
                title: 'CAPÍTULO 7 · LAS CONEXIONES',
                text: 'Barcelona, 13 de marzo. 8:00 PM. Hotel de Daniel.\n\nEsa noche, Daniel extendió todas las pruebas sobre la cama: los papeles de la taquilla, la libreta de Mateo, los informes de Anna Rius, las transferencias bancarias. María tomaba notas.\n\n—Hay un patrón —dijo ella—. Todas las víctimas tienen relación con Prometeo. Mateo los investigaba. Jordi Costa trabajaba para ellos. Y los sobornos... llegan muy alto.\n\n—Pero el móvil no es solo económico. Las marcas, el prión... eso es otra cosa.\n\n—¿Crees que tiene que ver con lo de Providence?\n\nDaniel recordó la masa de cuerpos fusionados en el tanque. Los gemidos. Las voces.\n\n—Lo sé. La pregunta es: ¿quién trajo eso a Barcelona? ¿Quién está detrás?\n\nEl móvil de Daniel sonó. Era Vidal.\n\n—Cross —dijo el detective—. He conseguido acceso a la nave. Podemos entrar mañana al amanecer. Pero hay algo que debe saber.\n\n—Diga.\n\n—He investigado a los propietarios de la nave. Es una empresa fantasma, pero tras ella hay un nombre. Un hombre. Álvaro Mendoza. Empresario. Muy rico. Muy poderoso.\n\n—¿Y qué tiene que ver con todo esto?\n\n—Mendoza fue socio de Tethys Europa. Hace veinte años. Cuando la matriz quebró, él desapareció. Y ahora ha vuelto.',
                options: [
                    { text: '🌅 Ir a la nave al amanecer', tiempo: 6, next: 10 },
                    { text: '🔍 Investigar a Álvaro Mendoza', tiempo: 3, next: 11 },
                    { text: '📞 Contactar con la policía financiera', tiempo: 2, next: 9 }
                ]
            },
            8: {
                title: 'CAPÍTULO 8 · LA EXMUJER',
                text: 'Barcelona, 14 de marzo. 11:00 AM. Café del Eixample.\n\nSilvia llegó puntual. Cuarenta años, morena, bien vestida, con ojeras profundas. Aceptó un café y lo dejó enfriar sin beberlo.\n\n—Mateo y yo nos divorciamos hace cinco años —dijo—. Pero manteníamos contacto. Era el padre de mi hija, aunque la niña vive conmigo.\n\n—¿Cuándo habló con él por última vez?\n\n—Una semana antes de morir. Estaba asustado. Me dijo que si le pasaba algo, que buscara en su piso. Que había algo escondido.\n\n—¿Algo? ¿Qué?\n\n—No lo sé. Solo dijo: "detrás del cuadro".\n\nDaniel y María se miraron.\n\n—¿Sabe quién podría querer matarlo?\n\nSilvia dudó.\n\n—Vicente. El editor. Tuvieron una relación mientras estábamos casados. Mateo lo dejó, pero Vicente no lo superó. Le escribía cartas, le llamaba, le acosaba. Y cuando Mateo empezó a investigar a Prometeo, Vicente intentó detenerlo. Le ofreció dinero, un ascenso, lo que fuera. Mateo no aceptó.\n\n—¿Cree que Vicente pudo...?\n\n—No lo sé. Pero algo me dice que no es tan inocente como parece.',
                options: [
                    { text: '🏢 Ir al periódico a ver a Vicente', tiempo: 2, next: 9 },
                    { text: '🔍 Volver al piso de Mateo', tiempo: 2, next: 4 },
                    { text: '📞 Llamar a Vidal para contarle esto', tiempo: 1, next: 7 }
                ]
            },
            9: {
                title: 'CAPÍTULO 9 · EL EDITOR',

        function loadChapter(step) {
            if (state.tiempo <= 0) {
                showTimeOut();
                return;
            }
            if (state.health <= 0) {
                showGameOver();
                return;
            }

            const chap = chapters[step];
            if (!chap) return;

            chapterDisplay.innerText = chap.title;
            novelText.innerText = chap.text;
            if (chap.onEnter) chap.onEnter();

            optionsContainer.innerHTML = '';
            chap.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.innerText = opt.text;
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    if (opt.tiempo) restarTiempo(opt.tiempo);
                    
                    if (state.tiempo <= 0) {
                        showTimeOut();
                        return;
                    }
                    if (state.health <= 0) return;

                    if (opt.final) {
                        restartGame();
                        return;
                    }

                    const nextStep = opt.next !== undefined ? opt.next : step + 1;
                    state.step = nextStep;
                    loadChapter(state.step);
                });
                optionsContainer.appendChild(btn);
            });

            updateUI();
            inventoryPanel.classList.remove('visible');
        }

        function restartGame() {
            state = {
                health: 100,
                maxHealth: 100,
                tiempo: 168,
                step: 1,
                inventory: {
                    cartaSilvia: false,
                    llave089: false,
                    pendrive: false,
                    muestrasSangre: false,
                    libretaMendoza: false,
                    cartaJ: false
                },
                pistas: {
                    silviaHablado: false,
                    vidalContactado: false,
                    enricDetenido: false
                }
            };
            loadChapter(1);
        }

        restartBtn.addEventListener('click', restartGame);
        loadChapter(1);
    })();
