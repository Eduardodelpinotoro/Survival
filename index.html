<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AGUA NEGRA · novela interactiva</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: #0b0f12;
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px;
        }
        .game-container {
            width: 100%;
            max-width: 500px;
            background: #1a1e24;
            border-radius: 32px 32px 24px 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), inset 0 1px 2px rgba(255,255,255,0.05);
            overflow: hidden;
            border: 1px solid #2f3640;
        }
        .status-bar {
            background: #0f1217;
            padding: 18px 20px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 2px solid #2a2f38;
        }
        .health-wrap {
            flex: 1;
            background: #262c34;
            height: 22px;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: inset 0 2px 4px #00000055;
            border: 1px solid #3d4550;
        }
        .health-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ac2f2f, #da4a4a);
            border-radius: 40px;
            transition: width 0.3s ease;
        }
        .health-text {
            color: #f0e6d2;
            font-weight: 700;
            font-size: 1.2rem;
            min-width: 60px;
            text-shadow: 0 2px 3px black;
        }
        .chapter-badge {
            background: #2b333d;
            color: #b9c7d9;
            padding: 8px 16px;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 1px;
            border-bottom: 1px solid #405161;
            text-align: center;
            text-transform: uppercase;
        }
        .novel-panel {
            background: #21262e;
            min-height: 280px;
            padding: 24px 20px;
            color: #dde3ed;
            line-height: 1.6;
            font-size: 1.1rem;
            border-bottom: 3px solid #101318;
            box-shadow: inset 0 -8px 12px #00000030;
        }
        .novel-text {
            margin: 0 0 12px 0;
            text-shadow: 0 1px 2px black;
        }
        .scene-image {
            width: 100%;
            height: 130px;
            background: #12161c;
            border-radius: 14px;
            margin-top: 16px;
            background-image: linear-gradient(145deg, #19232e 0%, #0d121b 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #5b6f89;
            font-size: 2.4rem;
            border: 1px solid #334152;
            box-shadow: 0 6px 0 #0a0d11;
        }
        .options-area {
            background: #151b22;
            padding: 24px 16px 30px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .action-btn {
            background: #26323f;
            border: none;
            border-bottom: 4px solid #121b24;
            color: #e9f2fa;
            font-size: 1.25rem;
            font-weight: 600;
            padding: 18px 18px;
            border-radius: 60px;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 6px 0 #0f151d;
            transition: all 0.08s linear;
            width: 100%;
            cursor: pointer;
            touch-action: manipulation;
        }
        .action-btn:active {
            transform: translateY(4px);
            border-bottom-width: 2px;
            background: #1f2b37;
        }
        .action-btn span:first-child {
            background: #0e1b26;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 40px;
            font-size: 1.8rem;
            border: 1px solid #3f5568;
            box-shadow: inset 0 -2px 0 #0b1219;
        }
        .game-overlay {
            background: #1e2630;
            border-radius: 20px;
            margin: 8px 16px 16px;
            padding: 10px 16px;
            color: #cbd5e1;
            display: flex;
            gap: 12px;
            align-items: center;
            border: 1px solid #3d4a5a;
        }
        .inventory {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .item {
            background: #2b3847;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 600;
            border: 1px solid #4f637b;
            color: #cfdef5;
        }
        .restart-btn {
            background: #3a2c2c;
            color: #f0c9c9;
            border: 1px solid #7a4f4f;
            padding: 12px 18px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
            text-align: center;
            margin: 0 16px 20px;
            cursor: pointer;
            border-bottom: 3px solid #3f2626;
        }
        .restart-btn:active {
            transform: translateY(3px);
            border-bottom-width: 1px;
        }
        .footnote {
            text-align: center;
            color: #556b7c;
            font-size: 0.8rem;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="game-container" id="gameContainer">
        <div class="status-bar">
            <div class="health-wrap">
                <div class="health-fill" id="healthFill" style="width: 100%"></div>
            </div>
            <div class="health-text" id="healthValue">100</div>
        </div>
        <div class="chapter-badge" id="chapterDisplay">PRÓLOGO · AGUA NEGRA</div>
        <div class="novel-panel" id="novelPanel">
            <div class="novel-text" id="novelText">
                Providence, 10 de octubre. El agente Daniel Cross recibe una llamada de la forense Sarah Chen...
            </div>
            <div class="scene-image" id="sceneEmoji">🌊📞🕵️</div>
        </div>
        <div class="options-area" id="optionsArea"></div>
        <div class="game-overlay">
            <span style="font-size:1.4rem;">🎒</span>
            <div class="inventory" id="inventoryContainer">
                <span class="item">🔍 caso 0/4</span>
                <span class="item">📄 pista</span>
            </div>
        </div>
        <div class="restart-btn" id="restartBtn">↻ REINICIAR INVESTIGACIÓN</div>
        <div class="footnote">basado en la novela "AGUA NEGRA" · 25 capítulos</div>
    </div>

    <script>
        (function() {
            // ---------- ESTADO DE JUEGO ----------
            let state = {
                health: 100,
                maxHealth: 100,
                step: 'prologo',        // identificador de escena
                inventory: {
                    key: false,
                    fotoTethys: true,    // la tiene desde el principio
                    libretaWebb: false,
                    cartaAlice: false,
                    piezasDescubiertas: 0,
                },
                chapter: 0,
                // variables de la historia
                mossEncountered: false,
                raymondSaved: false,
                acuarioAbierto: false,
                mariaPresente: false,
                muerteEvitada: false,
                confesorHablo: false,
            };

            // ---------- HELPER: DAÑO Y MUERTE ----------
            function applyDamage(amount) {
                state.health = Math.max(0, state.health - amount);
                updateUI();
                if (state.health <= 0) {
                    state.step = 'gameover';
                    renderScene();
                }
            }

            function heal(amount) {
                state.health = Math.min(state.maxHealth, state.health + amount);
                updateUI();
            }

            function addItem(item) {
                if (item === 'libreta') state.inventory.libretaWebb = true;
                if (item === 'carta') state.inventory.cartaAlice = true;
                if (item === 'key') state.inventory.key = true;
                if (item === 'pista') state.inventory.piezasDescubiertas = (state.inventory.piezasDescubiertas || 0) + 1;
                updateUI();
            }

            // actualizar barras/inventario
            function updateUI() {
                const healthPercent = (state.health / state.maxHealth) * 100;
                document.getElementById('healthFill').style.width = healthPercent + '%';
                document.getElementById('healthValue').innerText = state.health;

                let invHtml = '';
                if (state.inventory.fotoTethys) invHtml += '<span class="item">📸 Tethys</span>';
                if (state.inventory.libretaWebb) invHtml += '<span class="item">📒 libreta 089</span>';
                if (state.inventory.cartaAlice) invHtml += '<span class="item">✉️ carta Alice</span>';
                if (state.inventory.key) invHtml += '<span class="item">🗝️ llave</span>';
                if (state.inventory.piezasDescubiertas > 0) invHtml += `<span class="item">🧩 piezas ${state.inventory.piezasDescubiertas}</span>`;
                if (invHtml === '') invHtml = '<span class="item">🔍 solo pistas</span>';
                document.getElementById('inventoryContainer').innerHTML = invHtml;
            }

            // ---------- ESCENAS (nodos) ----------
            const scenes = {
                prologo: {
                    title: 'PRÓLOGO · BOSTON',
                    text: '10 oct 2024, 9:15 AM. La forense Sarah Chen te muestra un cadáver con extrañas marcas en el cuello. En su bolsillo, una foto de las instalaciones de Tethys Biotech en Providence. Tu mentor, Raymond Vance, desapareció investigando esa empresa hace 5 años.',
                    emoji: '🕵️‍♂️📸⚰️',
                    options: [
                        { text: '🔍 Examinar marcas', action: 'marcas', damage: 0 },
                        { text: '📞 Llamar a Sarah (hermana)', action: 'llamarSarah', damage: 5 },  // opción trampa, le quita vida (angustia)
                        { text: '🚗 Ir a Providence ya', action: 'irProvidence', damage: 0 },
                    ]
                },
                marcas: {
                    title: 'MARCAS EXTRAÑAS',
                    text: 'Las pequeñas mordeduras en el cuello son idénticas a las que Raymond describió en sus notas. Reconoces el compuesto: un prión artificial. Algo dentro de ti se remueve. La foto de Tethys quema en tu mano.',
                    emoji: '🔬🩸🧬',
                    options: [
                        { text: '📁 Revisar archivos de Raymond', action: 'archivos', damage: 0 },
                        { text: '💊 Analizar sangre (lleva horas)', action: 'analizarSangre', damage: 15 }, // perder tiempo / vida
                        { text: '🚁 Contactar a detective Rosas', action: 'contactarRosas', damage: 0 },
                    ]
                },
                archivos: {
                    title: 'CASO RAYMOND',
                    text: 'Entre los papeles encuentras una nota: "Si algo me pasa, busca a Julian Moss. Colecciona personas. Investiga El Acuario." También el nombre de Carlos Méndez, vigilante.',
                    emoji: '📂👤🔐',
                    options: [
                        { text: '🔑 Llamar a Carlos Méndez', action: 'carlos', damage: 0 },
                        { text: '🕯️ Visitar la iglesia de Lynn', action: 'iglesiaLynn', damage: 0 },
                        { text: '🌃 Ir de noche al puerto', action: 'nochePuerto', damage: 20 }, // peligro
                    ]
                },
                iglesiaLynn: {
                    title: 'CONFESIONARIO',
                    text: 'El padre Miguel Ángel te muestra un cadáver con las mismas marcas. El hombre susurró antes de morir: "El coleccionista viene a por mí, soy la pieza 089". Te da su libreta.',
                    emoji: '⛪📖😨',
                    options: [
                        { text: '🙏 Leer la libreta (pistas)', action: 'leerLibreta', damage: 0 },
                        { text: '🚔 Avisar a policía de Salem', action: 'avisoSalem', damage: 5 },
                        { text: '🔦 Entrar al confesionario', action: 'entrarConfe', damage: 15 },
                    ],
                    onEnter: () => { addItem('libreta'); state.inventory.libretaWebb = true; }
                },
                leerLibreta: {
                    title: 'LIBRETA 089',
                    text: 'Anotaciones de Thomas Webb: "Moss tiene un laboratorio en el sótano 4 del Acuario. Me inyectó el prión. Me escapé pero me busca."',
                    emoji: '📝🧪🏚️',
                    options: [
                        { text: '🏃 Ir al puerto de Providence', action: 'irProvidence', damage: 0 },
                        { text: '🧴 Buscar antídoto en Danvers', action: 'danvers', damage: 0 },
                    ],
                },
                danvers: {
                    title: 'HOSPITAL DANVERS',
                    text: 'Encuentras a la doctora Alice Monroe muerta, con una carta: "Moss sabe que vienes. Cuida tu salud, el prión acecha." Sientes escalofríos, pierdes algo de vitalidad.',
                    emoji: '🏥📜👻',
                    options: [
                        { text: '🧪 Registrar laboratorio', action: 'registroLab', damage: 0 },
                        { text: '💔 Leer carta (angustia)', action: 'cartaAngustia', damage: 10 },
                    ],
                    onEnter: () => { addItem('carta'); }
                },
                irProvidence: {
                    title: 'PROVIDENCE · MUELLE 7',
                    text: 'Conoces a Carlos Méndez, el vigilante. Su hijo José desapareció en El Acuario. Te da las llaves y una pistola. "Tenga cuidado, allí hay cosas que no deberían existir."',
                    emoji: '⚓🗝️🔫',
                    options: [
                        { text: '🏢 Entrar de día (sigilo)', action: 'entrarDia', damage: 0 },
                        { text: '🌙 Entrar de noche (peligro)', action: 'entrarNoche', damage: 20 },
                        { text: '👥 Buscar a María Torres', action: 'buscarMaria', damage: 0 },
                    ],
                    onEnter: () => { state.acuarioAbierto = true; }
                },
                buscarMaria: {
                    title: 'PERIODISTA',
                    text: 'María Torres, periodista, te convence para entrar juntos. Tiene información sobre Moss. Te da una botella de agua (restauras 10).',
                    emoji: '📰👩‍💼💧',
                    options: [
                        { text: '💧 Beber agua (+10 salud)', action: 'beberAgua', damage: -10 },
                        { text: '🤝 Entrar juntos al Acuario', action: 'entrarDia', damage: 0 },
                    ],
                    onEnter: () => { state.mariaPresente = true; }
                },
                entrarDia: {
                    title: 'EL ACUARIO · SÓTANO 1',
                    text: 'Penetran por la puerta trasera. Cadáveres con chapas numeradas. Encuentran la nota de José Méndez: "Papá, perdón." Moss ha estado usando a la gente como piezas.',
                    emoji: '🏚️⚰️🔢',
                    options: [
                        { text: '⬇️ Bajar al sótano 2', action: 'sotano2', damage: 0 },
                        { text: '📸 Documentar (invertir tiempo)', action: 'documentar', damage: 8 },
                        { text: '🔦 Buscar a Raymond', action: 'buscarRaymond', damage: 0 },
                    ],
                },
                sotano2: {
                    title: 'SÓTANO 2 · TANQUE',
                    text: 'Un enorme tanque oceánico seco. Decenas de "piezas" inmóviles, como estatuas. Entre ellas, una figura conocida... Raymond está vivo, pero con mirada vacía.',
                    emoji: '💧🧟‍♂️😵',
                    options: [
                        { text: '❤️‍🩹 Acercarse a Raymond', action: 'acercarRaymond', damage: 0 },
                        { text: '⚔️ Enfrentar a Moss (directo)', action: 'enfrentarMoss', damage: 40 }, // muy peligroso
                    ],
                },
                acercarRaymond: {
                    title: 'PIEZA 071',
                    text: 'Raymond susurra: "Danny, vete... él te espera. Me inyectó el prión, ya no soy yo." De repente Moss aparece: "Bienvenido, agente. ¿Quieres salvar a tu mentor? Tendrás que sacrificar algo."',
                    emoji: '👴🤲😈',
                    options: [
                        { text: '💉 Inyectarte antídoto (arriesgas)', action: 'inyectarAnti', damage: 25 },
                        { text: '🔫 Disparar a Moss', action: 'dispararMoss', damage: 0 },
                        { text: '🏃 Huir con Raymond', action: 'huirConRay', damage: 30 },
                    ],
                },
                dispararMoss: {
                    title: 'ENFRENTAMIENTO',
                    text: 'Moss esquiva y activa el mecanismo del tanque. Raymond, controlado, te ataca. No tienes opción, le disparas. Raymond muere en tus brazos. El dolor te destroza, pero Moss huye al nivel -4.',
                    emoji: '💔🔫😢',
                    options: [
                        { text: '⬇️ Bajar al nivel -4', action: 'nivel4', damage: 0 },
                        { text: '🩹 Curarte heridas (+10)', action: 'curarHeridas', damage: -10 },
                    ],
                },
                nivel4: {
                    title: 'CORAZÓN DEL MONSTRUO',
                    text: 'Moss está junto a un tanque con una masa de carne fusionada. "Mi colección completa, pronto serás parte de ella". Ves una jeringa con antídoto.',
                    emoji: '🧪👹💉',
                    options: [
                        { text: '💪 Luchar por el antídoto', action: 'lucharAnti', damage: 0 },
                        { text: '🧨 Romper el tanque', action: 'romperTanque', damage: 0 },
                    ],
                },
                lucharAnti: {
                    title: 'SALUD O MUERTE',
                    text: 'Moss te clava una aguja infectada. Sientes el frío del prión. Pero logras arrebatarle el antídoto e inyectártelo a tiempo. Moss queda atrapado en la sala inundada.',
                    emoji: '💊🌊😈',
                    options: [
                        { text: '🚪 Escapar con vida', action: 'escaparFinal', damage: 0 },
                    ],
                    onEnter: () => { applyDamage(20); state.muerteEvitada = true; }
                },
                romperTanque: {
                    title: 'AGONÍA',
                    text: 'Estrellas el cristal, el agua negra inunda todo. Las piezas se derrumban. Moss se ahoga entre los restos de su colección. Logras nadar hacia la superficie, exhausto.',
                    emoji: '💧🏊‍♂️🌫️',
                    options: [
                        { text: '🏁 Sobrevivir', action: 'escaparFinal', damage: 0 },
                    ],
                },
                escaparFinal: {
                    title: 'AMANECER · EPÍLOGO',
                    text: 'Sales del Acuario justo cuando el sol tiñe el puerto. Carlos Méndez te abraza. María sobrevive. Raymond descansa. La herida sigue, pero el caso está cerrado. Has sobrevivido.',
                    emoji: '🌅🕊️🪦',
                    options: [
                        { text: '🔁 Volver a jugar', action: 'restart', damage: 0 },
                    ],
                },
                gameover: {
                    title: 'HAS MUERTO',
                    text: 'El coleccionista sumó una pieza más. Tu cuerpo yace en el agua negra del Acuario...',
                    emoji: '💀⚰️🌑',
                    options: [
                        { text: '🔄 REINTENTAR', action: 'restart', damage: 0 },
                    ]
                },
                // rutas de daño / muerte rápida
                llamarSarah: { title: 'LLAMADA ANGUSTIOSA', text: 'Tu hermana nota tu voz tensa y se preocupa. Cuelgas, pero la ansiedad te consume. (pierdes 5 de salud)', emoji: '📞😰', options: [ { text: 'Continuar', action: 'prologo', damage: 0 } ] },
                analizarSangre: { title: 'HORAS PERDIDAS', text: 'Pasas la noche en el laboratorio. El prión se ha extendido en tu organismo. Daño por fatiga.', emoji: '🧪🥱', options: [ { text: 'Seguir', action: 'prologo', damage: 0 } ] },
                nochePuerto: { title: 'EMBOSCADA', text: 'En la oscuridad del puerto, unas "piezas" te atacan. Logras huir, pero estás herido.', emoji: '🌃👥🔪', options: [ { text: 'Sobrevivir', action: 'irProvidence', damage: 0 } ] },
                entrarNoche: { title: 'NOCHE EN EL ACUARIO', text: 'Las criaturas de Moss te rodean. Recibes múltiples mordeduras. 20 de daño.', emoji: '🧟🌙🩸', options: [ { text: 'Seguir', action: 'sotano2', damage: 0 } ] },
                avisoSalem: { title: 'SALEM', text: 'El detective Ramos te recibe, pero pierdes tiempo vital.', emoji: '👮‍♂️⏳', options: [ { text: 'Continuar', action: 'irProvidence', damage: 0 } ] },
                entrarConfe: { title: 'MALDICIÓN', text: 'El confesionario se derrumba parcialmente. Te golpeas.', emoji: '🪵🤕', options: [ { text: 'Seguir', action: 'iglesiaLynn', damage: 0 } ] },
                cartaAngustia: { title: 'PRESIÓN', text: 'Leer los últimos pensamientos de Alice te perturba.', emoji: '💔📄', options: [ { text: 'Continuar', action: 'irProvidence', damage: 0 } ] },
                documentar: { title: 'DOCUMENTANDO', text: 'Las fotografías consumen tu energía.', emoji: '📸😩', options: [ { text: 'Continuar', action: 'sotano2', damage: 0 } ] },
                enfrentarMoss: { title: 'PRECIPITACIÓN', text: 'Moss desata a sus piezas. Recibes un fuerte golpe.', emoji: '👊🧟', options: [ { text: 'Continuar', action: 'acercarRaymond', damage: 0 } ] },
                huirConRay: { title: 'HUIDA', text: 'Raymond forcejea, te lastima sin querer. 30 de daño.', emoji: '🏃💥', options: [ { text: 'Continuar', action: 'nivel4', damage: 0 } ] },
                inyectarAnti: { title: 'ANTÍDOTO DUDOSO', text: 'El antídoto de Moss era impuro, daña tus células.', emoji: '💉🤢', options: [ { text: 'Continuar', action: 'nivel4', damage: 0 } ] },
                curarHeridas: { title: 'VENDAS DE EMERGENCIA', text: 'Usas tela para contener la hemorragia. +10 salud.', emoji: '🩹❤️', options: [ { text: 'Continuar', action: 'nivel4', damage: 0 } ] },
                beberAgua: { title: 'AGUA', text: 'El agua fresca te reanima.', emoji: '💧😌', options: [ { text: 'Continuar', action: 'entrarDia', damage: 0 } ] },
                registroLab: { title: 'LABORATORIO', text: 'Encuentras una jeringa con calmante. Te sientes mejor.', emoji: '💉🩺', options: [ { text: 'Continuar', action: 'irProvidence', damage: 0 } ] },
                contactarRosas: { title: 'DETECTIVE ROSAS', text: 'Elena te da información valiosa sobre el puerto.', emoji: '👩‍✈️🗂️', options: [ { text: 'Continuar', action: 'irProvidence', damage: 0 } ] },
                carlos: { title: 'CARLOS MÉNDEZ', text: 'Quedas con él en el muelle.', emoji: '👴🗝️', options: [ { text: 'Ir al muelle', action: 'irProvidence', damage: 0 } ] },
            };

            // ---------- RENDERIZAR ESCENA ----------
            function renderScene() {
                const scene = scenes[state.step] || scenes.prologo;
                document.getElementById('chapterDisplay').innerText = scene.title || 'AGUA NEGRA';
                document.getElementById('novelText').innerText = scene.text;
                document.getElementById('sceneEmoji').innerText = scene.emoji || '🌊';

                // aplicar daño/heal definido en cada opción ANTES de mostrar botones? pero se procesa al hacer click.
                // mostrar botones
                const optionsArea = document.getElementById('optionsArea');
                optionsArea.innerHTML = '';
                scene.options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'action-btn';
                    const spanIcon = document.createElement('span');
                    spanIcon.innerText = opt.text.charAt(0) + (opt.text.includes('🔍')?'🔍':(opt.text.includes('📞')?'📞':(opt.text.includes('🚗')?'🚗':'📌')));
                    spanIcon.innerText = opt.text.substring(0,2); // mejora
                    btn.innerHTML = `<span>${opt.text.slice(0,2) || '🔹'}</span>${opt.text}`;
                    btn.addEventListener('click', (e) => {
                        e.preventDefault();
                        // aplicar daño si la opción lo tiene
                        if (opt.damage > 0) {
                            applyDamage(opt.damage);
                        } else if (opt.damage < 0) {
                            heal(-opt.damage);
                        }
                        // navegar a nueva escena
                        if (opt.action === 'restart') {
                            restartGame();
                            return;
                        }
                        // transiciones
                        let nextStep = opt.action;
                        if (scenes[nextStep]) {
                            state.step = nextStep;
                            if (scenes[nextStep].onEnter) scenes[nextStep].onEnter();
                        } else {
                            // si es una acción simple sin escena propia, redirigir a algo coherente
                            if (nextStep === 'irProvidence') state.step = 'irProvidence';
                            else if (nextStep === 'sotano2') state.step = 'sotano2';
                            else if (nextStep === 'buscarRaymond') state.step = 'acercarRaymond';
                            else state.step = 'prologo';
                        }
                        renderScene();
                        updateUI();
                    });
                    optionsArea.appendChild(btn);
                });

                updateUI();
            }

            function restartGame() {
                state = {
                    health: 100,
                    maxHealth: 100,
                    step: 'prologo',
                    inventory: { key: false, fotoTethys: true, libretaWebb: false, cartaAlice: false, piezasDescubiertas: 0 },
                    chapter: 0,
                    mossEncountered: false,
                    raymondSaved: false,
                    acuarioAbierto: false,
                    mariaPresente: false,
                    muerteEvitada: false,
                    confesorHablo: false,
                };
                renderScene();
                updateUI();
            }

            // registrar eventos de boton restart
            document.getElementById('restartBtn').addEventListener('click', restartGame);

            // Inicializar
            renderScene();
            updateUI();

            // prevenir scroll contextual en móvil
            document.querySelectorAll('.action-btn').forEach(b => {
                b.addEventListener('touchstart', (e) => { e.preventDefault(); }, { passive: false });
            });
        })();
    </script>
</body>
</html>
