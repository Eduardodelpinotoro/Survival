<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CRÓNICAS DE UN CASO CERRADO · novela completa</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Georgia', 'Times New Roman', serif;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #1a1e24;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px;
        }
        .gamebook {
            max-width: 700px;
            width: 100%;
            background: #2c3e4f;
            border-radius: 40px 40px 28px 28px;
            box-shadow: 0 25px 45px #000000dd;
            border: 2px solid #4a6a8a;
            overflow: hidden;
        }
        .top-bar {
            background: #1e3142;
            padding: 10px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #3f5770;
        }
        .time-section {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .time-bg {
            width: 140px;
            height: 18px;
            background: #1f364a;
            border-radius: 30px;
            border: 1px solid #4a6a8a;
            box-shadow: inset 0 2px 4px #0b1a27;
        }
        .time-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #3e6b9e, #5f9ea0);
            border-radius: 30px;
            transition: width 0.2s;
        }
        .time-number {
            color: #f2e0c0;
            font-weight: 800;
            font-size: 1.4rem;
            min-width: 60px;
            text-shadow: 0 2px 3px black;
        }
        .inventory-button {
            background: #253d53;
            border: 2px solid #6083a8;
            border-radius: 40px;
            padding: 6px 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            box-shadow: 0 4px 0 #102433;
            transition: 0.08s linear;
            touch-action: manipulation;
        }
        .inventory-button:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #102433;
        }
        .inv-icon {
            font-size: 1.8rem;
            color: #ffd78c;
        }
        .inv-text {
            color: white;
            font-weight: 600;
            font-size: 1rem;
        }
        .inventory-panel {
            background: #1d3143;
            border-bottom: 3px solid #4f6f90;
            padding: 16px 20px;
            display: none;
            flex-wrap: wrap;
            gap: 16px 24px;
            align-items: center;
            box-shadow: inset 0 1px 6px #00000055;
        }
        .inventory-panel.visible {
            display: flex;
        }
        .inventory-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            background: #2b4058;
            padding: 10px 15px;
            border-radius: 30px;
            border: 1px solid #769dc9;
            min-width: 90px;
        }
        .item-emoji {
            font-size: 2.5rem;
            filter: drop-shadow(2px 4px 4px black);
        }
        .item-label {
            color: #f0f4fa;
            font-size: 0.9rem;
            font-weight: 600;
            background: #1c3142;
            padding: 4px 12px;
            border-radius: 30px;
            white-space: nowrap;
        }
        .chapter-tag {
            background: #1f3345;
            color: #d7e7ff;
            padding: 12px 22px;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 1px;
            border-bottom: 2px solid #3b5773;
        }
        .novel-area {
            background: #14222f;
            padding: 32px 28px 40px;
            color: #ecf5ff;
            font-size: 1.18rem;
            line-height: 1.7;
            border-bottom: 2px solid #1f3345;
            max-height: 500px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #527a9e #1c2e3f;
        }
        .novel-area::-webkit-scrollbar {
            width: 8px;
        }
        .novel-area::-webkit-scrollbar-track {
            background: #1c2e3f;
        }
        .novel-area::-webkit-scrollbar-thumb {
            background: #527a9e;
            border-radius: 10px;
        }
        .options-area {
            background: #11212e;
            padding: 24px 22px 28px;
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
            border-top: 2px solid #2a4055;
        }
        .choice-btn {
            background: #263f56;
            border: none;
            border-bottom: 5px solid #102433;
            color: #f5fbff;
            font-size: 1.05rem;
            font-weight: 500;
            padding: 14px 20px;
            border-radius: 50px;
            box-shadow: 0 6px 0 #0d1f2e;
            transition: 0.06s linear;
            cursor: pointer;
            touch-action: manipulation;
            flex: 1 1 180px;
            min-width: 150px;
            text-align: center;
            line-height: 1.3;
        }
        .choice-btn:active {
            transform: translateY(5px);
            border-bottom-width: 2px;
            background: #1d3348;
        }
        .footer {
            background: #1c2b39;
            padding: 14px 20px 16px;
            text-align: center;
            border-top: 2px solid #38536d;
        }
        .restart-btn {
            background: #324252;
            border: 1px solid #7089a8;
            color: #ffefd3;
            padding: 12px 28px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: bold;
            border-bottom: 5px solid #1c2938;
            cursor: pointer;
            display: inline-block;
            min-width: 220px;
        }
        .restart-btn:active {
            transform: translateY(5px);
            border-bottom-width: 2px;
        }
        .footnote {
            color: #5f7c9c;
            font-size: 0.8rem;
            margin-top: 8px;
        }
    </style>
</head>
<body>
<div class="gamebook">
    <div class="top-bar">
        <div class="time-section">
            <div class="time-bg"><div class="time-fill" id="timeFill" style="width:100%"></div></div>
            <div class="time-number" id="timeValue">168h</div>
        </div>
        <div class="inventory-button" id="inventoryToggle">
            <span class="inv-icon">📦</span>
            <span class="inv-text">pruebas</span>
        </div>
    </div>

    <div class="inventory-panel" id="inventoryPanel"></div>

    <div class="chapter-tag" id="chapterDisplay">LA LLAMADA DE BARCELONA</div>
    
    <div class="novel-area" id="novelText"></div>

    <div class="options-area" id="optionsContainer"></div>

    <div class="footer">
        <div class="restart-btn" id="restartButton">↻ REINICIAR INVESTIGACIÓN</div>
        <div class="footnote">18 capítulos + epílogo · Caso 0893</div>
    </div>
</div>

<script>
    (function() {
        let state = {
            health: 100,
            maxHealth: 100,
            tiempo: 168,
            step: 1,
            inventory: {
                cartaSilvia: false,
                llave089: false,
                pendrive: false,
                muestrasSangre: false,
                libretaMendoza: false,
                cartaJ: false
            },
            pistas: {
                silviaHablado: false,
                vidalContactado: false,
                enricDetenido: false
            }
        };

        const timeFill = document.getElementById('timeFill');
        const timeValue = document.getElementById('timeValue');
        const chapterDisplay = document.getElementById('chapterDisplay');
        const novelText = document.getElementById('novelText');
        const optionsContainer = document.getElementById('optionsContainer');
        const inventoryPanel = document.getElementById('inventoryPanel');
        const inventoryToggle = document.getElementById('inventoryToggle');
        const restartBtn = document.getElementById('restartButton');

        inventoryToggle.addEventListener('click', (e) => {
            e.preventDefault();
            inventoryPanel.classList.toggle('visible');
            updateInventoryPanel();
        });

        function updateUI() {
            const percent = (state.tiempo / 168) * 100;
            timeFill.style.width = percent + '%';
            timeValue.innerText = state.tiempo + 'h';
            
            if (state.health <= 0) {
                showGameOver();
            }
        }

        function restarTiempo(horas) {
            state.tiempo = Math.max(0, state.tiempo - horas);
            if (state.tiempo <= 0) {
                showTimeOut();
            }
        }

        function addItem(item) {
            if (item === 'cartaSilvia') state.inventory.cartaSilvia = true;
            if (item === 'llave089') state.inventory.llave089 = true;
            if (item === 'pendrive') state.inventory.pendrive = true;
            if (item === 'muestrasSangre') state.inventory.muestrasSangre = true;
            if (item === 'libretaMendoza') state.inventory.libretaMendoza = true;
            if (item === 'cartaJ') state.inventory.cartaJ = true;
            if (inventoryPanel.classList.contains('visible')) updateInventoryPanel();
        }

        function updateInventoryPanel() {
            let html = '<div class="inventory-item"><span class="item-emoji">📋</span><span class="item-label">Caso 0893</span></div>';
            if (state.inventory.cartaSilvia) html += '<div class="inventory-item"><span class="item-emoji">💌</span><span class="item-label">Carta Silvia</span></div>';
            if (state.inventory.llave089) html += '<div class="inventory-item"><span class="item-emoji">🔑</span><span class="item-label">Llave 089</span></div>';
            if (state.inventory.pendrive) html += '<div class="inventory-item"><span class="item-emoji">💾</span><span class="item-label">Pendrive</span></div>';
            if (state.inventory.muestrasSangre) html += '<div class="inventory-item"><span class="item-emoji">🧪</span><span class="item-label">Muestras</span></div>';
            if (state.inventory.libretaMendoza) html += '<div class="inventory-item"><span class="item-emoji">📓</span><span class="item-label">Libreta</span></div>';
            if (state.inventory.cartaJ) html += '<div class="inventory-item"><span class="item-emoji">📄</span><span class="item-label">Carta "J"</span></div>';
            inventoryPanel.innerHTML = html;
        }

        function showGameOver() {
            chapterDisplay.innerText = '❌ CASO CERRADO · AGENTE CAÍDO';
            novelText.innerText = 'El cuerpo de Daniel Cross yace en el puerto de Barcelona. El coleccionista ha añadido una pieza más a su macabra colección. El caso 0893 quedará para siempre sin resolver.';
            optionsContainer.innerHTML = '';
        }

        function showTimeOut() {
            chapterDisplay.innerText = '⏰ TIEMPO AGOTADO';
            novelText.innerText = 'Siete días. Daniel ha tenido siete días y no ha conseguido las pruebas suficientes. El archivo del caso 0893 ha sido destruido. El asesino de Mateo Vidal nunca será encontrado.';
            optionsContainer.innerHTML = '';
        }

        const chapters = {
            1: {
                title: 'LA LLAMADA DE BARCELONA',
                text: 'Boston, Massachusetts. Despacho del FBI. 10 de marzo de 2025. 9:15 AM.\n\nEl agente especial Daniel Cross llevaba tres meses intentando olvidar Providence cuando el teléfono sonó. No era Sarah Chen. Era un número internacional. De España.\n\n—¿Agente Cross? —la voz era de hombre, grave, con acento español—. Me llamo Ignacio Vidal. Soy detective de los Mossos d\'Esquadra en Barcelona. Necesito hablar con usted.\n\nDaniel se enderezó en la silla.\n\n—Dígame.\n\n—Tenemos un caso. Un periodista muerto. Mateo Vidal. Sin parentesco conmigo, por desgracia. La policía lo cerró como suicidio, pero no lo fue. Tenía marcas en el cuello. Pequeñas mordeduras. Y un compuesto extraño en la sangre. He investigado por mi cuenta y he encontrado algo que no me deja dormir.\n\n—¿Qué?\n\n—El compuesto. Lo envié a un laboratorio en Estados Unidos. Me dijeron que era un prión modificado. Que solo habían visto algo similar una vez. En un caso en Providence, hace unos meses. Un caso que llevó un tal agente Cross.\n\nDaniel sintió que el corazón se aceleraba.\n\n—Soy yo.\n\n—Lo sé. Por eso llamo. Mateo era amigo mío. No voy a dejar que su muerte quede impune. Pero necesito ayuda. Esto es más grande de lo que puedo abarcar solo.\n\n—Voy para allá.\n\nDaniel colgó y marcó el número de María Torres. La periodista que le había ayudado en Providence. La única persona que entendería lo que esto significaba.\n\n—¿Daniel? —respondió ella—. Hace meses que no sé de ti. ¿Estás bien?\n\n—¿Tienes el pasaporte a mano?\n\n—¿Por qué?\n\n—Barcelona. Ha aparecido otro caso. Las mismas marcas. El mismo prión. Y un detective que cree que es más grande de lo que parece.\n\nMaría dudó solo un segundo.\n\n—¿Cuándo sales?\n\n—En cuatro horas.\n\n—Te veo en el aeropuerto.',
                options: [
                    { text: '✈️ Viajar a Barcelona con María', tiempo: 6, next: 2 },
                    { text: '📞 Llamar a Sarah Chen antes de ir', tiempo: 1, next: 2 },
                    { text: '🔍 Investigar a Ignacio Vidal desde Boston', tiempo: 3, next: 2 }
                ]
            },
            2: {
                title: 'LA LLEGADA',
                text: 'Barcelona, 12 de marzo de 2025. 11:30 AM. Aeropuerto de El Prat.\n\nDaniel y María cruzaron la puerta de llegadas y vieron a un hombre con una placa esperándoles. Cincuenta años, aspecto cansado, ojos inteligentes.\n\n—Agente Cross —dijo, tendiendo la mano—. Ignacio Vidal. Gracias por venir.\n\n—Ella es María Torres —dijo Daniel—. Periodista. Trabajó conmigo en Providence.\n\nVidal asintió.\n\n—Bien. Necesitaremos toda la ayuda posible. ¿Han comido algo?\n\n—Directo al grano, detective —dijo Daniel—. ¿Qué tenemos?\n\n—Un periodista muerto. Mateo Vidal. Sin relación conmigo, aunque compartamos apellido. Apareció en su piso hace una semana. La policía lo cerró en cuarenta y ocho horas. Suicidio, dijeron.\n\n—Pero usted no se lo cree.\n\n—No. Porque las marcas en su cuello... no son de un suicida. Y el compuesto en su sangre... no es de este mundo. O al menos, no de este mundo que conocemos.\n\nMaría y Daniel se miraron.\n\n—Enséñenos el piso —dijo Daniel.',
                options: [
                    { text: '🏢 Ir al piso de Mateo', tiempo: 2, next: 3 },
                    { text: '🔍 Ver los informes de Vidal primero', tiempo: 1, next: 4 },
                    { text: '📞 Contactar con la policía local', tiempo: 2, next: 5 }
                ]
            },
            3: {
                title: 'EL PISO DE MATEO',
                text: 'Barcelona, 12 de marzo. 2:00 PM. Calle de la Diputación, 243.\n\nEl piso de Mateo olía a cerrado, a muerte reciente, a papel viejo. Daniel recorrió las habitaciones mientras Vidal explicaba.\n\n—Era meticuloso. Guardaba todo. Sus investigaciones, sus entrevistas, sus sospechas.\n\nEn el dormitorio, Daniel encontró una libreta en la mesilla. La abrió. Las últimas páginas estaban escritas con letra temblorosa.\n\n"Me siguen. Lo sé. Desde que empecé con lo de Prometeo, noto que alguien me observa. He hablado con Silvia, mi exmujer. Le he dicho que si me pasa algo, que busque en la taquilla. La 089. En la Estación de Francia."\n\nDaniel guardó la libreta.\n\n—¿Quién es Silvia? —preguntó.\n\n—Su exmujer. Vive en Barcelona. Podemos hablar con ella.\n\n—Y la taquilla. La 089. ¿Qué hay ahí?\n\n—No lo sé. No he podido abrirla. Necesito una orden judicial.\n\nMaría sacó una navaja multiusos de su mochila.\n\n—O una periodista con herramientas inapropiadas.\n\nDaniel sonrió. Por primera vez en días.',
                options: [
                    { text: '🚉 Ir a la Estación de Francia', tiempo: 2, next: 6 },
                    { text: '👩 Hablar con Silvia', tiempo: 2, next: 7 },
                    { text: '🔍 Seguir registrando el piso', tiempo: 3, next: 3 }
                ],
                onEnter: () => { addItem('libretaMendoza'); }
            },
            4: {
                title: 'LOS INFORMES',
                text: 'Barcelona, 12 de marzo. 3:30 PM. Comisaría de los Mossos.\n\nVidal les mostró los informes en su despacho. Fotografías del cadáver, análisis de sangre, el informe forense.\n\nDaniel examinó las fotos con atención. Las marcas en el cuello eran idénticas a las de Providence. Pequeñas mordeduras circulares.\n\n—¿Han identificado el compuesto? —preguntó.\n\n—Sí. Un laboratorio en Virginia lo reconoció. Dijeron que era un prión modificado. Que solo lo habían visto una vez. En un caso de Providence.\n\n—Ese caso lo llevé yo.\n\n—Lo sé. Por eso llamé.\n\nMaría señaló una fotografía del cuello de la víctima.\n\n—Esto no es un suicidio. Esto es un asesinato. Y quien lo hizo sabe lo que hace.\n\n—Hay más —dijo Vidal—. Otra víctima. Jordi Costa. Arquitecto de Prometeo. Murió en accidente de coche hace dos meses. Pero antes de morir, le hicieron análisis de sangre. Por problemas de salud. Tenía el mismo compuesto.\n\nDaniel sintió que las piezas empezaban a encajar.\n\n—Prometeo. ¿Qué es?\n\n—La constructora más grande de Barcelona. Contratos públicos por cientos de millones. Y según Mateo, una tapadera para algo más oscuro.',
                options: [
                    { text: '🚉 Ir a la Estación de Francia', tiempo: 2, next: 6 },
                    { text: '🏥 Investigar a Jordi Costa', tiempo: 3, next: 8 },
                    { text: '🏢 Ir a la sede de Prometeo', tiempo: 2, next: 9 }
                ]
            },
            5: {
                title: 'EL TESTIGO',
                text: 'Barcelona, 13 de marzo. 10:00 AM. Cafetería del centro.\n\nVidal había concertado una reunión con un testigo. Un hombre que había trabajado en Prometeo y que había visto cosas que no debía.\n\nSe llamaba Rubén. Cincuenta años, barba descuidada, ropa de trabajo. Llegó con retraso, mirando atrás constantemente.\n\n—Gracias por venir —dijo Vidal.\n\n—No sé si hago bien —respondió Rubén—. Si se enteran de que hablo...\n\n—¿Quiénes? —preguntó Daniel.\n\n—Ellos. Los de la nave.\n\n—¿Qué nave?\n\nRubén bajó la voz.\n\n—En el polígono de la Zona Franca. Nave 17. Allí hacen cosas. Cosas raras. Yo trabajaba en seguridad, en el turno de noche. Una vez vi cómo llegaba un contenedor. Del puerto. Lo abrieron y dentro... dentro había cuerpos. Conectados. Como si fueran uno solo.\n\nDaniel sintió que la sangre se le helaba.\n\n—¿Seguro?\n\n—Los vi. A través de una rendija. Estaban en tanques de cristal. Flotando. Y respiraban. Hacían ruidos.\n\n—¿Cuándo fue eso?\n\n—Hace seis meses. Poco antes de que muriera Jordi Costa. El arquitecto. Creo que él también lo vio. Por eso lo mataron.',
                options: [
                    { text: '🏭 Ir a la nave 17', tiempo: 3, next: 10 },
                    { text: '🔍 Proteger a Rubén', tiempo: 2, next: 5 },
                    { text: '📞 Contactar con la policía científica', tiempo: 2, next: 9 }
                ]
            },
            6: {
                title: 'LA TAQUILLA 089',
                text: 'Barcelona, 13 de marzo. 1:30 PM. Estación de Francia.\n\nCon la ayuda de María y sus "herramientas inapropiadas", abrieron la taquilla 089 sin necesidad de orden judicial. Dentro había una carpeta marrón, gruesa.\n\nDaniel la abrió sobre un banco cercano. Documentos, fotografías, informes.\n\n—Esto es... —murmuró María—. Es la investigación de Mateo. Completa.\n\nHabía listados de transferencias bancarias de Prometeo a paraísos fiscales. Nombres de políticos. Fechas. Cantidades.\n\n—Sobornos —dijo Vidal.\n\n—Y esto —Daniel señaló un informe médico—. Análisis de sangre de Jordi Costa. Con el mismo compuesto.\n\n—Mateo lo sabía. Sabía que Jordi fue asesinado. Y que Prometeo estaba detrás.\n\nAl final de la carpeta, una fotografía. Un grupo de personas en una cena. Mendoza, Enric Font, y otros. Al fondo, un hombre mayor. La cara borrosa.\n\n—¿Quién es? —preguntó María.\n\nDaniel no lo sabía. Pero algo le decía que era importante.',
                options: [
                    { text: '🔍 Investigar a las personas de la foto', tiempo: 2, next: 9 },
                    { text: '🏥 Ir al hospital de Jordi Costa', tiempo: 2, next: 8 },
                    { text: '👤 Hablar con Enric Font', tiempo: 2, next: 11 }
                ],
                onEnter: () => { addItem('pendrive'); }
            },
            7: {
                title: 'LA EXMUJER',
                text: 'Barcelona, 14 de marzo. 11:00 AM. Café del Eixample.\n\nSilvia llegó puntual. Cuarenta años, morena, bien vestida, con ojeras profundas.\n\n—Mateo y yo nos divorciamos hace cinco años —dijo—. Pero manteníamos contacto. Era el padre de mi hija.\n\n—¿Cuándo habló con él por última vez?\n\n—Una semana antes de morir. Estaba asustado. Me dijo que si le pasaba algo, que buscara en la taquilla 089. Que allí encontrarían la verdad.\n\n—¿Sabe quién podría querer matarlo?\n\nSilvia dudó.\n\n—Vicente Márquez. El editor de su periódico. Tuvieron una relación. Mateo la dejó, pero Vicente no lo superó. Le acosaba. Le escribía cartas. Y cuando Mateo empezó a investigar a Prometeo, Vicente intentó detenerlo.\n\n—¿Cree que Vicente pudo...?\n\n—No lo sé. Pero algo me dice que no es tan inocente como parece.',
                options: [
                    { text: '📰 Hablar con Vicente Márquez', tiempo: 2, next: 12 },
                    { text: '🚉 Ir a la taquilla 089', tiempo: 2, next: 6 },
                    { text: '🔍 Volver al piso de Mateo', tiempo: 2, next: 3 }
                ]
            },
            8: {
                title: 'EL HOSPITAL',
                text: 'Barcelona, 14 de marzo. 4:00 PM. Hospital Clínic.\n\nLa doctora Anna Rius era la jefa de toxicología. Una mujer seria, con mirada inteligente.\n\n—El detective Vidal me dijo que vendrían —dijo—. Supongo que es por el caso Costa.\n\n—Sí. ¿Usted lo trató?\n\n—Analicé sus muestras de sangre. Encontré algo muy extraño. Un compuesto que no reconocí. Lo envié a Estados Unidos, al FBI. Me respondió un tal agente Cross.\n\nDaniel la miró fijamente.\n\n—Ese agente soy yo.\n\nAnna Rius se sorprendió.\n\n—¿Usted? Entonces ya sabe lo que era.\n\n—Un prión modificado. ¿Guardó las muestras?\n\nAnna dudó. Luego asintió.\n\n—Las guardé. En secreto. Por si alguien preguntaba.',
                options: [
                    { text: '💉 Recoger las muestras', tiempo: 1, next: 9 },
                    { text: '🔬 Analizarlas aquí mismo', tiempo: 3, next: 9 },
                    { text: '📞 Llamar a Sarah Chen', tiempo: 1, next: 9 }
                ],
                onEnter: () => { addItem('muestrasSangre'); }
            },

        function loadChapter(step) {
            if (state.tiempo <= 0) {
                showTimeOut();
                return;
            }
            if (state.health <= 0) {
                showGameOver();
                return;
            }

            const chap = chapters[step];
            if (!chap) return;

            chapterDisplay.innerText = chap.title;
            novelText.innerText = chap.text;
            if (chap.onEnter) chap.onEnter();

            optionsContainer.innerHTML = '';
            chap.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.innerText = opt.text;
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    if (opt.tiempo) restarTiempo(opt.tiempo);
                    
                    if (state.tiempo <= 0) {
                        showTimeOut();
                        return;
                    }
                    if (state.health <= 0) return;

                    if (opt.final) {
                        restartGame();
                        return;
                    }

                    const nextStep = opt.next !== undefined ? opt.next : step + 1;
                    state.step = nextStep;
                    loadChapter(state.step);
                });
                optionsContainer.appendChild(btn);
            });

            updateUI();
            inventoryPanel.classList.remove('visible');
        }

        function restartGame() {
            state = {
                health: 100,
                maxHealth: 100,
                tiempo: 168,
                step: 1,
                inventory: {
                    cartaSilvia: false,
                    llave089: false,
                    pendrive: false,
                    muestrasSangre: false,
                    libretaMendoza: false,
                    cartaJ: false
                },
                pistas: {
                    silviaHablado: false,
                    vidalContactado: false,
                    enricDetenido: false
                }
            };
            loadChapter(1);
        }

        restartBtn.addEventListener('click', restartGame);
        loadChapter(1);
    })();
