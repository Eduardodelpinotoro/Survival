<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EL CASO DEL ARQUITECTO · novela completa (18 capítulos + epílogo)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Georgia', 'Times New Roman', serif;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #1a1e24;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px;
        }
        .gamebook {
            max-width: 700px;
            width: 100%;
            background: #2c3e4f;
            border-radius: 40px 40px 28px 28px;
            box-shadow: 0 25px 45px #000000dd;
            border: 2px solid #4a6a8a;
            overflow: hidden;
        }
        .top-bar {
            background: #1e3142;
            padding: 10px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #3f5770;
        }
        .inventory-button {
            background: #253d53;
            border: 2px solid #6083a8;
            border-radius: 40px;
            padding: 6px 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            box-shadow: 0 4px 0 #102433;
            transition: 0.08s linear;
            touch-action: manipulation;
        }
        .inventory-button:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #102433;
        }
        .inv-icon {
            font-size: 1.8rem;
            color: #ffd78c;
        }
        .inv-text {
            color: white;
            font-weight: 600;
            font-size: 1rem;
        }
        .inventory-panel {
            background: #1d3143;
            border-bottom: 3px solid #4f6f90;
            padding: 16px 20px;
            display: none;
            flex-wrap: wrap;
            gap: 16px 24px;
            align-items: center;
            box-shadow: inset 0 1px 6px #00000055;
        }
        .inventory-panel.visible {
            display: flex;
        }
        .inventory-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            background: #2b4058;
            padding: 10px 15px;
            border-radius: 30px;
            border: 1px solid #769dc9;
            min-width: 90px;
        }
        .item-emoji {
            font-size: 2.5rem;
            filter: drop-shadow(2px 4px 4px black);
        }
        .item-label {
            color: #f0f4fa;
            font-size: 0.9rem;
            font-weight: 600;
            background: #1c3142;
            padding: 4px 12px;
            border-radius: 30px;
            white-space: nowrap;
        }
        .chapter-tag {
            background: #1f3345;
            color: #d7e7ff;
            padding: 12px 22px;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 1px;
            border-bottom: 2px solid #3b5773;
        }
        .novel-area {
            background: #14222f;
            padding: 32px 28px 40px;
            color: #ecf5ff;
            font-size: 1.18rem;
            line-height: 1.7;
            border-bottom: 2px solid #1f3345;
            max-height: 500px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #527a9e #1c2e3f;
        }
        .novel-area::-webkit-scrollbar {
            width: 8px;
        }
        .novel-area::-webkit-scrollbar-track {
            background: #1c2e3f;
        }
        .novel-area::-webkit-scrollbar-thumb {
            background: #527a9e;
            border-radius: 10px;
        }
        .options-area {
            background: #11212e;
            padding: 24px 22px 28px;
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
            border-top: 2px solid #2a4055;
        }
        .choice-btn {
            background: #263f56;
            border: none;
            border-bottom: 5px solid #102433;
            color: #f5fbff;
            font-size: 1.05rem;
            font-weight: 500;
            padding: 14px 20px;
            border-radius: 50px;
            box-shadow: 0 6px 0 #0d1f2e;
            transition: 0.06s linear;
            cursor: pointer;
            touch-action: manipulation;
            flex: 1 1 180px;
            min-width: 150px;
            text-align: center;
            line-height: 1.3;
        }
        .choice-btn:active {
            transform: translateY(5px);
            border-bottom-width: 2px;
            background: #1d3348;
        }
        .footer {
            background: #1c2b39;
            padding: 14px 20px 16px;
            text-align: center;
            border-top: 2px solid #38536d;
        }
        .restart-btn {
            background: #324252;
            border: 1px solid #7089a8;
            color: #ffefd3;
            padding: 12px 28px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: bold;
            border-bottom: 5px solid #1c2938;
            cursor: pointer;
            display: inline-block;
            min-width: 220px;
        }
        .restart-btn:active {
            transform: translateY(5px);
            border-bottom-width: 2px;
        }
        .footnote {
            color: #5f7c9c;
            font-size: 0.8rem;
            margin-top: 8px;
        }
    </style>
</head>
<body>
<div class="gamebook">
    <div class="top-bar">
        <div class="inventory-button" id="inventoryToggle">
            <span class="inv-icon">📦</span>
            <span class="inv-text">pruebas</span>
        </div>
    </div>

    <div class="inventory-panel" id="inventoryPanel"></div>

    <div class="chapter-tag" id="chapterDisplay">LA LLAMADA DE SALEM</div>
    
    <div class="novel-area" id="novelText"></div>

    <div class="options-area" id="optionsContainer"></div>

    <div class="footer">
        <div class="restart-btn" id="restartButton">↻ REINICIAR INVESTIGACIÓN</div>
        <div class="footnote">18 capítulos + epílogo · Caso del Arquitecto</div>
    </div>
</div>

<script>
    (function() {
        let state = {
            step: 1,
            inventory: {
                cartaMargaret: false,
                informeToxico: false,
                transferencias: false,
                mensajesCifrados: false,
                mensajesDescifrados: false,
                ticketGasolinera: false,
                facturaHotelRichard: false,
                facturaHotelLaura: false,
                diarioMichael: false,
                reciboVeterinario: false,
                fotografiaCena: false,
                declaracionConserje: false,
                cartaAnonima: false,
                declaracionPatricia: false,
                declaracionVecino: false,
                declaracionHija: false
            },
            interrogatorios: {
                richard: false,
                david: false,
                laura: false,
                margaret: false
            },
            lugaresVisitados: {
                pisoThomas: false,
                farmacia: false,
                hotel: false,
                archivos: false,
                pisoLaura: false,
                declaraciones: false,
                descifrar: false
            }
        };

        const chapterDisplay = document.getElementById('chapterDisplay');
        const novelText = document.getElementById('novelText');
        const optionsContainer = document.getElementById('optionsContainer');
        const inventoryPanel = document.getElementById('inventoryPanel');
        const inventoryToggle = document.getElementById('inventoryToggle');
        const restartBtn = document.getElementById('restartButton');

        inventoryToggle.addEventListener('click', (e) => {
            e.preventDefault();
            inventoryPanel.classList.toggle('visible');
            updateInventoryPanel();
        });

        function addItem(item) {
            state.inventory[item] = true;
            if (inventoryPanel.classList.contains('visible')) updateInventoryPanel();
        }

        function marcarInterrogatorio(persona) {
            state.interrogatorios[persona] = true;
        }

        function marcarLugar(lugar) {
            state.lugaresVisitados[lugar] = true;
        }

        function updateInventoryPanel() {
            let html = '<div class="inventory-item"><span class="item-emoji">📋</span><span class="item-label">Caso 0893</span></div>';
            
            const items = [
                { key: 'cartaMargaret', emoji: '💌', label: 'Carta de Margaret' },
                { key: 'informeToxico', emoji: '🧪', label: 'Informe toxicológico' },
                { key: 'transferencias', emoji: '💰', label: 'Transferencias' },
                { key: 'mensajesCifrados', emoji: '📱', label: 'Mensajes cifrados' },
                { key: 'mensajesDescifrados', emoji: '🔓', label: 'Mensajes descifrados' },
                { key: 'ticketGasolinera', emoji: '⛽', label: 'Ticket gasolinera' },
                { key: 'facturaHotelRichard', emoji: '🏨', label: 'Factura hotel (R)' },
                { key: 'facturaHotelLaura', emoji: '🏨', label: 'Factura hotel (L)' },
                { key: 'diarioMichael', emoji: '📓', label: 'Diario de Michael' },
                { key: 'reciboVeterinario', emoji: '🧴', label: 'Recibo ketamina' },
                { key: 'fotografiaCena', emoji: '📸', label: 'Foto cena empresa' },
                { key: 'declaracionConserje', emoji: '👤', label: 'Declaración conserje' },
                { key: 'cartaAnonima', emoji: '✉️', label: 'Carta anónima' },
                { key: 'declaracionPatricia', emoji: '👩', label: 'Declaración Patricia' },
                { key: 'declaracionVecino', emoji: '👨', label: 'Declaración vecino' },
                { key: 'declaracionHija', emoji: '🧒', label: 'Declaración hija' }
            ];
            
            items.forEach(item => {
                if (state.inventory[item.key]) {
                    html += `<div class="inventory-item"><span class="item-emoji">${item.emoji}</span><span class="item-label">${item.label}</span></div>`;
                }
            });
            
            inventoryPanel.innerHTML = html;
        }

        function puedeAcusar() {
            // Para acusar a Laura necesitamos:
            // - Diario de Michael (la menciona)
            // - Recibo de ketamina a su nombre
            // - Declaración del conserje (la vio salir)
            // - Fotografía de la cena (prueba que trabajó allí)
            // - Factura del hotel de Laura (prueba que mintió)
            // - Mensajes descifrados (amenazas a Thomas)
            
            const pruebasNecesarias = [
                state.inventory.diarioMichael,
                state.inventory.reciboVeterinario,
                state.inventory.declaracionConserje,
                state.inventory.fotografiaCena,
                state.inventory.facturaHotelLaura,
                state.inventory.mensajesDescifrados
            ];
            
            return pruebasNecesarias.every(Boolean);
        }

        const chapters = {
            // CAPÍTULO 1 - INTRODUCCIÓN
            1: {
                title: 'LA LLAMADA DE SALEM',
                text: 'Boston, Massachusetts. Despacho del FBI. 10 de marzo de 2025. 9:15 AM.\n\nEl agente especial Daniel Cross llevaba semanas sin casos importantes cuando el teléfono sonó. Era un viejo conocido, el detective Victor Ramos del departamento de policía de Salem.\n\n—Daniel, necesito tu ayuda. Esto es más complicado de lo que parece.\n\n—¿Qué pasa?\n\n—Dos muertos con tres meses de diferencia. Michael Stone, arquitecto, accidente de tráfico el 20 de noviembre. Thomas Reed, periodista, apareció muerto en su piso el 3 de marzo. Oficialmente, no hay conexión. Extraoficialmente, ambos tenían ketamina en sangre.\n\n—¿Ketamina? Eso es...\n\n—Veterinario, sí. Pero hay más. Michael Stone estaba a punto de denunciar a su propia empresa por corrupción. Thomas Reed estaba investigando esa denuncia. Y los dos, antes de morir, recibieron amenazas.\n\n—¿De quién?\n\n—De tres personas diferentes. Richard Stone, el hermano de Michael y su socio. David Morrison, editor del periódico y ex pareja de Thomas. Y Laura Reed, la exmujer de Thomas. Todos tienen coartada. Todos mienten en algo.\n\nDaniel asintió.\n\n—Voy para allá. Dile a María Torres que nos vemos en Salem.',
                options: [
                    { text: '🚗 Viajar a Salem', next: 2 }
                ]
            },
            
            // CAPÍTULO 2 - OFICINA (MENÚ PRINCIPAL)
            2: {
                title: 'SALEM · OFICINA DE POLICÍA',
                text: 'Salem, Massachusetts. 10 de marzo de 2025. 11:30 AM. Oficina de policía.\n\nDaniel y María se reunieron con Victor Ramos en su oficina. Sobre la mesa, tres carpetas: una para cada sospechoso.\n\n—Podemos investigar por donde quieras —dijo Victor—. Interrogar a los sospechosos, visitar escenarios, buscar pruebas. Tú decides el orden. Cuando creas que tienes suficientes pruebas, podremos acusar a alguien.\n\nMaría tomó notas en su libreta.\n\n—¿Por dónde empezamos?',
                options: [
                    { text: '🔍 Interrogar a Richard Stone', next: 3 },
                    { text: '🔍 Interrogar a David Morrison', next: 4 },
                    { text: '🔍 Interrogar a Laura Reed', next: 5 },
                    { text: '👵 Hablar con Margaret Stone (madre)', next: 6 },
                    { text: '🏢 Ir al piso de Thomas Reed', next: 7 },
                    { text: '📂 Revisar los informes con Victor', next: 8 },
                    { text: '🔬 Descifrar mensajes del móvil', next: 15, condition: 'mensajesCifrados' },
                    { text: '🚪 Ir al piso de Laura Reed', next: 14 },
                    { text: '👥 Recoger declaraciones adicionales', next: 13 },
                    { text: '⚖️ ACUSAR (si tienes todas las pruebas)', next: 16 }
                ]
            },
            
            // CAPÍTULO 3 - INTERROGATORIO RICHARD
            3: {
                title: 'INTERROGATORIO · RICHARD STONE',
                text: 'Salem, 10 de marzo. 2:30 PM. Stone & Associates.\n\nRichard Stone los recibió en su despacho. Traje caro, sonrisa profesional, pero sus ojos delataban nerviosismo.\n\n—Agente Cross —dijo—. Lamento lo de mi hermano, pero no sé qué más puedo decir.\n\n—¿Cuándo fue la última vez que habló con él?\n\n—El día antes del accidente, 19 de noviembre. Discutimos.\n\n—¿Sobre qué?\n\n—Sobre la empresa. Él quería hacer cambios. Yo no estaba de acuerdo.\n\n—¿Cambios como denunciar sobornos?\n\nRichard pestañeó.\n\n—No sé de qué habla.\n\n—Su hermano iba a denunciar. Usted lo sabía.\n\n—Eran invenciones suyas. Michael estaba... inestable.\n\n—¿Inestable?\n\n—Sí. Depresión, paranoia. Cosas así.\n\n—¿Dónde estaba la noche del 20 de noviembre?\n\n—En casa. Con mi mujer.\n\n—¿Toda la noche?\n\n—Sí.\n\n—Su mujer dice que salió una hora.\n\nRichard dudó.\n\n—Fui a comprar algo.\n\n—¿A las diez de la noche?\n\n—Tenía antojo.\n\nDaniel lo miró fijamente.\n\n—Miente —dijo en voz baja.\n\n—¿Perdón?\n\n—Nada. Gracias por su tiempo.',
                options: [
                    { text: '🔙 Volver a la oficina', next: 2 }
                ],
                onEnter: () => { marcarInterrogatorio('richard'); }
            },
            
            // CAPÍTULO 4 - INTERROGATORIO DAVID
            4: {
                title: 'INTERROGATORIO · DAVID MORRISON',
                text: 'Salem, 11 de marzo. 10:00 AM. Salem Chronicle.\n\nDavid Morrison era un hombre de cincuenta años, elegante, con ojeras profundas y manos temblorosas.\n\n—Thomas era un gran periodista —dijo, con voz quebrada—. Esto es una pérdida terrible.\n\n—¿Cuándo habló con él por última vez?\n\n—El 2 de marzo. Discutimos.\n\n—¿Por qué?\n\n—Por su obsesión con el caso Stone. Le dije que lo dejara, que era peligroso.\n\n—¿O por celos?\n\nDavid enmudeció.\n\n—Tuvieron una relación, ¿no? Él la terminó. Usted no lo superó.\n\n—Eso es asunto privado.\n\n—Hay mensajes suyos. Amenazas.\n\n—Eran... eran cosas del momento. No iba en serio.\n\n—¿Dónde estaba la noche que murió Thomas, el 3 de marzo?\n\n—En mi casa. Solo.\n\n—¿Alguien puede confirmarlo?\n\n—No. Vivo solo.\n\n—¿Y la noche del accidente de Michael Stone, el 20 de noviembre?\n\n—También en casa. Solo.\n\n—¿Siempre solo?\n\n—Sí.',
                options: [
                    { text: '🔙 Volver a la oficina', next: 2 }
                ],
                onEnter: () => { marcarInterrogatorio('david'); }
            },
            
            // CAPÍTULO 5 - INTERROGATORIO LAURA
            5: {
                title: 'INTERROGATORIO · LAURA REED',
                text: 'Salem, 11 de marzo. 1:00 PM. Derby Street Cafe.\n\nLaura Reed era una mujer de cuarenta años, atractiva, bien vestida, con una expresión calculadora.\n\n—Thomas y yo nos divorciamos hace años —dijo—. Pero éramos amigos. Por nuestra hija.\n\n—¿Cuándo habló con él por última vez?\n\n—El 2 de marzo. Estaba asustado.\n\n—¿Por qué?\n\n—Por su investigación. Alguien lo amenazaba.\n\n—¿Quién?\n\n—No lo dijo. Pero mencionó a David. Y a Richard.\n\n—¿Y usted? ¿Tenía algún problema con él?\n\nLaura sonrió con amargura.\n\n—Me debía dinero. Mucho. 50.000 dólares. Pero no lo mataría por eso.\n\n—¿Dónde estaba la noche que murió, el 3 de marzo?\n\n—En casa. Con mi hija. Vimos películas hasta tarde.\n\n—¿Su hija puede confirmarlo?\n\n—Tiene doce años. Dijo que sí.\n\n—Los niños pueden mentir.\n\n—Los niños mienten, sí. Pero no cuando quieren a su padre.\n\n—¿Y la noche del 20 de noviembre?\n\n—También en casa. Con mi hija.',
                options: [
                    { text: '🔙 Volver a la oficina', next: 2 }
                ],
                onEnter: () => { marcarInterrogatorio('laura'); }
            },
            
            // CAPÍTULO 6 - MARGARET STONE
            6: {
                title: 'LA MADRE DEL ARQUITECTO',
                text: 'Salem, 10 de marzo. 4:30 PM. Collins Street, 78.\n\nMargaret Stone vivía sola en una casa modesta. Tenía sesenta y cinco años, el pelo cano, y una expresión de duelo reciente.\n\n—Gracias por venir —dijo, sirviendo café—. Nadie más quiso escucharme.\n\n—Cuénteme lo que sabe, señora Stone.\n\n—Mi hijo era meticuloso. Apuntaba todo. Sus proyectos, sus reuniones, sus sospechas. Los últimos meses, escribía mucho. Y siempre lo mismo: "Me vigilan." "Me siguen." "No sé quién, pero me vigilan."\n\n—¿Tenía enemigos?\n\n—En el trabajo, sí. Stone & Associates es muy competitiva. Michael había descubierto algo. Algo sobre sobornos. Iba a denunciar.\n\n—¿A quién?\n\n—A su socio, Richard Stone. Su propio hermano. Y a otros. Gente del ayuntamiento.\n\n—¿Y qué pasó?\n\n—El accidente. Una semana antes de denunciar. La policía dijo que se salió de la carretera. Que iba demasiado rápido. Pero Michael no conducía rápido. Era prudente. Alguien lo drogó.\n\n—¿Tiene pruebas?\n\nMargaret fue a una habitación y volvió con una carpeta.\n\n—Los informes médicos. Los análisis de sangre que le hicieron en el hospital. Tiene ketamina. Un anestésico de animales. ¿Qué hacía eso en la sangre de mi hijo?',
                options: [
                    { text: '📂 Recoger los informes', next: 2 }
                ],
                onEnter: () => { 
                    marcarInterrogatorio('margaret'); 
                    addItem('informeToxico'); 
                    addItem('cartaMargaret');
                }
            },
            
            // CAPÍTULO 7 - PISO DE THOMAS
            7: {
                title: 'EL PISO DE THOMAS REED',
                text: 'Salem, 11 de marzo. 4:00 PM. Federal Street, 245.\n\nEl piso de Thomas estaba precintado. Victor consiguió la llave.\n\n—Registrad todo —dijo Daniel—. Buscad algo que no encaje.\n\nEl piso era pequeño, abarrotado de libros y papeles. María revisaba los cajones mientras Daniel examinaba la mesilla.\n\nEncontraron una libreta. No era un diario, sino anotaciones sueltas. Fechas, nombres, cantidades. Y algo escrito en los márgenes, casi ilegible.\n\n"RS: 50.000? DM: 30.000? LR: 50.000? Todos quieren algo. Todos presionan. Pero solo uno amenaza de verdad."\n\n—RS es Richard Stone —dijo María—. DM es David Morrison. LR es Laura Reed.\n\n—¿Y los números? ¿Cantidades?\n\n—No lo sé. ¿Deudas? ¿Sobornos?\n\nEn otro cajón, encontraron una carta. Era de Margaret Stone, la madre de Michael.\n\n"Señor Reed: Gracias por interesarse por la muerte de mi hijo. Adjunto los informes médicos. Alguien lo mató. Estoy segura. Por favor, investigue."\n\n—Aquí empezó todo —dijo Daniel.\n\nTambién encontraron un móvil antiguo. Al encenderlo, vieron mensajes cifrados.',
                options: [
                    { text: '🔙 Volver a la oficina', next: 2 }
                ],
                onEnter: () => { 
                    marcarLugar('pisoThomas'); 
                    addItem('mensajesCifrados');
                }
            },
            
            // CAPÍTULO 8 - INFORMES CON VICTOR
            8: {
                title: 'LOS INFORMES',
                text: 'Salem, 12 de marzo. 10:00 AM. Oficina de policía.\n\nVictor les mostró los informes oficiales. Daniel los examinó con atención.\n\nEl informe de Michael Stone: accidente de tráfico el 20 de noviembre. El toxicólogo mencionaba "presencia de ketamina" en la sangre, pero lo atribuía a medicación que el arquitecto pudiera estar tomando.\n\nEl informe de Thomas Reed: homicidio el 3 de marzo. Las fotografías mostraban pequeñas marcas en el cuello. Como de agujas.\n\n—Lo inmovilizaron con ketamina y luego le inyectaron algo más —dijo Daniel.\n\n—¿El qué?\n\n—No lo sé. Pero la ketamina es la clave. Alguien la compró, la tuvo en su poder, la usó.\n\n—He investigado —dijo Victor—. La ketamina es de uso veterinario. Solo se vende con receta. Y hay un único distribuidor en Massachusetts. Una farmacia veterinaria en el puerto de Salem.\n\n—¿Podemos conseguir los registros de venta?\n\n—Ya lo hice. Vendieron ketamina a varias clínicas y particulares. Pero hay una compra que me llamó la atención. El 15 de noviembre. Un particular. Pagó en efectivo. Dio un nombre falso.\n\n—¿Cómo lo sabe?\n\n—Porque el nombre que dio era "Michael Stone". Pero Michael Stone estaba muerto una semana después. No pudo comprarlo él mismo.\n\nVictor también mostró una fotografía. Una cena de empresa de Stone & Associates. Michael, Richard, y otros. Y al fondo, una mujer.\n\n—¿Quién es?\n\n—No lo sé. Pero parece... familiar.',
                options: [
                    { text: '🚢 Ir a la farmacia', next: 9 },
                    { text: '🏨 Investigar el hotel', next: 10 },
                    { text: '📸 Investigar la fotografía', next: 11 },
                    { text: '🔙 Volver a la oficina', next: 2 }
                ],
                onEnter: () => { 
                    addItem('fotografiaCena');
                    addItem('transferencias');
                }
            },
            
            // CAPÍTULO 9 - FARMACIA
            9: {
                title: 'LA FARMACIA VETERINARIA',

        function loadChapter(step) {
            const chap = chapters[step];
            if (!chap) return;

            chapterDisplay.innerText = chap.title;
            novelText.innerText = chap.text;
            if (chap.onEnter) chap.onEnter();

            // Generar opciones dinámicamente
            let availableOptions = chap.options;
            
            // Filtrar opciones condicionales
            if (step === 2) {
                availableOptions = chap.options.filter(opt => {
                    if (opt.condition === 'mensajesCifrados') {
                        return state.inventory.mensajesCifrados && !state.inventory.mensajesDescifrados;
                    }
                    return true;
                });
            }

            optionsContainer.innerHTML = '';
            availableOptions.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.innerText = opt.text;
                btn.addEventListener('click', (e) => {
                    e.preventDefault();

                    // Si es la opción de acusar desde la oficina, comprobamos si tiene pruebas suficientes
                    if (opt.text.includes('ACUSAR') && step === 2) {
                        if (puedeAcusar()) {
                            state.step = 16;
                        } else {
                            alert('No tienes suficientes pruebas para acusar. Sigue investigando. Necesitas: diario de Michael, recibo de ketamina, declaración del conserje, foto de la cena, factura del hotel de Laura y mensajes descifrados.');
                            return;
                        }
                    }
                    
                    // Si es acusar a Laura desde el menú de acusación, va al final bueno
                    else if (opt.text.includes('Laura') && step === 16) {
                        state.step = 19;
                    }
                    
                    // Si es acusar a otro desde el menú de acusación, va al final malo
                    else if (opt.text.includes('Richard') && step === 16) {
                        state.step = 17;
                    }
                    else if (opt.text.includes('David') && step === 16) {
                        state.step = 18;
                    }
                    
                    // Si es una opción normal
                    else {
                        const nextStep = opt.next !== undefined ? opt.next : step + 1;
                        state.step = nextStep;
                    }
                    
                    loadChapter(state.step);
                });
                optionsContainer.appendChild(btn);
            });

            inventoryPanel.classList.remove('visible');
        }

        function restartGame() {
            state = {
                step: 1,
                inventory: {
                    cartaMargaret: false,
                    informeToxico: false,
                    transferencias: false,
                    mensajesCifrados: false,

                    reciboVeterinario: false,
                    fotografiaCena: false,
                    declaracionConserje: false,
                    cartaAnonima: false,

                    declaracionVecino: false,
                    declaracionHija: false

                    david: false,
                    laura: false,
                    margaret: false
                },
                lugaresVisitados: {
                    pisoThomas: false,
                    farmacia: false,
                    hotel: false,
                    archivos: false,
                    pisoLaura: false,
                    declaraciones: false,
                    descifrar: false
                }
            };
            loadChapter(1);
        }

        restartBtn.addEventListener('click', restartGame);
        loadChapter(1);
    })();
