<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EL SECRETO DE CENTRAL PARK · novela criminal (18 capítulos + epílogo)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Georgia', 'Times New Roman', serif;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #1a2e2a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px;
        }
        .gamebook {
            max-width: 700px;
            width: 100%;
            background: #2d5a4a;
            border-radius: 40px 40px 28px 28px;
            box-shadow: 0 25px 45px #000000dd;
            border: 2px solid #7e9b8a;
            overflow: hidden;
        }
        .top-bar {
            background: #1e4d3e;
            padding: 10px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #5f8b7a;
        }
        .inventory-button {
            background: #2b6b58;
            border: 2px solid #8fc0aa;
            border-radius: 40px;
            padding: 6px 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            box-shadow: 0 4px 0 #14362b;
            transition: 0.08s linear;
            touch-action: manipulation;
        }
        .inventory-button:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #14362b;
        }
        .inv-icon {
            font-size: 1.5rem;
            color: #ffd78c;
        }
        .inv-text {
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .inventory-panel {
            background: #1d4f3f;
            border-bottom: 3px solid #7aa58f;
            padding: 12px 16px;
            display: none;
            flex-wrap: wrap;
            gap: 10px 15px;
            align-items: center;
            box-shadow: inset 0 1px 6px #00000055;
            max-height: 200px;
            overflow-y: auto;
        }
        .inventory-panel.visible {
            display: flex;
        }
        .inventory-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            background: #316e5b;
            padding: 6px 10px;
            border-radius: 20px;
            border: 1px solid #a3cfba;
            min-width: 70px;
        }
        .item-emoji {
            font-size: 1.5rem;
            filter: drop-shadow(2px 2px 2px black);
        }
        .item-label {
            color: #f0f4fa;
            font-size: 0.7rem;
            font-weight: 500;
            background: #1a493c;
            padding: 2px 6px;
            border-radius: 20px;
            white-space: nowrap;
        }
        .chapter-tag {
            background: #1e5242;
            color: #e3f7ed;
            padding: 12px 22px;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 1px;
            border-bottom: 2px solid #528d77;
        }
        .novel-area {
            background: #10382d;
            padding: 32px 28px 40px;
            color: #ebfff4;
            font-size: 1.18rem;
            line-height: 1.7;
            border-bottom: 2px solid #205542;
            max-height: 500px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #7bb8a0 #1e4a3c;
        }
        .novel-area::-webkit-scrollbar {
            width: 8px;
        }
        .novel-area::-webkit-scrollbar-track {
            background: #1e4a3c;
        }
        .novel-area::-webkit-scrollbar-thumb {
            background: #7bb8a0;
            border-radius: 10px;
        }
        .options-area {
            background: #0c3328;
            padding: 24px 22px 28px;
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
            border-top: 2px solid #3d7262;
        }
        .choice-btn {
            background: #2d6b59;
            border: none;
            border-bottom: 5px solid #14362b;
            color: #f5fbff;
            font-size: 1.05rem;
            font-weight: 500;
            padding: 14px 20px;
            border-radius: 50px;
            box-shadow: 0 6px 0 #0b2d23;
            transition: 0.06s linear;
            cursor: pointer;
            touch-action: manipulation;
            flex: 1 1 180px;
            min-width: 150px;
            text-align: center;
            line-height: 1.3;
        }
        .choice-btn:active {
            transform: translateY(5px);
            border-bottom-width: 2px;
            background: #1f5444;
        }
        .footer {
            background: #1a4638;
            padding: 14px 20px 16px;
            text-align: center;
            border-top: 2px solid #4f8270;
        }
        .restart-btn {
            background: #245b49;
            border: 1px solid #88b9a5;
            color: #ffefd3;
            padding: 12px 28px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: bold;
            border-bottom: 5px solid #12392d;
            cursor: pointer;
            display: inline-block;
            min-width: 220px;
        }
        .restart-btn:active {
            transform: translateY(5px);
            border-bottom-width: 2px;
        }
        .footnote {
            color: #7ba28f;
            font-size: 0.8rem;
            margin-top: 8px;
        }
    </style>
</head>
<body>
<div class="gamebook">
    <div class="top-bar">
        <div class="inventory-button" id="inventoryToggle">
            <span class="inv-icon">📦</span>
            <span class="inv-text">evidencias</span>
        </div>
    </div>

    <div class="inventory-panel" id="inventoryPanel"></div>

    <div class="chapter-tag" id="chapterDisplay">EL SECRETO DE CENTRAL PARK</div>
    
    <div class="novel-area" id="novelText"></div>

    <div class="options-area" id="optionsContainer"></div>

    <div class="footer">
        <div class="restart-btn" id="restartButton">↻ REINICIAR INVESTIGACIÓN</div>
        <div class="footnote">18 capítulos + epílogo · NYPD · 23 de mayo de 1997</div>
    </div>
</div>

<script>
    (function() {
        let state = {
            step: 1,
            inventory: {
                informeAutopsia: false,
                llamada911: false,
                cuchillo: false,
                billetera: false,
                ropaSangrienta: false,
                declaracionPortero: false,
                declaracionPadresDaphne: false,
                declaracionMadreChristopher: false,
                reciboZoloft: false,
                diarioDaphne: false,
                fotografiaPareja: false,
                fundaCuchillo: false,
                testimonioCompaneros: false,
                confesionDaphne: false,
                sentenciaChristopher: false
            },
            interrogatorios: {
                daphne: false,
                christopher: false,
                angelo: false,
                catherine: false,
                madreChristopher: false
            },
            lugaresVisitados: {
                centralPark: false,
                edificioMajestic: false,
                casaDaphne: false,
                casaChristopher: false,
                comisaria: false,
                juzgado: false
            },
            pistas: {
                llamadaRecibida: false,
                armaEncontrada: false,
                diarioRevelado: false,
                acusacionesCruzadas: false,
                juicioRealizado: false
            }
        };

        const chapterDisplay = document.getElementById('chapterDisplay');
        const novelText = document.getElementById('novelText');
        const optionsContainer = document.getElementById('optionsContainer');
        const inventoryPanel = document.getElementById('inventoryPanel');
        const inventoryToggle = document.getElementById('inventoryToggle');
        const restartBtn = document.getElementById('restartButton');

        inventoryToggle.addEventListener('click', (e) => {
            e.preventDefault();
            inventoryPanel.classList.toggle('visible');
            updateInventoryPanel();
        });

        function addItem(item) {
            state.inventory[item] = true;
            if (inventoryPanel.classList.contains('visible')) updateInventoryPanel();
        }

        function marcarInterrogatorio(persona) {
            state.interrogatorios[persona] = true;
        }

        function marcarLugar(lugar) {
            state.lugaresVisitados[lugar] = true;
        }

        function updateInventoryPanel() {
            let html = '<div class="inventory-item"><span class="item-emoji">🗽</span><span class="item-label">Caso Central Park</span></div>';
            
            const items = [
                { key: 'informeAutopsia', emoji: '🔬', label: 'Informe autopsia' },
                { key: 'llamada911', emoji: '📞', label: 'Llamada 911' },
                { key: 'cuchillo', emoji: '🔪', label: 'Cuchillo' },
                { key: 'billetera', emoji: '👛', label: 'Billetera McMorrow' },
                { key: 'ropaSangrienta', emoji: '👕', label: 'Ropa manchada' },
                { key: 'declaracionPortero', emoji: '🚪', label: 'Portero Majestic' },
                { key: 'declaracionPadresDaphne', emoji: '👨‍👩', label: 'Padres Abdela' },
                { key: 'declaracionMadreChristopher', emoji: '👩', label: 'Madre Vásquez' },
                { key: 'reciboZoloft', emoji: '💊', label: 'Receta Zoloft' },
                { key: 'diarioDaphne', emoji: '📓', label: 'Diario Daphne' },
                { key: 'fotografiaPareja', emoji: '📸', label: 'Foto pareja' },
                { key: 'fundaCuchillo', emoji: '👜', label: 'Funda cuchillo' },
                { key: 'testimonioCompaneros', emoji: '👥', label: 'Compañeros' },
                { key: 'confesionDaphne', emoji: '⚖️', label: 'Acuerdo Daphne' },
                { key: 'sentenciaChristopher', emoji: '🔨', label: 'Sentencia Chris' }
            ];
            
            items.forEach(item => {
                if (state.inventory[item.key]) {
                    html += `<div class="inventory-item"><span class="item-emoji">${item.emoji}</span><span class="item-label">${item.label}</span></div>`;
                }
            });
            
            inventoryPanel.innerHTML = html;
        }

        const chapters = {
            // CAPÍTULO 1 - INTRODUCCIÓN
            1: {
                title: 'EL SECRETO DE CENTRAL PARK',
                text: 'Nueva York, 23 de mayo de 1997. 6:30 AM. Central Park, Manhattan.\n\nEl detective Robert Sullivan llevaba veinte años en el Departamento de Policía de Nueva York. Había visto de todo, pero nada como esto.\n\nSu compañero, el detective Lee Furman, se acercó con el termo de café y cara de haber visto un fantasma.\n\n—Bob, tienes que verlo.\n\nEl sol comenzaba a iluminar el lago cuando Sullivan se asomó. Un cuerpo flotaba boca arriba, pero no era un ahogado. La cabeza apenas se sostenía del cuello, la cara era irreconocible, y del abdomen abierto sobresalían los intestinos.\n\n—¿Identidad?\n\n—Michael McMorrow, 44 años. Agente inmobiliario. Vivía con su madre en el Upper West Side. Anoche salió a beber con unos amigos y no volvió.\n\nSullivan observó las heridas. Puñaladas, muchas. Y luego, el trabajo de destripamiento fue... metódico.\n\n—Esto no es un robo que salió mal. Es una ejecución. Pero... ¿quién hace algo así?\n\nFurman señaló algo.\n\n—Eso no es todo. A las 12:47 de esta madrugada, un matrimonio del edificio Majestic denunció la desaparición de su hija de quince años. Se llama Daphne Abdela. Y a la 1:34, una chica llamó al 911 diciendo que había un cadáver en el lago.\n\n—¿Y?\n\n—La llamada se hizo desde el edificio Majestic. Desde el mismo domicilio de la chica desaparecida.\n\nSullivan sintió un escalofrío.\n\n—Vamos a Majestic.',
                options: [
                    { text: 'Comenzar la investigación', next: 2 }
                ]
            },
            
            // CAPÍTULO 2 - OFICINA (MENÚ PRINCIPAL - FASE 1)
            2: {
                title: 'OFICINA DE DETECTIVES · NYPD',
                text: 'Nueva York, 23 de mayo de 1997. 10:30 AM. Oficina de Detectives del NYPD.\n\nSullivan y Furman revisaron las primeras informaciones. El capitán Thomas Reilly los reunió.\n\n—Tenemos dos sospechosos menores de edad, ambos de quince años. Daphne Abdela, hija adoptiva de un ejecutivo israelí multimillonario, vive en el Majestic, uno de los edificios más exclusivos de Central Park West. Christopher Vásquez, hijo de madre soltera, vive en East Harlem, es monaguillo y boy scout. Son novios desde hace seis semanas.\n\n—¿Cómo se conocieron?\n\n—Patinando en Central Park.\n\n—¿Y qué hacían con McMorrow?\n\n—No lo sabemos. Ambos están en custodia. Ella dice que lo vio todo y que Christopher es el asesino. Él dice que ella lo hizo. Pero hay algo más: cuando la policía llegó al edificio Majestic para investigar la desaparición de Daphne, el portero dijo que la chica estaba en la lavandería de la planta baja con un chico. Los agentes abrieron la puerta y los encontraron desnudos en una bañera, lavándose mutuamente.\n\n—¿Lavándose?\n\n—Sí. Dijeron que habían caído patinando. Pero había sangre en el suelo.\n\n—Quiero interrogar a esos chicos. Pero antes necesito ver la escena y el edificio. Quiero pruebas sólidas antes de sentarme con ellos.',
                options: [
                    { text: '🏢 Ir al edificio Majestic', next: 5 },
                    { text: '🗽 Inspeccionar la escena del crimen', next: 6 },
                    { text: '👥 Hablar con los padres de Daphne', next: 7 },
                    { text: '📂 Revisar informe de autopsia', next: 8 }
                ]
            },
            
            // CAPÍTULO 3 - INTERROGATORIO DAPHNE (solo después de haber investigado)
            3: {
                title: 'INTERROGATORIO · DAPHNE ABDELA',
                text: '24 de mayo de 1997. 10:00 AM. Centro de Detención Juvenil Spofford, Bronx.\n\nDaphne Abdela tenía quince años, pero su mirada era fría y calculadora. Hija adoptiva de Angelo Abdela, vicepresidente de una multinacional de alimentación, y Catherine Abdela, exmodelo francesa. Vivía en un ático de dos millones de dólares en el Majestic, frente a Central Park.\n\n—No fui yo —dijo nada más sentarse—. Fue Christopher. Yo solo estaba allí.\n\n—Cuéntame qué pasó.\n\n—Estábamos en el parque, bebiendo. Michael se acercó, hablamos. Christopher se puso celoso porque Michael me abrazó para darme calor cuando salí del agua. Sacó una navaja y lo apuñaló. Yo intenté pararlo, pero no pude. Me amenazó con matarme a mí también.\n\n—¿Y después?\n\n—Me dijo que le ayudara a deshacerse del cuerpo. Que lo destripáramos para que no flotara. Yo no quería, pero tuve miedo.\n\n—¿Quién dio la orden de destripario?\n\n—Él.\n\n—¿Y la llamada al 911?\n\n—La hice yo. Para que encontraran el cuerpo. Quería ayudar.\n\nSullivan la observó. No había una sola lágrima.\n\n—Tus padres denunciaron tu desaparición a las 12:47. A la 1:34 llamaste al 911. ¿Dónde estuviste esa hora?\n\n—En casa.\n\n—¿Lavándote la sangre?\n\nDaphne dudó.\n\n—Fui al lavadero. Tenía una herida.\n\n—¿Dónde está la ropa que llevabas?\n\n—No lo sé.\n\nSullivan guardó silencio.\n\n—Mañana hablaremos otra vez.',
                options: [
                    { text: 'Volver a la oficina', next: 2 }
                ],
                onEnter: () => { 
                    marcarInterrogatorio('daphne'); 
                }
            },
            
            // CAPÍTULO 4 - INTERROGATORIO CHRISTOPHER (solo después de haber investigado)
            4: {
                title: 'INTERROGATORIO · CHRISTOPHER VÁSQUEZ',
                text: '24 de mayo de 1997. 2:30 PM. Centro de Detención Juvenil Spofford, Bronx.\n\nChristopher Vásquez era el opuesto de Daphne. Callado, educado, con ojos de niño asustado. Monaguillo en una iglesia católica, boy scout, estudiante del tradicional colegio privado Beekman. Su madre hacía enormes esfuerzos para pagarle la escuela.\n\n—Yo no lo maté —susurró—. Fue ella.\n\n—Cuéntame.\n\n—Estábamos en el lago. Daphne propuso nadar desnudos. Hacía frío, al salir temblábamos. Michael me dio su chaqueta. Luego abrazó a Daphne para darle calor. Ella se rió. Yo no sentí celos, no sé por qué dice eso. Luego ella sacó una navaja y empezó a apuñalarlo. Yo intenté detenerla, pero no pude.\n\n—¿Tú no tocaste el cuchillo?\n\n—Sí, lo toqué. Intenté quitárselo. Pero ella no soltaba.\n\n—¿Quién ordenó destriparlo?\n\n—Ella. Dijo: "Destriápalo, así no flota". Me obligó a ayudarla a mover el cuerpo. Me amenazó.\n\n—¿Por qué no huiste?\n\n—Tenía miedo. Ella es... no sé cómo explicarlo. Cuando se enfada, da miedo.\n\n—Fuisteis juntos a su edificio. Os lavasteis juntos.\n\n—Ella dijo que teníamos que limpiarnos. Me llevó al lavadero.\n\n—¿Y la sangre en tus manos?\n\nChristopher miró sus manos.\n\n—Intenté pararla. Cuando vi a Michael en el suelo, intenté reanimarlo. Me manché.\n\n—Pero no llamaste a la policía.\n\n—Ella dijo que no. Que si llamábamos, nos mataría.\n\n—¿Tomas algo? ¿Medicación?\n\n—Tomo Zoloft. Por la separación de mis padres. Mi abogado dice que la mezcla con alcohol pudo afectarme.\n\nSullivan asintió.\n\n—Mañana seguimos.',
                options: [
                    { text: 'Volver a la oficina', next: 2 }
                ],
                onEnter: () => { 
                    marcarInterrogatorio('christopher'); 
                    addItem('reciboZoloft');
                }
            },
            
            // CAPÍTULO 5 - EDIFICIO MAJESTIC
            5: {
                title: 'EL EDIFICIO MAJESTIC',
                text: '23 de mayo de 1997. 12:00 PM. 115 Central Park West, edificio Majestic.\n\nEl Majestic era una joya arquitectónica art déco, con vistas privilegiadas a Central Park. Seguridad veinticuatro horas, conserjes, porteros de uniforme. El ático de los Abdela valía dos millones de dólares.\n\nEl detective Furman habló con el portero de la noche anterior.\n\n—Sí, vi llegar a Daphne con el chico sobre la 1 de la madrugada —dijo el portero—. Estaban mojados. Fueron directos al área de lavandería, en la planta baja.\n\n—¿Los vio entrar al lavadero?\n\n—Sí.\n\n—¿Vio sangre?\n\n—No, pero... ahora que lo dice, el chico llevaba las manos así, como escondiéndolas.\n\nFueron al lavadero. Aún había restos de agua en el suelo. Las huellas de sangre eran tenues, pero el luminol las revelaría después. En un rincón, una toalla manchada de marrón.\n\n—Esto es sangre —dijo el forense.\n\n—Y allí —señaló Furman—, una chaqueta. Parece de hombre.\n\nEra la chaqueta de Michael McMorrow. La había llevado Christopher, la que Michael le prestó para darle calor.\n\nSullivan examinó el lugar.\n\n—Daphne conocía este edificio. Sabía que aquí podía limpiarse sin que nadie la viera. Sabía que el portero no la detendría.',
                options: [
                    { text: 'Volver a la oficina', next: 2 }
                ],
                onEnter: () => { 
                    marcarLugar('edificioMajestic'); 
                    addItem('declaracionPortero');
                    addItem('ropaSangrienta');
                }
            },
            
            // CAPÍTULO 6 - ESCENA DEL CRIMEN
            6: {
                title: 'LA ESCENA · CENTRAL PARK',
                text: '23 de mayo de 1997. 9:00 AM. Central Park, orilla del lago.\n\nLos forenses trabajaban alrededor del cuerpo. Sullivan observó los alrededores. El lugar estaba apartado, cerca de una caseta de botes. Perfecto para no ser visto.\n\nEl médico forense se acercó.\n\n—Treinta y ocho puñaladas. Seis de ellas alcanzaron el corazón. Pero lo peor vino después: le cortaron las orejas, la nariz, la mano derecha, y lo destriparon mientras aún respiraba o acababa de morir.\n\n—¿Con qué arma?\n\n—Un cuchillo de unos quince centímetros. Filo doble. No lo hemos encontrado.\n\n—¿Y esto?\n\nEl forense mostró una bolsa. Dentro, una billetera.\n\n—La billetera de McMorrow. Estaba a unos metros, entre los arbustos. Sin dinero, pero con documentos. El asesino la arrojó allí.\n\n—¿Huellas?\n\n—Muchas. De los dos, probablemente.\n\n—¿Por qué arrojar la billetera y no quedársela?\n\n—Quizá no querían que pareciera un robo. O quizá solo querían borrar pruebas.\n\nSullivan observó el lago. El cuerpo había sido lastrado con piedras, pero no lo suficiente. Por eso flotó.\n\n—"Destriápalo, así no flota" —murmuró—. Alguien sabía algo de anatomía.',
                options: [
                    { text: 'Volver a la oficina', next: 2 }
                ],
                onEnter: () => { 
                    marcarLugar('centralPark'); 
                    addItem('informeAutopsia');
                    addItem('billetera');
                }
            },
            
            // CAPÍTULO 7 - PADRES DE DAPHNE
            7: {
                title: 'LOS PADRES DE DAPHNE',
                text: '23 de mayo de 1997. 5:30 PM. Edificio Majestic, ático de los Abdela.\n\nCatherine y Angelo Abdela los recibieron en un salón decorado con obras de arte y un gran retrato de Leah Rabin, viuda del primer ministro israelí. Catherine, exmodelo francesa de cuarenta y dos años, tenía los ojos hinchados de llorar. Angelo, empresario israelí de cuarenta y uno, mantenía la compostura a duras penas.\n\n—Dimos todo lo mejor —dijo Catherine—. Viajes, cultura, libros, más de trescientos en su habitación. Nunca quisimos mimarla en exceso, solo darle libertad. Pero cuando empezó a dar problemas, todo se complicó.\n\n—¿Qué problemas?\n\n—En octavo grado, el Columbia Grammar nos pidió que la sacáramos. Demasiado rebelde. La matriculamos en Loyola, un colegio jesuita muy estricto. Pero solo empeoró. La expulsaron por conducta.\n\n—¿Drogas? ¿Alcohol?\n\n—Sí. La llevamos a rehabilitación. Fue un par de veces, pero no sirvió.\n\n—Su hija amenazó a alguien esa noche.\n\nAngelo asintió.\n\n—Discutió con unos jóvenes en el parque. Les gritó: "Voy a matar a alguien esta noche".\n\n—¿Por qué no nos lo dijo antes?\n\n—Creímos que era una bravuconada. Ella siempre decía cosas así.\n\n—¿Y la orden de alejamiento que solicitó contra su hija?\n\nAngelo enmudeció.\n\n—Hubo momentos... difíciles. Temíamos por nuestra seguridad.\n\nCatherine rompió a llorar.\n\n—No entendemos qué pasó. Dimos todo. Todo.\n\nSullivan guardó silencio.\n\n—Gracias por su colaboración.',
                options: [
                    { text: 'Volver a la oficina', next: 2 }
                ],
                onEnter: () => { 
                    marcarInterrogatorio('angelo'); 
                    marcarInterrogatorio('catherine');
                    addItem('declaracionPadresDaphne');
                }
            },
            
            // CAPÍTULO 8 - INFORME AUTOPSIA
            8: {
                title: 'INFORME DE AUTOPSIA',

        function loadChapter(step) {
            const chap = chapters[step];
            if (!chap) return;

            chapterDisplay.innerText = chap.title;
            novelText.innerText = chap.text;
            if (chap.onEnter) chap.onEnter();

            // Generar opciones dinámicamente según el progreso
            let availableOptions = [];

            if (step === 2) {
                // FASE 1: Opciones iniciales (sin interrogatorios)
                availableOptions = [
                    { text: '🏢 Ir al edificio Majestic', next: 5 },
                    { text: '🗽 Inspeccionar la escena del crimen', next: 6 },
                    { text: '👥 Hablar con los padres de Daphne', next: 7 },
                    { text: '📂 Revisar informe de autopsia', next: 8 }
                ];
                
                // Si ya hemos visitado Majestic y la escena del crimen, aparecen los interrogatorios
                if (state.lugaresVisitados.edificioMajestic && state.lugaresVisitados.centralPark) {
                    if (!state.interrogatorios.daphne) {
                        availableOptions.push({ text: '🔍 Interrogar a Daphne Abdela', next: 3 });
                    }
                    if (!state.interrogatorios.christopher) {
                        availableOptions.push({ text: '🔍 Interrogar a Christopher Vásquez', next: 4 });
                    }
                }
                
                // Si ya hemos interrogado a ambos, podemos hablar con la madre de Christopher
                if (state.interrogatorios.daphne && state.interrogatorios.christopher && !state.interrogatorios.madreChristopher) {
                    availableOptions.push({ text: '👩 Hablar con madre de Christopher', next: 9 });
                }
                
                // Si ya tenemos las declaraciones de los padres y la madre, podemos registrar casas
                if (state.interrogatorios.madreChristopher && !state.lugaresVisitados.casaDaphne) {
                    availableOptions.push({ text: '🔍 Registrar habitación de Daphne', next: 10 });
                }
                
                // Si ya tenemos el registro de Daphne, pasamos a fase 2
                if (state.lugaresVisitados.casaDaphne && !state.pistas.llamadaRecibida) {
                    availableOptions = [
                        { text: '📞 Investigar la llamada al 911', next: 12 },
                        { text: '👥 Hablar con compañeros de colegio', next: 13 },
                        { text: '🔪 Buscar el arma homicida', next: 14 },
                        { text: 'Volver a la oficina', next: 2 }
                    ];
                }
                
                // Si ya tenemos el arma, vemos las acusaciones
                if (state.pistas.armaEncontrada && !state.pistas.acusacionesCruzadas) {
                    availableOptions = [
                        { text: '⚖️ Las acusaciones de Daphne', next: 15 },
                        { text: 'Volver a la oficina', next: 2 }
                    ];
                }
                
                // Si ya tenemos las acusaciones, vamos al juicio
                if (state.pistas.acusacionesCruzadas && !state.pistas.juicioRealizado) {
                    availableOptions = [
                        { text: '⚖️ Juicio de Christopher', next: 16 }
                    ];
                }
            } else if (chap.options) {
                // Para capítulos que no son el menú principal, usar sus opciones predefinidas
                availableOptions = chap.options;
            }

            optionsContainer.innerHTML = '';
            availableOptions.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.innerText = opt.text;
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    const nextStep = opt.next !== undefined ? opt.next : step + 1;
                    state.step = nextStep;
                    loadChapter(state.step);
                });
                optionsContainer.appendChild(btn);
            });

            inventoryPanel.classList.remove('visible');
        }

        function restartGame() {
            state = {
                step: 1,
                inventory: {
                    informeAutopsia: false,
                    llamada911: false,
                    cuchillo: false,
                    billetera: false,
                    ropaSangrienta: false,
                    declaracionPortero: false,
                    declaracionPadresDaphne: false,
                    declaracionMadreChristopher: false,
                    reciboZoloft: false,
                    diarioDaphne: false,
                    fotografiaPareja: false,
                    fundaCuchillo: false,
                    testimonioCompaneros: false,
                    confesionDaphne: false,
                    sentenciaChristopher: false
                },
                interrogatorios: {
                    daphne: false,
                    christopher: false,
                    angelo: false,
                    catherine: false,
                    madreChristopher: false
                },
                lugaresVisitados: {
                    centralPark: false,
                    edificioMajestic: false,
                    casaDaphne: false,
                    casaChristopher: false,
                    comisaria: false,
                    juzgado: false
                },
                pistas: {
                    llamadaRecibida: false,
                    armaEncontrada: false,
                    diarioRevelado: false,
                    acusacionesCruzadas: false,
                    juicioRealizado: false
                }
            };
            loadChapter(1);
        }

        restartBtn.addEventListener('click', restartGame);
        loadChapter(1);
    })();
