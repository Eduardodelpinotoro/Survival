<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EL CASO DEL ARQUITECTO · novela completa (18 capítulos + epílogo)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Georgia', 'Times New Roman', serif;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #1a1e24;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px;
        }
        .gamebook {
            max-width: 700px;
            width: 100%;
            background: #2c3e4f;
            border-radius: 40px 40px 28px 28px;
            box-shadow: 0 25px 45px #000000dd;
            border: 2px solid #4a6a8a;
            overflow: hidden;
        }
        .top-bar {
            background: #1e3142;
            padding: 10px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #3f5770;
        }
        .inventory-button {
            background: #253d53;
            border: 2px solid #6083a8;
            border-radius: 40px;
            padding: 6px 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            box-shadow: 0 4px 0 #102433;
            transition: 0.08s linear;
            touch-action: manipulation;
        }
        .inventory-button:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #102433;
        }
        .inv-icon {
            font-size: 1.5rem;
            color: #ffd78c;
        }
        .inv-text {
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .inventory-panel {
            background: #1d3143;
            border-bottom: 3px solid #4f6f90;
            padding: 12px 16px;
            display: none;
            flex-wrap: wrap;
            gap: 10px 15px;
            align-items: center;
            box-shadow: inset 0 1px 6px #00000055;
            max-height: 200px;
            overflow-y: auto;
        }
        .inventory-panel.visible {
            display: flex;
        }
        .inventory-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            background: #2b4058;
            padding: 6px 10px;
            border-radius: 20px;
            border: 1px solid #769dc9;
            min-width: 70px;
        }
        .item-emoji {
            font-size: 1.5rem;
            filter: drop-shadow(2px 2px 2px black);
        }
        .item-label {
            color: #f0f4fa;
            font-size: 0.7rem;
            font-weight: 500;
            background: #1c3142;
            padding: 2px 6px;
            border-radius: 20px;
            white-space: nowrap;
        }
        .chapter-tag {
            background: #1f3345;
            color: #d7e7ff;
            padding: 12px 22px;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 1px;
            border-bottom: 2px solid #3b5773;
        }
        .novel-area {
            background: #14222f;
            padding: 32px 28px 40px;
            color: #ecf5ff;
            font-size: 1.18rem;
            line-height: 1.7;
            border-bottom: 2px solid #1f3345;
            max-height: 500px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #527a9e #1c2e3f;
        }
        .novel-area::-webkit-scrollbar {
            width: 8px;
        }
        .novel-area::-webkit-scrollbar-track {
            background: #1c2e3f;
        }
        .novel-area::-webkit-scrollbar-thumb {
            background: #527a9e;
            border-radius: 10px;
        }
        .options-area {
            background: #11212e;
            padding: 24px 22px 28px;
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
            border-top: 2px solid #2a4055;
        }
        .choice-btn {
            background: #263f56;
            border: none;
            border-bottom: 5px solid #102433;
            color: #f5fbff;
            font-size: 1.05rem;
            font-weight: 500;
            padding: 14px 20px;
            border-radius: 50px;
            box-shadow: 0 6px 0 #0d1f2e;
            transition: 0.06s linear;
            cursor: pointer;
            touch-action: manipulation;
            flex: 1 1 180px;
            min-width: 150px;
            text-align: center;
            line-height: 1.3;
        }
        .choice-btn:active {
            transform: translateY(5px);
            border-bottom-width: 2px;
            background: #1d3348;
        }
        .footer {
            background: #1c2b39;
            padding: 14px 20px 16px;
            text-align: center;
            border-top: 2px solid #38536d;
        }
        .restart-btn {
            background: #324252;
            border: 1px solid #7089a8;
            color: #ffefd3;
            padding: 12px 28px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: bold;
            border-bottom: 5px solid #1c2938;
            cursor: pointer;
            display: inline-block;
            min-width: 220px;
        }
        .restart-btn:active {
            transform: translateY(5px);
            border-bottom-width: 2px;
        }
        .footnote {
            color: #5f7c9c;
            font-size: 0.8rem;
            margin-top: 8px;
        }
    </style>
</head>
<body>
<div class="gamebook">
    <div class="top-bar">
        <div class="inventory-button" id="inventoryToggle">
            <span class="inv-icon">📦</span>
            <span class="inv-text">pruebas</span>
        </div>
    </div>

    <div class="inventory-panel" id="inventoryPanel"></div>

    <div class="chapter-tag" id="chapterDisplay">EL CASO DEL ARQUITECTO</div>
    
    <div class="novel-area" id="novelText"></div>

    <div class="options-area" id="optionsContainer"></div>

    <div class="footer">
        <div class="restart-btn" id="restartButton">↻ REINICIAR INVESTIGACIÓN</div>
        <div class="footnote">18 capítulos + epílogo · NYPD</div>
    </div>
</div>

<script>
    (function() {
        let state = {
            step: 1,
            inventory: {
                cartaMargaret: false,
                informeToxico: false,
                transferencias: false,
                mensajesCifrados: false,
                mensajesDescifrados: false,
                ticketGasolinera: false,
                facturaHotelRichard: false,
                facturaHotelLaura: false,
                diarioMichael: false,
                reciboVeterinario: false,
                fotografiaCena: false,
                declaracionConserje: false,
                cartaAnonima: false,
                declaracionPatricia: false,
                declaracionVecino: false,
                declaracionHija: false
            },
            interrogatorios: {
                richard: false,
                david: false,
                laura: false,
                margaret: false
            },
            lugaresVisitados: {
                pisoThomas: false,
                farmacia: false,
                hotel: false,
                archivos: false,
                declaraciones: false,
                descifrar: false
            },
            pistas: {
                fotografiaRevelada: false,
                lauraStone: false,
                ordenRegistro: false
            }
        };

        const chapterDisplay = document.getElementById('chapterDisplay');
        const novelText = document.getElementById('novelText');
        const optionsContainer = document.getElementById('optionsContainer');
        const inventoryPanel = document.getElementById('inventoryPanel');
        const inventoryToggle = document.getElementById('inventoryToggle');
        const restartBtn = document.getElementById('restartButton');

        inventoryToggle.addEventListener('click', (e) => {
            e.preventDefault();
            inventoryPanel.classList.toggle('visible');
            updateInventoryPanel();
        });

        function addItem(item) {
            state.inventory[item] = true;
            if (inventoryPanel.classList.contains('visible')) updateInventoryPanel();
        }

        function marcarInterrogatorio(persona) {
            state.interrogatorios[persona] = true;
        }

        function marcarLugar(lugar) {
            state.lugaresVisitados[lugar] = true;
        }

        function updateInventoryPanel() {
            let html = '<div class="inventory-item"><span class="item-emoji">📋</span><span class="item-label">Caso 0893</span></div>';
            
            const items = [
                { key: 'cartaMargaret', emoji: '💌', label: 'Carta Margaret' },
                { key: 'informeToxico', emoji: '🧪', label: 'Informe tox' },
                { key: 'transferencias', emoji: '💰', label: 'Transferencias' },
                { key: 'mensajesCifrados', emoji: '📱', label: 'Msjs cifrados' },
                { key: 'mensajesDescifrados', emoji: '🔓', label: 'Msjs descif' },
                { key: 'ticketGasolinera', emoji: '⛽', label: 'Ticket gas' },
                { key: 'facturaHotelRichard', emoji: '🏨', label: 'Hotel (R)' },
                { key: 'facturaHotelLaura', emoji: '🏨', label: 'Hotel (L)' },
                { key: 'diarioMichael', emoji: '📓', label: 'Diario M' },
                { key: 'reciboVeterinario', emoji: '🧴', label: 'Recibo ket' },
                { key: 'fotografiaCena', emoji: '📸', label: 'Foto cena' },
                { key: 'declaracionConserje', emoji: '👤', label: 'Conserje' },
                { key: 'cartaAnonima', emoji: '✉️', label: 'Carta anón' },
                { key: 'declaracionPatricia', emoji: '👩', label: 'Patricia' },
                { key: 'declaracionVecino', emoji: '👨', label: 'Vecino' },
                { key: 'declaracionHija', emoji: '🧒', label: 'Hija' }
            ];
            
            items.forEach(item => {
                if (state.inventory[item.key]) {
                    html += `<div class="inventory-item"><span class="item-emoji">${item.emoji}</span><span class="item-label">${item.label}</span></div>`;
                }
            });
            
            inventoryPanel.innerHTML = html;
        }

        const chapters = {
            // CAPÍTULO 1 - INTRODUCCIÓN
            1: {
                title: 'EL CASO DEL ARQUITECTO',
                text: 'Nueva York, 10 de marzo de 2025. 9:15 AM. Oficina de Detectives del NYPD, 1 Police Plaza, Manhattan.\n\nEl detective Daniel Cross llevaba quince años en el cuerpo, los últimos ocho en la unidad de homicidios. Desde su despacho, con vistas al puente de Brooklyn, había resuelto decenas de casos. Pero este era diferente.\n\nSu compañera, María Torres, periodista freelance que colaboraba con la policía en casos complejos, entró con dos carpetas y un café.\n\n—Victor quiere vernos —dijo—. Tiene algo.\n\nVictor Ramos, el jefe de la unidad, los esperaba en su despacho. Sobre la mesa, tres carpetes y una fotografía.\n\n—Dos muertos —dijo Victor—. Michael Stone, arquitecto, 45 años. Apareció en su coche en Brooklyn, accidente de tráfico el 20 de noviembre. Oficialmente cerrado. Thomas Reed, periodista, 42 años. Apareció en su piso de Queens el 3 de marzo. Oficialmente, tampoco hay caso.\n\n—¿Y entonces? —preguntó Daniel.\n\n—Ambos tenían ketamina en sangre. Y ambos, antes de morir, estaban investigando lo mismo: una trama de corrupción en la constructora Stone & Associates.\n\n—¿Quiénes son los sospechosos?\n\nVictor señaló las carpetas.\n\n—Richard Stone, hermano de Michael y socio en la empresa. David Morrison, editor del periódico donde trabajaba Thomas, y su ex pareja. Y Laura Reed, ex mujer de Thomas. Todos tienen algo que ocultar. Todos mienten. Pero las coartadas... son sólidas. Demasiado sólidas.\n\nDaniel cogió las carpetas.\n\n—Empezamos hoy.',
                options: [
                    { text: '🚗 Comenzar la investigación', next: 2 }
                ]
            },
            
            // CAPÍTULO 2 - OFICINA DE DETECTIVES (MENÚ PRINCIPAL)
            2: {
                title: 'OFICINA DE DETECTIVES · NYPD',
                text: 'Nueva York, 10 de marzo de 2025. 11:30 AM. Oficina de Detectives del NYPD.\n\nDaniel y María revisaron las carpetas en su despacho. Victor se asomó a la puerta.\n\n—Podéis investigar por donde queráis. Interrogar a los sospechosos, visitar escenarios, buscar pruebas. Todo está abierto. Cuando tengáis suficientes pruebas, ya sabéis dónde encontrarme para la acusación.\n\nMaría señaló la fotografía que Victor había dejado sobre la mesa.\n\n—¿Y esto?\n\n—Una foto de una cena de Stone & Associates. Michael, Richard, y otros. La encontraron en el piso de Thomas. Puede ser importante.\n\nDaniel asintió.\n\n—Vamos allá.',
                options: [
                    { text: '🔍 Interrogar a Richard Stone (Brooklyn)', next: 3 },
                    { text: '🔍 Interrogar a David Morrison (Manhattan)', next: 4 },
                    { text: '🔍 Interrogar a Laura Reed (Queens)', next: 5 },
                    { text: '👵 Hablar con Margaret Stone (madre)', next: 6 },
                    { text: '🏢 Ir al piso de Thomas Reed (Queens)', next: 7 },
                    { text: '📂 Revisar los informes con Victor', next: 8 },
                    { text: '📸 Investigar la fotografía', next: 11 },
                    { text: '⚖️ ACUSAR A ALGUIEN', next: 16 }
                ]
            },
            
            // CAPÍTULO 3 - INTERROGATORIO RICHARD
            3: {
                title: 'INTERROGATORIO · RICHARD STONE',
                text: 'Brooklyn, 10 de marzo. 2:30 PM. Stone & Associates, Brooklyn Heights.\n\nRichard Stone los recibió en su despacho, en un rascacielos con vistas al East River. Traje caro, sonrisa profesional, pero sus ojos delataban nerviosismo.\n\n—Detective Cross —dijo—. Lamento lo de mi hermano, pero no sé qué más puedo decir.\n\n—¿Cuándo fue la última vez que habló con él?\n\n—El día antes del accidente, 19 de noviembre. Discutimos.\n\n—¿Sobre qué?\n\n—Sobre la empresa. Él quería hacer cambios. Yo no estaba de acuerdo.\n\n—¿Cambios como denunciar sobornos?\n\nRichard pestañeó.\n\n—No sé de qué habla.\n\n—Su hermano iba a denunciar. Usted lo sabía.\n\n—Eran invenciones suyas. Michael estaba... inestable.\n\n—¿Inestable?\n\n—Sí. Depresión, paranoia. Cosas así.\n\n—¿Dónde estaba la noche del 20 de noviembre?\n\n—En mi casa, en Brooklyn Heights. Con mi mujer.\n\n—¿Toda la noche?\n\n—Sí.\n\n—Su mujer dice que salió una hora.\n\nRichard dudó.\n\n—Fui a comprar algo.\n\n—¿A las diez de la noche?\n\n—Tenía antojo.\n\nDaniel lo miró fijamente.\n\n—Miente —dijo en voz baja.\n\n—¿Perdón?\n\n—Nada. Gracias por su tiempo.',
                options: [
                    { text: '🔙 Volver a la oficina', next: 2 }
                ],
                onEnter: () => { marcarInterrogatorio('richard'); }
            },
            
            // CAPÍTULO 4 - INTERROGATORIO DAVID
            4: {
                title: 'INTERROGATORIO · DAVID MORRISON',
                text: 'Manhattan, 11 de marzo. 10:00 AM. New York Chronicle, Midtown.\n\nDavid Morrison era un hombre de cincuenta años, elegante, con ojeras profundas y manos temblorosas. Su despacho en el corazón de Manhattan estaba lleno de periódicos antiguos.\n\n—Thomas era un gran periodista —dijo, con voz quebrada—. Esto es una pérdida terrible.\n\n—¿Cuándo habló con él por última vez?\n\n—El 2 de marzo. Discutimos.\n\n—¿Por qué?\n\n—Por su obsesión con el caso Stone. Le dije que lo dejara, que era peligroso.\n\n—¿O por celos?\n\nDavid enmudeció.\n\n—Tuvieron una relación, ¿no? Él la terminó. Usted no lo superó.\n\n—Eso es asunto privado.\n\n—Hay mensajes suyos. Amenazas.\n\n—Eran... eran cosas del momento. No iba en serio.\n\n—¿Dónde estaba la noche que murió Thomas, el 3 de marzo?\n\n—En mi casa, en el Upper West Side. Solo.\n\n—¿Alguien puede confirmarlo?\n\n—No. Vivo solo.\n\n—¿Y la noche del accidente de Michael Stone, el 20 de noviembre?\n\n—También en casa. Solo.\n\n—¿Siempre solo?\n\n—Sí.',
                options: [
                    { text: '🔙 Volver a la oficina', next: 2 }
                ],
                onEnter: () => { marcarInterrogatorio('david'); }
            },
            
            // CAPÍTULO 5 - INTERROGATORIO LAURA
            5: {
                title: 'INTERROGATORIO · LAURA REED',
                text: 'Queens, 11 de marzo. 1:00 PM. Astoria, Queens.\n\nLaura Reed era una mujer de cuarenta años, atractiva, bien vestida, con una expresión calculadora. La cita fue en un café cerca de su casa.\n\n—Thomas y yo nos divorciamos hace años —dijo—. Pero éramos amigos. Por nuestra hija.\n\n—¿Cuándo habló con él por última vez?\n\n—El 2 de marzo. Estaba asustado.\n\n—¿Por qué?\n\n—Por su investigación. Alguien lo amenazaba.\n\n—¿Quién?\n\n—No lo dijo. Pero mencionó a David. Y a Richard.\n\n—¿Y usted? ¿Tenía algún problema con él?\n\nLaura sonrió con amargura.\n\n—Me debía dinero. Mucho. 50.000 dólares. Pero no lo mataría por eso.\n\n—¿Dónde estaba la noche que murió, el 3 de marzo?\n\n—En casa, en Astoria. Con mi hija. Vimos películas hasta tarde.\n\n—¿Su hija puede confirmarlo?\n\n—Tiene doce años. Dijo que sí.\n\n—Los niños pueden mentir.\n\n—Los niños mienten, sí. Pero no cuando quieren a su padre.\n\n—¿Y la noche del 20 de noviembre?\n\n—También en casa. Con mi hija.',
                options: [
                    { text: '🔙 Volver a la oficina', next: 2 }
                ],
                onEnter: () => { marcarInterrogatorio('laura'); }
            },
            
            // CAPÍTULO 6 - MARGARET STONE
            6: {
                title: 'LA MADRE DEL ARQUITECTO',
                text: 'Brooklyn, 10 de marzo. 4:30 PM. Bay Ridge, Brooklyn.\n\nMargaret Stone vivía sola en una casa modesta. Tenía sesenta y cinco años, el pelo cano, y una expresión de duelo reciente.\n\n—Gracias por venir —dijo, sirviendo café—. Nadie más quiso escucharme.\n\n—Cuénteme lo que sabe, señora Stone.\n\n—Mi hijo era meticuloso. Apuntaba todo. Sus proyectos, sus reuniones, sus sospechas. Los últimos meses, escribía mucho. Y siempre lo mismo: "Me vigilan." "Me siguen." "No sé quién, pero me vigilan."\n\n—¿Tenía enemigos?\n\n—En el trabajo, sí. Stone & Associates es muy competitiva. Michael había descubierto algo. Algo sobre sobornos. Iba a denunciar.\n\n—¿A quién?\n\n—A su socio, Richard Stone. Su propio hermano. Y a otros. Gente del ayuntamiento.\n\n—¿Y qué pasó?\n\n—El accidente. Una semana antes de denunciar. La policía dijo que se salió de la carretera. Que iba demasiado rápido. Pero Michael no conducía rápido. Era prudente. Alguien lo drogó.\n\n—¿Tiene pruebas?\n\nMargaret fue a una habitación y volvió con una carpeta.\n\n—Los informes médicos. Los análisis de sangre que le hicieron en el hospital. Tiene ketamina. Un anestésico de animales. ¿Qué hacía eso en la sangre de mi hijo?',
                options: [
                    { text: '📂 Recoger los informes', next: 2 }
                ],
                onEnter: () => { 
                    marcarInterrogatorio('margaret'); 
                    addItem('informeToxico'); 
                    addItem('cartaMargaret');
                }
            },
            
            // CAPÍTULO 7 - PISO DE THOMAS
            7: {
                title: 'EL PISO DE THOMAS REED',
                text: 'Queens, 11 de marzo. 4:00 PM. Astoria, 34th Street.\n\nEl piso de Thomas estaba precintado. Victor consiguió la llave de la policía local.\n\n—Registrad todo —dijo Daniel—. Buscad algo que no encaje.\n\nEl piso era pequeño, abarrotado de libros y papeles. María revisaba los cajones mientras Daniel examinaba la mesilla.\n\nEncontraron una libreta. No era un diario, sino anotaciones sueltas. Fechas, nombres, cantidades. Y algo escrito en los márgenes, casi ilegible.\n\n"RS: 50.000? DM: 30.000? LR: 50.000? Todos quieren algo. Todos presionan. Pero solo uno amenaza de verdad."\n\n—RS es Richard Stone —dijo María—. DM es David Morrison. LR es Laura Reed.\n\n—¿Y los números? ¿Cantidades?\n\n—No lo sé. ¿Deudas? ¿Sobornos?\n\nEn otro cajón, encontraron una carta. Era de Margaret Stone, la madre de Michael.\n\n"Señor Reed: Gracias por interesarse por la muerte de mi hijo. Adjunto los informes médicos. Alguien lo mató. Estoy segura. Por favor, investigue."\n\n—Aquí empezó todo —dijo Daniel.\n\nTambién encontraron un móvil antiguo. Al encenderlo, vieron mensajes cifrados.',
                options: [
                    { text: '🔙 Volver a la oficina', next: 2 }
                ],
                onEnter: () => { 
                    marcarLugar('pisoThomas'); 
                    addItem('mensajesCifrados');
                }
            },
            
            // CAPÍTULO 8 - INFORMES CON VICTOR
            8: {
                title: 'LOS INFORMES',
                text: 'Nueva York, 12 de marzo. 10:00 AM. Oficina de Detectives NYPD.\n\nVictor les mostró los informes oficiales. Daniel los examinó con atención.\n\nEl informe de Michael Stone: accidente de tráfico el 20 de noviembre en Brooklyn. El toxicólogo mencionaba "presencia de ketamina" en la sangre, pero lo atribuía a medicación que el arquitecto pudiera estar tomando.\n\nEl informe de Thomas Reed: homicidio el 3 de marzo en Queens. Las fotografías mostraban pequeñas marcas en el cuello. Como de agujas.\n\n—Lo inmovilizaron con ketamina y luego le inyectaron algo más —dijo Daniel.\n\n—¿El qué?\n\n—No lo sé. Pero la ketamina es la clave. Alguien la compró, la tuvo en su poder, la usó.\n\n—He investigado —dijo Victor—. La ketamina es de uso veterinario. Solo se vende con receta. Y hay un único distribuidor en Nueva York. Una farmacia veterinaria en Brooklyn.\n\n—¿Podemos conseguir los registros de venta?\n\n—Ya lo hice. Vendieron ketamina a varias clínicas y particulares. Pero hay una compra que me llamó la atención. El 15 de noviembre. Un particular. Pagó en efectivo. Dio un nombre falso.\n\n—¿Cómo lo sabe?\n\n—Porque el nombre que dio era "Michael Stone". Pero Michael Stone estaba vivo entonces... y no pudo comprarlo él mismo porque le tenían vigilado.',
                options: [
                    { text: '🚢 Ir a la farmacia (Brooklyn)', next: 9 },
                    { text: '🏨 Investigar el hotel (Manhattan)', next: 10 },
                    { text: '🔙 Volver a la oficina', next: 2 }
                ],
                onEnter: () => { 
                    addItem('transferencias');
                }
            },
            
            // CAPÍTULO 9 - FARMACIA
            9: {
                title: 'LA FARMACIA VETERINARIA',
                text: 'Brooklyn, 12 de marzo. 3:00 PM. Harbor Veterinary Pharmacy, Red Hook.\n\nEl dueño, un hombre mayor, les mostró las grabaciones.\n\n—Aquí está —dijo, señalando la pantalla—. La compra de ketamina del 15 de noviembre.\n\nDaniel y María vieron la imagen. Un hombre con gafas de sol y gorra entraba, pagaba en efectivo y salía rápidamente. Pero la calidad era mala. No se veía la cara.\n\n—¿Puede identificar quién es?\n\n—Con esto, no. Pero miren esto.\n\nEl hombre, al salir, sacó un ticket del bolsillo y lo tiró a la papelera de la calle. La cámara lo captó.\n\n—Ese ticket —dijo María—. Podría tener huellas.\n\nVictor llamó a la policía científica. Recogieron el ticket. Era de una gasolinera en Brooklyn. Fechado el 15 de noviembre. Y en el ticket, una matrícula.\n\n—La matrícula de Richard Stone —dijo Victor.\n\n—¿Richard? ¿Él compró la ketamina?\n\n—Parece que sí. O alguien que usa su coche.',
                options: [

        function loadChapter(step) {
            const chap = chapters[step];
            if (!chap) return;

            chapterDisplay.innerText = chap.title;
            novelText.innerText = chap.text;
            if (chap.onEnter) chap.onEnter();

            // Generar opciones dinámicamente
            let availableOptions = chap.options ? [...chap.options] : [];
            
            // Añadir opciones condicionales en el menú principal (capítulo 2)
            if (step === 2) {
                // Opción de descifrar mensajes (solo si tenemos mensajes cifrados y no descifrados)
                if (state.inventory.mensajesCifrados && !state.inventory.mensajesDescifrados) {
                    availableOptions.push({ text: '🔬 Descifrar mensajes del móvil', next: 15 });
                }
                
                // Opción de registro del piso de Laura (solo después de fotografía y archivos)
                if (state.pistas.fotografiaRevelada && state.pistas.lauraStone) {
                    availableOptions.push({ text: '🔍 Registrar piso de Laura Reed (con orden judicial)', next: 14 });
                }
                
                // Opción de declaraciones adicionales (siempre disponible, pero una sola vez)
                if (!state.lugaresVisitados.declaraciones) {
                    availableOptions.push({ text: '👥 Recoger declaraciones adicionales', next: 13 });
                }
            }

            optionsContainer.innerHTML = '';
            availableOptions.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.innerText = opt.text;
                btn.addEventListener('click', (e) => {
                    e.preventDefault();

                    // Si es una opción normal
                    const nextStep = opt.next !== undefined ? opt.next : step + 1;
                    state.step = nextStep;
                    
                    loadChapter(state.step);
                });
                optionsContainer.appendChild(btn);
            });

            inventoryPanel.classList.remove('visible');
        }

        function restartGame() {
            state = {
                step: 1,
                inventory: {
                    cartaMargaret: false,
                    informeToxico: false,
                    transferencias: false,
                    mensajesCifrados: false,
                    mensajesDescifrados: false,
                    ticketGasolinera: false,
                    facturaHotelRichard: false,
                    facturaHotelLaura: false,
                    diarioMichael: false,
                    reciboVeterinario: false,
                    fotografiaCena: false,
                    declaracionConserje: false,
                    cartaAnonima: false,
                    declaracionPatricia: false,
                    declaracionVecino: false,
                    declaracionHija: false
                },
                interrogatorios: {
                    richard: false,
                    david: false,
                    laura: false,
                    margaret: false
                },
                lugaresVisitados: {
                    pisoThomas: false,
                    farmacia: false,
                    hotel: false,
                    archivos: false,
                    declaraciones: false,
                    descifrar: false
                },
                pistas: {
                    fotografiaRevelada: false,
                    lauraStone: false,
                    ordenRegistro: false
                }
            };
            loadChapter(1);
        }

        restartBtn.addEventListener('click', restartGame);
        loadChapter(1);
    })();
