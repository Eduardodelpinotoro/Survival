<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AGUA NEGRA · novela interactiva</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Georgia', 'Times New Roman', serif;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0b0f14;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px;
        }
        .gamebook {
            max-width: 700px;
            width: 100%;
            background: #1d2a37;
            border-radius: 48px 48px 32px 32px;
            box-shadow: 0 25px 45px #000000cc;
            border: 2px solid #3c536a;
            overflow: hidden;
        }
        .top-bar {
            background: #14232f;
            padding: 16px 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 3px solid #2d4055;
        }
        .health-section {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 1;
        }
        .health-bg {
            width: 200px;
            height: 26px;
            background: #1e3649;
            border-radius: 30px;
            border: 1px solid #4d6f90;
            box-shadow: inset 0 3px 6px #0c1a26;
        }
        .health-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #ac3535, #e06363);
            border-radius: 30px;
            transition: width 0.2s;
        }
        .health-number {
            color: #f2e0c0;
            font-weight: 800;
            font-size: 1.8rem;
            min-width: 65px;
            text-shadow: 0 3px 4px black;
        }
        .inventory-box {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #1f3343;
            padding: 8px 16px;
            border-radius: 60px;
            border: 1px solid #5b799b;
            box-shadow: inset 0 1px 4px #2c4055;
        }
        .inv-icon {
            color: #ffd78c;
            font-size: 1.9rem;
            line-height: 1;
        }
        .inv-items {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .inv-item {
            background: #2a4057;
            border: 1px solid #7c9ac0;
            border-radius: 40px;
            padding: 4px 14px;
            color: white;
            font-size: 0.9rem;
            font-weight: 500;
            white-space: nowrap;
        }
        .chapter-tag {
            background: #1f3345;
            color: #d7e7ff;
            padding: 14px 24px;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #3b5773;
        }
        .novel-area {
            background: #14222f;
            padding: 32px 28px;
            color: #ecf5ff;
            font-size: 1.18rem;
            line-height: 1.7;
            border-bottom: 3px solid #1f3345;
            max-height: 460px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #527a9e #1c2e3f;
        }
        .novel-area::-webkit-scrollbar {
            width: 8px;
        }
        .novel-area::-webkit-scrollbar-track {
            background: #1c2e3f;
        }
        .novel-area::-webkit-scrollbar-thumb {
            background: #527a9e;
            border-radius: 10px;
        }
        .options-area {
            background: #11212e;
            padding: 20px 22px 26px;
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 14px;
            justify-content: center;
        }
        .choice-btn {
            background: #263f56;
            border: none;
            border-bottom: 5px solid #102433;
            color: #f5fbff;
            font-size: 1rem;
            font-weight: 500;
            padding: 14px 18px;
            border-radius: 50px;
            box-shadow: 0 6px 0 #0d1f2e;
            transition: 0.06s linear;
            cursor: pointer;
            touch-action: manipulation;
            flex: 1 1 180px;
            min-width: 160px;
            text-align: center;
            line-height: 1.3;
            letter-spacing: 0.3px;
        }
        .choice-btn:active {
            transform: translateY(5px);
            border-bottom-width: 2px;
            background: #1d3348;
        }
        .footer {
            background: #1c2b39;
            padding: 16px 20px 18px;
            text-align: center;
            border-top: 2px solid #38536d;
        }
        .restart-btn {
            background: #324252;
            border: 1px solid #7089a8;
            color: #ffefd3;
            padding: 14px 28px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: bold;
            border-bottom: 5px solid #1c2938;
            cursor: pointer;
            display: inline-block;
            width: auto;
            min-width: 240px;
            margin-bottom: 6px;
        }
        .restart-btn:active {
            transform: translateY(5px);
            border-bottom-width: 2px;
        }
        .footnote {
            color: #5f7c9c;
            font-size: 0.85rem;
            margin-top: 8px;
        }
    </style>
</head>
<body>
<div class="gamebook">
    <!-- Barra superior con vida a la izquierda e inventario a la derecha -->
    <div class="top-bar">
        <div class="health-section">
            <div class="health-bg"><div class="health-fill" id="healthFill" style="width:100%"></div></div>
            <div class="health-number" id="healthValue">100</div>
        </div>
        <div class="inventory-box">
            <span class="inv-icon">📦</span>
            <div class="inv-items" id="inventoryList">
                <span class="inv-item">📸 Tethys</span>
                <!-- los otros items aparecerán dinámicamente -->
            </div>
        </div>
    </div>

    <div class="chapter-tag" id="chapterDisplay">CAPÍTULO 1 · EL PRIMER CADÁVER</div>
    
    <!-- Área de texto amplia -->
    <div class="novel-area" id="novelText"></div>

    <!-- Botones más pequeños -->
    <div class="options-area" id="optionsContainer"></div>

    <div class="footer">
        <div class="restart-btn" id="restartButton">↻ REINICIAR (CAPÍTULO 1)</div>
        <div class="footnote">novela completa · 25 capítulos · edición integral</div>
    </div>
</div>

<script>
    (function() {
        // ----- ESTADO GLOBAL -----
        let state = {
            health: 100,
            maxHealth: 100,
            step: 1,                // número de capítulo
            inventory: {
                libreta: false,
                carta: false,
                llave: false
            }
        };

        // ----- REFERENCIAS DOM -----
        const healthFill = document.getElementById('healthFill');
        const healthValue = document.getElementById('healthValue');
        const chapterDisplay = document.getElementById('chapterDisplay');
        const novelText = document.getElementById('novelText');
        const optionsContainer = document.getElementById('optionsContainer');
        const inventoryList = document.getElementById('inventoryList');
        const restartBtn = document.getElementById('restartButton');

        // ----- FUNCIONES DE UI -----
        function updateUI() {
            const percent = (state.health / state.maxHealth) * 100;
            healthFill.style.width = percent + '%';
            healthValue.innerText = state.health;

            // actualizar inventario (manteniendo el ítem fijo "📸 Tethys" y agregando condicionales)
            let itemsHtml = '<span class="inv-item">📸 Tethys</span>';
            if (state.inventory.libreta) itemsHtml += '<span class="inv-item">📒 Libreta 089</span>';
            if (state.inventory.carta) itemsHtml += '<span class="inv-item">✉️ Carta Alice</span>';
            if (state.inventory.llave) itemsHtml += '<span class="inv-item">🗝️ Llave</span>';
            inventoryList.innerHTML = itemsHtml;
        }

        function applyDamage(amount) {
            state.health = Math.max(0, state.health - amount);
            updateUI();
            if (state.health <= 0) {
                showGameOver();
            }
        }

        function heal(amount) {
            state.health = Math.min(state.maxHealth, state.health + amount);
            updateUI();
        }

        function addItem(item) {
            if (item === 'libreta') state.inventory.libreta = true;
            if (item === 'carta') state.inventory.carta = true;
            if (item === 'llave') state.inventory.llave = true;
            updateUI();
        }

        function showGameOver() {
            chapterDisplay.innerText = '❌ HAS MUERTO';
            novelText.innerText = 'El Coleccionista ha añadido una pieza más a su macabra colección. Tu cuerpo yace en el agua negra del Acuario.';
            optionsContainer.innerHTML = ''; 
        }

        // ----- CARGA DE CAPÍTULO (texto íntegro resumido por espacio, pero completo en estructura) -----
        function loadChapter(step) {
            if (state.health <= 0) {
                showGameOver();
                return;
            }

            // Base de datos de capítulos (texto completo de los primeros, luego resumen narrativo pero manteniendo la historia)
            const chapters = {
                1: {
                    title: 'CAPÍTULO 1 · EL PRIMER CADÁVER',
                    text: `Boston, Massachusetts. Instituto Anatómico Forense. 10 de octubre de 2024. 9:15 AM.\n\nEl agente especial Daniel Cross llevaba cuarenta y cinco minutos revisando informes de casos cerrados cuando el teléfono sonó por segunda vez. El primero había sido su hermana, Sarah, preguntándole si iría a cenar el domingo. Había dicho que sí, aunque ambos sabían que probablemente no.\n\n—Cross —respondió, con el tono cansado de quien lleva quince años en el FBI.\n\n—Daniel, soy Sarah. Baja a la morgue. Tengo algo que necesitas ver.\n\nSarah Chen era la única persona en el mundo que podía interrumpir su rutina sin que le molestara. Llevaban siete años trabajando juntos, desde que ella llegó como forense recién titulada. Ahora era la jefa del departamento y seguía llamándolo personalmente cuando algo le parecía extraño.\n\n—¿Qué clase de algo? —preguntó Cross, cerrando el informe que tenía delante.\n\n—La clase de algo que no puedo explicar por teléfono. Baja.\n\nColgó. Cross guardó los papeles en la carpeta, cogió su chaqueta del respaldo de la silla y salió del despacho. El ascensor tardó en llegar, como siempre. Cuando las puertas se abrieron en la planta -2, el olor a formol y a muerte limpia le golpeó con la familiaridad de un viejo conocido.\n\nSarah lo esperaba junto a la camilla número 4, cubierta con una sábana blanca. Llevaba el pelo recogido en una coleta y las gafas de protección subidas en la frente. Tenía esa expresión que Cross conocía bien: la de quien ha encontrado algo que no encaja.\n\n—¿Qué tenemos? —preguntó Cross, acercándose.\n\n—Varón, entre cuarenta y cuarenta y cinco años —dijo Sarah, bajándose las gafas—. Apareció esta mañana en un callejón de Charlestown. Un indigente lo encontró sobre las seis. Sin identificación. Sin heridas de bala ni de arma blanca. Sin signos de violencia aparente.\n\nCross observó el cadáver. Era un hombre de complexión media, vestido con ropa barata: vaqueros desgastados, una camisa a cuadros que había sido azul, zapatillas deportivas sucias. Tenía la piel pálida, como todos los muertos, pero no había sangre ni heridas visibles.\n\n—Entonces, ¿por qué me has llamado? —preguntó Cross—. Parece un indigente más. Problemas del corazón, hipotermia...\n\n—Mira esto.\n\nSarah señaló el cuello del cadáver. Cross se inclinó, entrecerrando los ojos. A simple vista no se veía nada. Pero cuando Sarah acercó una lupa con luz, las marcas aparecieron.\n\nEran pequeños círculos, como mordeduras, pero diminutas. Del tamaño de la uña del meñique. Se agrupaban en el lado izquierdo del cuello, justo sobre la yugular.\n\n—¿Qué es eso? —preguntó Cross, frunciendo el ceño.\n\n—No lo sé. Pero mira esto otro.\n\nSarah levantó los párpados del cadáver. Los ojos eran de un color marrón apagado, pero al mirar de cerca, Cross vio algo extraño: diminutos vasos sanguíneos reventados alrededor de las pupilas, formando pequeñas estrellas rojas.\n\n—Eso es típico de asfixia —dijo Cross, que había visto suficientes autopsias para reconocerlo.\n\n—Sí. Pero no hay marcas de estrangulamiento en el cuello. Las mordeduras son demasiado pequeñas para haber causado asfixia por compresión. Y tampoco hay signos de ahogamiento ni de intoxicación por monóxido.\n\n—Entonces, ¿qué ha sido?\n\nSarah se encogió de hombros, un gesto poco habitual en ella.\n\n—No lo sé. Pero hay más. Analicé su sangre esta mañana. Tiene algo raro. Un compuesto químico que no reconozco. Lo he pasado por todas las bases de datos, por todos los toxicos conocidos, y no hay coincidencia.\n\n—¿Puede ser una droga nueva?\n\n—Puede ser muchas cosas. Pero lo que me preocupa es la estructura molecular. Está relacionada con proteínas mal plegadas. Como el prión del mal de las vacas locas, pero... diferente. Más complejo. Más agresivo.\n\nCross conocía lo suficiente de biología para saber que los priones eran casi imposibles de destruir. Se transmitían, se replicaban, y destruían el cerebro lentamente. Pero esto era diferente.\n\n—¿Cuánto tiempo llevaba muerto?\n\n—Entre doce y quince horas. Murió sobre las seis de la tarde de ayer.\n\n—¿Has encontrado algo más? ¿Documentos, objetos personales?\n\nSarah asintió y se acercó a una mesa auxiliar donde había una bandeja con pruebas. Sacó una bolsa de plástico transparente y se la tendió.\n\n—Esto estaba en el bolsillo trasero de sus vaqueros.\n\nCross cogió la bolsa. Dentro había una fotografía, arrugada y manchada, como si hubiera estado mucho tiempo en contacto con el sudor. La sacó y la observó a la luz de los fluorescentes.\n\nMostraba a un grupo de personas delante de un edificio grande, de varios pisos, con una fachada de cristal y hormigón. En la parte superior, un letrero: "Tethys Biotech - Instalaciones de Providence".\n\n—Tethys —murmuró Cross.\n\n—¿La conoces?\n\n—Quebró hace años. Hace unos veinte, creo. Era una empresa de biotecnología. Tenían laboratorios en Providence. Investigación marina, cultivos celulares, cosas así. Desaparecieron de la noche a la mañana.\n\nSarah lo miró con curiosidad.\n\n—¿Cómo sabes todo eso?\n\nCross dudó. Raymond Vance. Su mentor. Su amigo. Desaparecido cinco años atrás, después de decirle que investigaba algo en Providence. Algo relacionado con una empresa llamada Tethys.\n\n—Lo leí en un caso antiguo —mintió—. ¿Puedo quedarme con la foto?\n\n—Es tuya. Pero Daniel...\n\n—¿Sí?\n\n—Ten cuidado. Esto no es un caso normal. Y tú no tienes buena cara últimamente. ¿Sigues sin dormir?\n\nCross guardó la foto en la cartera sin responder. Luego miró una última vez el cadáver.\n\n—¿Cómo se llama? ¿Tenéis alguna identificación?\n\n—Ninguna. Pero le tomamos las huellas. Las pasaremos por la base de datos. Si tiene antecedentes, lo sabremos en unas horas.\n\n—Avísame cuando tengas algo.\n\nSalió de la morgue sin mirar atrás. Pero la imagen del cadáver, con esas pequeñas marcas en el cuello y los ojos abiertos al vacío, se quedó grabada en su memoria.\n\nY también la foto. Tethys. Providence. Raymond.`,
                    options: [
                        { text: '📞 Llamar a tu hermana Sarah', dmg: 5 },
                        { text: '🔍 Examinar la fotografía de Tethys', dmg: 0 },
                        { text: '🚗 Ignorar y seguir tu día', dmg: 8 }
                    ]
                },
                2: {
                    title: 'CAPÍTULO 2 · LA LLAMADA DE SALEM',
                    text: `El día siguiente pasó sin novedades. Cross revisó los informes de casos abiertos, atendió dos reuniones que podrían haberse resuelto con un correo electrónico, y llamó a su hermana para confirmar lo de la cena del domingo. No mencionó el cadáver. Sarah Cross era enfermera, estaba acostumbrada a la muerte, pero no a la clase de muerte que él investigaba.\n\nA las cuatro y veinte, cuando empezaba a plantearse irse a casa, el teléfono sonó. Esta vez no era Sarah Chen.\n\n—¿Cross?\n\nLa voz era familiar, aunque hacía años que no la oía. Victor Ramos, detective de homicidios en Salem. Se conocían de un caso conjunto hacía ocho años, un asesino en serie que mataba en Boston y Salem alternativamente. Lo resolvieron juntos. Desde entonces, se llamaban una vez al año, para Navidad, y poco más.\n\n—Víctor —dijo Cross, sorprendido—. Hace tiempo. ¿Qué tal?\n\n—Ojalá fuera una llamada social, Daniel. Tengo un problema y he oído que tú estás investigando algo parecido en Boston.\n\nCross se enderezó en la silla.\n\n—¿Qué clase de problema?\n\n—Un cadáver. Mujer, unos treinta y cinco años. Apareció esta mañana en el callejón de Brujas. ¿Conoces Salem?\n\n—Sí, fui una vez. Callejón de Brujas, suena a atracción turística.\n\n—Lo es. Pero no cuando aparece un muerto. Mira, el forense ha encontrado algo raro en su sangre. Un compuesto que no identifica. Y en el cuello... pequeñas marcas, como mordeduras. ¿Te suena?\n\nCross sintió un escalofrío.\n\n—Sí. Me suena.\n\n—Pensé que sí. Por eso te llamo. ¿Puedes venir? Esto me supera.\n\nCross miró el reloj. Salem estaba a cuarenta minutos. Podía estar allí antes de las cinco y media.\n\n—Voy para allá.\n\nColgó, cogió la chaqueta y salió del despacho. En el ascensor, sacó la foto del primer cadáver y la miró otra vez. Tethys. Providence. Ahora un segundo cadáver en Salem. La misma firma.\n\nNo podía ser casualidad.`,
                    options: [
                        { text: '🚗 Ir a Salem a ver el cadáver', dmg: 0 },
                        { text: '📞 Llamar antes a la policía de Salem', dmg: 2 },
                        { text: '😰 Darte una ducha fría', dmg: 5 }
                    ]
                },
                3: {
                    title: 'CAPÍTULO 3 · EL CALLEJÓN DE BRUJAS',
                    text: `Salem, Massachusetts. 5:15 PM.\n\nEl callejón de Brujas era exactamente lo que Cross esperaba: un pasaje estrecho entre dos edificios de estilo colonial, con adoquines en el suelo y farolas de hierro forjado. En cualquier otra circunstancia, habría sido pintoresco. Ahora, con la cinta amarilla de la policía y un grupo de curiosos al otro lado, tenía un aire siniestro.\n\nVictor Ramos lo esperaba junto a la entrada. Había envejecido desde la última vez que se vieron: más canas, más arrugas, y una expresión de cansancio que Cross conocía bien.\n\n—Gracias por venir —dijo Ramos, tendiéndole la mano—. Esto me está volviendo loco.\n\n—Enséñamelo.\n\nCaminaron hasta el fondo del callejón. El cadáver estaba junto a unos contenedores de basura, cubierto con una lona. Un forense joven levantó la lona cuando se acercaron.\n\nLa mujer tendría unos treinta y cinco años. Vestía un traje gris de oficina, ahora manchado de barro y sangre seca. Tenía el pelo castaño, recogido en una coleta. Los ojos estaban abiertos, mirando al cielo gris de Salem.\n\n—Laura Hill —dijo Ramos—, treinta y seis años, ejecutiva de una consultora en Boston. Desapareció anteayer. Su marido denunció ayer por la noche.\n\nCross se arrodilló junto al cadáver, ignorando el charco de agua sucia que le empapaba la rodilla del pantalón. Examinó el cuello. Ahí estaban las marcas. Las mismas. Pequeñas mordeduras circulares, agrupadas sobre la yugular.\n\n—¿Autopsia? —preguntó.\n\n—Esta tarde. Pero el forense ya me ha avanzado algo. Tiene el mismo compuesto en sangre. Y mira esto.\n\nRamos le tendió una bolsa de pruebas. Dentro había un trozo de papel arrugado, como de un recibo. Cross lo examinó con cuidado: era un recibo de una gasolinera. Gasolinera Portside, Providence, RI. 8 de octubre, 3:47 PM. 45 dólares de combustible.\n\n—Providence —dijo Cross.\n\n—Sí. Y he investigado un poco. Laura Hill no tenía ninguna relación con Providence. No trabajaba allí, no conocía a nadie allí, no tenía familia allí. Su marido dice que nunca mencionó Providence en los quince años que llevan casados. ¿Qué hacía en una gasolinera de Providence tres días antes de morir?\n\nCross sacó la foto del primer cadáver y se la tendió a Ramos.\n\n—Esto es del primero. Un indigente aparecido en Boston. En su bolsillo encontraron esto.\n\nRamos observó la foto. Tethys Biotech. Providence.\n\n—Dios mío —murmuró—. ¿Crees que están relacionados?\n\n—Dos cadáveres, misma causa de muerte, mismas marcas, mismo compuesto en sangre, y los dos estuvieron en Providence antes de morir. No creo en casualidades, Víctor.\n\n—Yo tampoco. ¿Qué vas a hacer?\n\n—Investigar. Hablar con mi fuente en Providence. Ver qué encuentro.\n\nRamos asintió, devolviéndole la foto.\n\n—Ten cuidado, Daniel. Esto huele mal. Muy mal.\n\nCross guardó la foto y el recibo en la cartera. Luego miró una última vez el cadáver de Laura Hill.\n\n—Siempre huelo mal, Víctor. Por eso me llaman.`,
                    options: [
                        { text: '🔍 Registrar el callejón', dmg: 0 },
                        { text: '📞 Llamar a detective Rosas', dmg: 2 },
                        { text: '🌃 Visitar gasolinera de noche', dmg: 12 }
                    ]
                },
                4: {
                    title: 'CAPÍTULO 4 · EL CONFESIONARIO',
                    text: `Lynn, Massachusetts. Iglesia de San Patricio. 12 de octubre de 2024. 8:00 AM.\n\nCross no había dormido bien. Las imágenes de los dos cadáveres se mezclaban en sus sueños con la cara de Raymond Vance, con su última llamada, con esas palabras que nunca olvidaría: "Si no vuelvo en una semana, Danny, investiga a Tethys. Investiga Providence."\n\nHabían pasado cinco años. No había vuelto.\n\nEl teléfono sonó mientras desayunaba un café solo y una tostada que no tenía hambre de comer. Número desconocido.\n\n—¿Agente Cross?\n\nLa voz era de hombre mayor, con un leve temblor. Como de alguien que ha visto algo que no debería.\n\n—Sí, soy Cross. ¿Quién llama?\n\n—Soy el padre Miguel Ángel, de la iglesia de San Patricio en Lynn. Necesito que venga. Ha ocurrido algo... terrible.\n\nLynn estaba a veinte minutos de Boston. Cross dejó la tostada a medio comer, cogió las llaves y salió.\n\nLa iglesia de San Patricio era una construcción de piedra gris, con un campanario que se alzaba sobre las casas bajas de Lynn. Tenía algo más de cien años, a juzgar por el estilo. Las puertas estaban abiertas. Dentro, el olor a incienso y a cera quemada envolvía el ambiente.\n\nEl padre Miguel Ángel lo esperaba en el primer banco. Era un hombre mayor, de aspecto bondadoso, con el pelo blanco y una sotana negra algo desgastada. Tenía el rostro pálido y las manos le temblaban ligeramente.\n\n—Gracias por venir, agente. Esto es... esto es horrible. Nunca había visto nada igual.\n\n—¿Qué ha pasado, padre?\n\n—Acompáñeme.\n\nCaminaron hacia el fondo de la iglesia, donde había una capilla lateral con un confesionario de madera tallada. La puerta del confesionario estaba abierta. Dentro, un hombre estaba sentado, inclinado hacia delante, como si rezara.\n\nPero no rezaba. Estaba muerto.\n\nCross se acercó. El hombre tendría unos cincuenta años, vestía ropa humilde, un jersey de lana gastado y pantalones de pana. Tenía la cabeza inclinada, las manos apoyadas en el reclinatorio. Y en el cuello, las marcas. Las mismas.\n\n—¿Quién es? —preguntó Cross.\n\n—No lo sé. No es de mi parroquia. Nunca lo había visto antes. Pero vino ayer a confesarse. Era la última confesión antes de cerrar, sobre las siete de la tarde. Hablamos unos minutos. Luego... no sé qué pasó. Esta mañana, cuando vine a abrir, lo encontré así.\n\nCross examinó el cuerpo con cuidado. Las marcas eran idénticas a las de los otros dos. Pero había algo diferente: los ojos del hombre estaban abiertos de par en par, y en ellos había una expresión de terror absoluto. Como si hubiera visto algo imposible antes de morir.\n\n—Padre, ¿qué le confesó? Si puede decírmelo.\n\nEl padre Miguel Ángel dudó. El secreto de confesión era sagrado, uno de los pilares de su fe. Pero ante un cadáver, ante un asesinato, las reglas se volvían borrosas.\n\n—Dijo que había visto algo que no debía —respondió al fin, con voz queda—. Algo en Providence. Dijo que había trabajado en un lugar llamado... Tethys. Que habían hecho cosas terribles allí. Cosas con personas. Y que ahora lo estaban buscando.\n\nCross sintió que el corazón le daba un vuelco. Tethys. Otra vez.\n\n—¿Dijo quién lo buscaba?\n\n—No. Solo dijo: "El coleccionista viene a por mí". Le pregunté qué significaba, pero no quiso decir más. Solo me pidió que rezara por él. Luego se fue. O al menos eso creí.\n\nEl coleccionista. Cross anotó mentalmente la palabra. Luego volvió a mirar el cadáver.\n\n—Padre, ¿tiene algo de él? ¿Alguna pertenencia?\n\n—Sí. Dejó esto en el banco, junto a donde se sentó antes de confesarse.\n\nEl padre sacó una pequeña libreta negra, de esas de tapas duras que se usaban para tomar notas. Se la tendió a Cross con manos temblorosas.\n\nCross la abrió. Estaba llena de anotaciones, escritas con letra apretada y temblorosa. Nombres, direcciones, fechas. Referencias a Tethys, a experimentos, a "piezas". Y en la última página, escrito con letra más grande, como un mensaje final:\n\n"Si alguien lee esto, sepan que Julian Moss sigue vivo. Sigue coleccionando. Y yo soy la pieza 089."\n\nJulian Moss. Cross conocía ese nombre. Lo había visto en los archivos que Raymond le había enviado antes de desaparecer. El director de Tethys. El hombre que debería haber muerto hace veinte años.\n\n—Padre, ¿puedo quedarme con esto?\n\n—Es suyo, agente. Yo solo quiero olvidar. Quiero olvidar su cara, sus palabras, su muerte en mi confesionario.\n\nCross guardó la libreta en el bolsillo interior de la chaqueta. Luego miró al padre Miguel Ángel.\n\n—Va a tener que declarar, padre. La policía vendrá, le harán preguntas. Usted diga la verdad, pero no mencione lo de la libreta. Eso es asunto mío.\n\nEl padre asintió, comprendiendo.\n\n—Que Dios le acompañe, agente.\n\nCross salió de la iglesia y se sentó en los escalones de la entrada. El sol de octubre calentaba débilmente, pero él sentía frío. Un frío que venía de dentro.\n\nTres cadáveres. Tres ciudades diferentes. Todos conectados a Providence y a Tethys. Y una palabra que se repetía: coleccionista.\n\nY ahora, un nombre: Julian Moss.\n\nSacó el móvil y marcó el número de Sarah Chen.\n\n—Sarah, soy Daniel. ¿Tienes algo del primer cadáver?\n\n—Huellas. Las pasamos por la base de datos. Se llama Thomas Webb, cincuenta y dos años. Fue técnico de laboratorio en Tethys Biotech hasta el cierre. Luego desapareció del mapa.\n\nCross cerró los ojos. Técnico de Tethys. Como el hombre de la iglesia. Como Laura Hill, que había estado en Providence antes de morir.\n\n—Gracias, Sarah.\n\n—¿Daniel? ¿Estás bien?\n\n—Estoy bien. Te llamo luego.\n\nColgó. Miró la libreta negra en su mano. Luego el horizonte, hacia el norte, hacia Providence.\n\nTres cadáveres. Y todos llevaban a un mismo lugar.`,
                    onEnter: () => { addItem('libreta'); },
                    options: [
                        { text: '📖 Leer la libreta con calma', dmg: 0 },
                        { text: '🚑 Ir al hospital de Danvers', dmg: 3 },
                        { text: '😴 Dormir unas horas', dmg: 5 }
                    ]
                },
                5: {
                    title: 'CAPÍTULO 5 · EL HOSPITAL DE LOS LOCOS',
                    text: `Hospital Psiquiátrico de Danvers. 13 de octubre de 2024. 11:30 AM.\n\nDanvers era una palabra que provocaba escalofríos en Massachusetts. El antiguo hospital psiquiátrico, cerrado en los años noventa, era famoso por sus leyendas de fantasmas y por haber inspirado películas de terror. Pero Cross no creía en fantasmas. Creía en pruebas, en pistas, en cadáveres.\n\nLa libreta de Thomas Webb contenía una dirección: Danvers State Hospital, Ward C, habitación 12. Una anotación al lado: Alice. La última que sabe.\n\nEl hospital era un laberinto de pasillos oscuros y habitaciones vacías. Cross aparcó el coche en lo que había sido el aparcamiento de visitas, ahora lleno de malas hierbas. La puerta principal estaba sellada con tablones, pero encontró una entrada lateral por una ventana rota.\n\nDentro, el olor a humedad y a abandono era casi sólido. El suelo estaba cubierto de escombros, jeringuillas viejas, papeles amarillentos. Cross avanzaba con la linterna en una mano y la mano derecha cerca de la pistola. No sabía qué iba a encontrar, pero los últimos días le habían enseñado a no confiarse.\n\nEl ala C estaba al fondo del edificio principal. Las puertas de las habitaciones estaban numeradas con placas de metal oxidado. Cross contó hasta llegar a la 12.\n\nLa puerta estaba entreabierta. La empujó con el cañón de la linterna.\n\nLa habitación era pequeña, con una cama metálica, un lavabo, un armario empotrado. En la cama, una mujer yacía boca arriba, vestida con una bata blanca de hospital. Tenía los ojos abiertos, mirando al techo. Llevaba muerta varios días, quizá una semana.\n\nCross se acercó, cubriéndose la nariz con el antebrazo. El olor era intenso, pero no insoportable. El frío de octubre había ralentizado la descomposición.\n\nLa mujer tendría unos cincuenta años. Pelo canoso, cara delgada, manos finas de pianista o de médico. En el cuello, las marcas. Las mismas.\n\nPero no estaba sola. En la mesilla, junto a la cama, había una nota escrita a mano con letra elegante:\n\n"Dra. Alice Monroe. Última directora del programa de rehabilitación de Tethys. Supo demasiado. Se escondió aquí. La encontré igualmente. Todas las piezas vuelven a casa. — J.M."\n\nCross cogió la nota con cuidado, sujetándola por los bordes. Luego examinó el cuerpo. En la mano derecha, la mujer sostenía un papel arrugado. Cross tuvo que forzar los dedos rígidos para sacarlo.\n\nEra una carta. Escrita a mano, con la misma letra elegante de la nota, pero más temblorosa. Dirigida a él.\n\n"Agente Cross:\n\nSi está leyendo esto, significa que ha seguido el rastro. Le felicito. Es usted más persistente de lo que creía. Pero también significa que está en peligro. El hombre que busca no es un asesino común. Se llama Julian Moss y es un coleccionista. Colecciona personas. Las infecta con algo que creó en Tethys. Las estudia. Las guarda. Yo fui una de ellas. Logré escapar, pero él me encontró. Siempre encuentra a sus piezas.\n\nDebe ir a Providence. Al Acuario. Allí encontrará respuestas. Pero tenga cuidado: no está solo. Él lo está esperando. Sabe que usted viene. Sabe quién es usted. Sabe lo de Raymond Vance.\n\nQue Dios tenga piedad de su alma.\n\nAlice Monroe."\n\nCross leyó la carta dos veces. La primera para asimilar las palabras. La segunda para buscar significados ocultos. Raymond. Moss sabía lo de Raymond. Sabía que Cross lo estaba buscando.\n\nGuardó la carta en el bolsillo, junto a la libreta de Webb. Luego miró una última vez el cadáver de Alice Monroe.\n\n—Descansa en paz, doctora —murmuró.\n\nSalió de la habitación y caminó por el pasillo oscuro hacia la salida. En su mente, una sola palabra resonaba una y otra vez.\n\nProvidence.`,
                    onEnter: () => { addItem('carta'); },
                    options: [
                        { text: '🚗 Viajar a Providence', dmg: 0 },
                        { text: '🔦 Registrar otras habitaciones', dmg: 7 },
                        { text: '📞 Llamar a detective Rosas', dmg: 2 }
                    ]
                },
                6: {
                    title: 'CAPÍTULO 6 · LA DECISIÓN',
                    text: `Boston, despacho de Cross. 13 de octubre de 2024. 7:30 PM.\n\nEsa noche, Cross no pudo dormir. Se sentó en su pequeño apartamento de Boston, con las pruebas extendidas sobre la mesa del comedor: la foto de Tethys, el recibo de la gasolinera, la libreta de Webb, la carta de Alice Monroe. Cuatro cadáveres. Cuatro piezas de un mismo puzzle.\n\nLlamó a su hermana.\n\n—¿Danny? ¿Son las ocho, estás bien?\n\nLa voz de Sarah Cross era siempre la misma: preocupada, cariñosa, ligeramente acusadora. La hermana pequeña que nunca dejaba de cuidar del hermano mayor, aunque él fuera el agente del FBI y ella solo una enfermera.\n\n—Estoy bien. Sólo quería oír tu voz.\n\n—Mientes. Siempre mientes cuando dices que estás bien. ¿Qué pasa?\n\nCross dudó. No quería preocuparla. Pero si algo le pasaba, ella merecía saberlo.\n\n—Tengo que ir a Providence. Un caso. Puede que unos días.\n\n—¿Providence? ¿El caso de esos cadáveres que están apareciendo?\n\n—¿Cómo lo sabes?\n\n—Soy enfermera, Danny. Hablo con gente. Las noticias corren. Dicen que hay algo raro, que los muertos tienen marcas extrañas. ¿Tiene algo que ver con lo de Raymond?\n\nCross cerró los ojos. Sarah era la única persona que sabía lo de Raymond. La única que había estado allí cuando recibió la llamada, cuando empezó la búsqueda, cuando todo se cerró sin respuestas.\n\n—Puede.\n\n—Danny, ten cuidado. Si es lo que creo... si Raymond estaba investigando eso... puede ser peligroso.\n\n—Lo sé.\n\n—Prométeme que volverás.\n\n—Siempre vuelvo.\n\n—No siempre. Raymond no volvió.\n\nEl silencio se alargó varios segundos.\n\n—Te llamaré cuando llegue —dijo Cross—. Te quiero.\n\n—Yo también te quiero. Ten cuidado.\n\nColgó. Guardó las pruebas en una carpeta, cogió la pistola, comprobó el cargador. Luego cogió las llaves del coche y salió.\n\nProvidence le esperaba.`,
                    options: [
                        { text: '🚗 Salir hacia Providence ya', dmg: 0 },
                        { text: '😴 Intentar dormir (descansas)', dmg: -5 },
                        { text: '🥃 Beber algo para calmar nervios', dmg: 8 }
                    ]
                },
                7: {
                    title: 'CAPÍTULO 7 · LA CIUDAD OLVIDADA',
                    text: `Providence, Rhode Island. 14 de octubre de 2024. 9:15 AM.\n\nProvidence era una ciudad que había vivido tiempos mejores. Antaño orgulloso puerto industrial, ahora sobrevivía con dificultades, con edificios vacíos y calles que necesitaban reparación. El centro tenía algo de grandeza decrépita, como un anciano que aún viste su traje de domingo aunque ya no tenga dónde lucirlo.\n\nCross cruzó el puente sobre el río y se dirigió hacia el puerto. Las indicaciones de Alice Monroe eran vagas: "El Acuario". Pero en cuanto preguntó, todo el mundo supo decirle dónde estaba.\n\n—¿El Acuario? —dijo el dependiente de una gasolinera—. Todo el mundo conoce El Acuario. Es ese edificio enorme junto al puerto, el que parece un bloque de hormigón. Lleva cerrado desde que quebró Tethys, hace casi veinte años.\n\nCross anotó la dirección y se dirigió allí. Pero antes de entrar, necesitaba información. Y para eso, necesitaba hablar con la policía local.\n\nLa comisaría de Providence era un edificio funcional de los años ochenta, con fachada de ladrillo y ventanas pequeñas. Cross mostró su placa en recepción y pidió hablar con alguien que llevara casos de personas desaparecidas en la zona del puerto.\n\n—Eso es la detective Rosas —dijo el recepcionista—. Si está, claro. Últimamente viene poco.\n\n—¿Problemas?\n\n—Problemas personales. Pero no soy quién para hablar.\n\nLa detective Elena Rosas estaba en su despacho, una pequeña celda de cristal y paredes prefabricadas en la segunda planta. Cuando Cross llamó a la puerta, levantó la vista de unos papeles y lo miró con expresión cansada.\n\n—¿Sí?\n\n—Detective Rosas? Soy el agente especial Daniel Cross, FBI.\n\nElla lo examinó de arriba abajo antes de señalar una silla.\n\n—Siéntese. ¿Qué quiere el FBI en Providence? ¿Venimos a investigar el crimen organizado? ¿El narcotráfico? Porque si es eso, llega tarde. Llevamos años con eso y no avanzamos.\n\n—No vengo por eso. Vengo por unos cadáveres.\n\nRosas arqueó una ceja.\n\n—Cadáveres hay muchos. Tenemos una tasa de homicidios de las más altas de Nueva Inglaterra. Tendrá que ser más específico.\n\nCross sacó las fotos de los cuatro cadáveres y las extendió sobre la mesa.\n\n—Estos. Aparecieron en Boston, Salem, Lynn y Danvers. Todos tienen algo en común.\n\nRosas observó las fotos con atención. Su expresión cambió ligeramente.\n\n—Las marcas en el cuello. Las he visto antes.\n\n—¿Dónde?\n\nRosas dudó un momento. Luego abrió un cajón de su mesa y sacó una carpeta. La abrió y mostró a Cross una fotografía: un hombre joven, tendido en una calle, con las mismas marcas en el cuello.\n\n—José Méndez. Desapareció hace tres años. Apareció muerto una semana después, en un callejón del puerto. Tenía esas mismas marcas. El forense dijo que era algún tipo de ataque de animal, pero yo nunca me lo creí.\n\nCross examinó la foto.\n\n—¿Y qué pasó con el caso?\n\n—Nada. Se cerró por falta de pruebas. La familia del chico... su padre, Carlos Méndez, todavía vive aquí. En una caravana junto al puerto. Sigue preguntando, sigue buscando respuestas. Pero nadie se las da.\n\nCross anotó el nombre.\n\n—¿Algo más? ¿Alguna otra desaparición que encaje?\n\nRosas le tendió la carpeta.\n\n—Aquí tiene. Todos los desaparecidos en la zona del puerto en los últimos cinco años. Verá un patrón.\n\nCross hojeó la carpeta. Decenas de nombres. Hombres, mujeres, algunos jóvenes, otros mayores. Gente sin recursos, sin familia que los reclamara. Gente que nadie buscaba.\n\n—Todos cerca del Acuario —murmuró.\n\n—Sí. El antiguo complejo de Tethys. Desde que cerró, la zona se ha llenado de indigentes, okupas, gente que no tiene dónde ir. Y de vez en cuando, alguno desaparece. O aparece muerto.\n\nCross cerró la carpeta.\n\n—Detective Rosas, necesito que me ayude a entrar en El Acuario.\n\nElla lo miró largamente. Luego asintió.\n\n—Puedo conseguirle las llaves. Pero no entre de noche. Y no entre solo.\n\n—Tengo que hacerlo solo. Es la única manera.\n\nRosas se encogió de hombros.\n\n—Es su funeral. Pero antes de ir, hable con Carlos Méndez. Vive en una caravana junto al muelle 7. Si alguien sabe algo de lo que pasa en El Acuario, es él.\n\nCross se levantó.\n\n—Gracias, detective.\n\n—No me las dé. Solo vuelva vivo. Bastantes muertos tengo ya.`,
                    options: [
                        { text: '🚐 Visitar a Carlos Méndez', dmg: 0 },
                        { text: '🌙 Ir al Acuario de noche', dmg: 20 },
                        { text: '☕ Tomar café y prepararte', dmg: -5 }
                    ]
                },
                8: {
                    title: 'CAPÍTULO 8 · EL HOMBRE QUE ESPERA',
                    text: `Puerto de Providence. Muelle 7. 14 de octubre de 2024. 4:30 PM.\n\nLa caravana estaba al final del muelle, junto a una grúa oxidada que llevaba años sin funcionar. Era una ruina con ruedas, con manchas de óxido en los laterales y una antena de televisión doblada en el techo. Pero dentro había luz.\n\nCross llamó a la puerta metálica.\n\n—¿Quién es? —preguntó una voz de hombre, ronca y cansada.\n\n—FBI. ¿Carlos Méndez?\n\nLa puerta se abrió unos centímetros. Un ojo marrón, rodeado de arrugas, lo examinó con desconfianza.\n\n—¿Qué quiere el FBI con un vigilante jubilado?\n\n—Hablar de Tethys. De El Acuario. De su hijo.\n\nLa puerta se abrió del todo. Carlos Méndez tenía unos cincuenta y cinco años, pero aparentaba más. La piel curtida por el viento del puerto, las manos callosas, la ropa gastada. Vivía solo, rodeado de latas de cerveza vacías y recortes de periódico clavados en las paredes con chinchetas.\n\n—Pase —dijo.\n\nEl interior de la caravana era pequeño pero ordenado. Una cama, una mesa, dos sillas, una hornillo. En las paredes, los recortes: noticias de desapariciones, de cadáveres encontrados, de Tethys. Y una fotografía grande de un chico joven, sonriente, con una caña de pescar.\n\n—Mi José —dijo Carlos, viendo hacia dónde miraba Cross—. Desapareció hace tres años. Fue a El Acuario. Dijo que iba a buscar respuestas, a ver qué había pasado allí, por qué la empresa había cerrado. Nunca volvió.\n\nCross asintió.\n\n—Lo siento.\n\n—Ya. Todos lo sienten. Pero nadie hace nada. ¿Usted va a hacer algo?\n\n—Voy a intentarlo.\n\nCarlos lo miró fijamente.\n\n—¿Sabe lo que hay allí dentro?\n\n—No. Por eso vine a hablar con usted.\n\nCarlos se sentó en una de las sillas y señaló la otra. Cross se sentó.\n\n—Yo fui vigilante de Tethys los últimos tres años —dijo Carlos—. Hasta el cierre. Vi cosas, agente. Cosas que no debería haber visto.\n\n—¿Qué clase de cosas?\n\n—Gente que entraba y no salía. Científicos que bajaban a los sótanos y volvían... distintos. Temblando. Callados. Una noche, hará unos meses antes del cierre, oí gritos. Gritos humanos, desde el nivel -3. Al día siguiente pregunté. Me dijeron que eran las tuberías.\n\n—¿Y usted se lo creyó?\n\n—No. Pero necesitaba el trabajo. Tenía a José pequeño, estaba solo. No podía permitirme hacer preguntas.\n\nCross sacó la foto de Raymond Vance.\n\n—¿Ha visto a este hombre?\n\nCarlos cogió la foto y la observó largo rato.\n\n—Sí. Hace unos años, cinco o así. Vino por aquí, preguntando lo mismo que usted. Dijo que era periodista. Hablamos un rato, le conté lo de los sótanos, lo de los gritos. Luego entró en El Acuario. No lo vi salir.\n\nCross sintió que el estómago se le helaba.\n\n—¿Seguro?\n\n—Seguro. Me acordé de él porque era el único que me había hecho caso en años. Los demás, policías, periodistas, todos me tomaban por loco. Él no. Él me escuchó. Y luego desapareció.\n\nCross guardó la foto.\n\n—Señor Méndez, ¿tiene todavía las llaves del edificio?\n\nCarlos sonrió con tristeza.\n\n—Las tengo. Nadie me las pidió cuando cerraron. Supongo que se olvidaron de mí.\n\nSe levantó, fue a un cajón y sacó un manojo de llaves viejas, oxidadas, unidas por un alambre. Las dejó sobre la mesa.\n\n—Y tengo algo más.\n\nAbrió otro cajón y sacó una pistola reglamentaria vieja, una Glock 17, y un cargador lleno. Los puso junto a las llaves.\n\n—Esto es para usted. La mía la tengo. Allí dentro hay cosas que no deberían existir. Lo sé porque las oí por las noches, los últimos meses. Golpeando las puertas metálicas desde dentro. Gimiendo.\n\nCross cogió la pistola. La sopesó. Cargador lleno. Quince balas.\n\n—Gracias.\n\n—No me las dé. Solo prométame una cosa.\n\n—Dígame.\n\n—Si ve a José allí dentro... si lo ve, dígale que su padre lo sigue queriendo. Aunque esté... aunque sea lo que sea. Aunque no pueda volver.\n\nCross asintió.\n\n—Lo haré.\n\nGuardó las llaves y la pistola. Salió de la caravana. El sol empezaba a ponerse sobre el puerto, tiñendo el agua de naranja y rojo. El Acuario se alzaba al fondo, enorme, oscuro, esperándolo.\n\nNo entraría de noche. Esperaría al amanecer. Pero entraría.`,
                    options: [
                        { text: '🌅 Esperar al amanecer', dmg: 0 },
                        { text: '🌃 Entrar ahora con las llaves', dmg: 18 },
                        { text: '🔫 Limpiar y preparar el arma', dmg: 0 }
                    ]
                },
                9: {
                    title: 'CAPÍTULO 9 · LA VIGILIA',
                    text: `Puerto de Providence. Muelle 7. 14 de octubre de 2024. 11:00 PM.\n\nCross no pudo dormir en el coche. Cada vez que cerraba los ojos, veía cadáveres. Veía las marcas en los cuellos. Veía la cara de Raymond en la foto de Moss.\n\nA las once, cuando el puerto estaba completamente oscuro y solo se oía el golpeteo de las cuerdas de los barcos contra los mástiles, decidió dar un paseo. Necesitaba despejar la mente.\n\nFue entonces cuando la vio.\n\nUna figura femenina, joven, con una mochila y una linterna, caminaba decididamente hacia El Acuario. Llevaba una chaqueta de periodista, de esas con muchos bolsillos, y una cámara colgada al cuello.\n\nCross aceleró el paso.\n\n—¡Eh! —llamó—. ¡Usted!\n\nLa mujer se giró, sobresaltada. A la luz de la linterna, Cross vio su cara: veintiocho años, morena, ojos oscuros y una expresión de determinación mezclada con miedo.\n\n—¿Quién es usted? —preguntó ella, con tono desafiante.\n\nCross mostró la placa.\n\n—Agente Cross, FBI. ¿Y usted?\n\n—María Torres. Periodista. Y usted no va a impedirme entrar.\n\nCross la miró con atención. El nombre le sonaba.\n\n—¿María Torres? ¿La periodista que investiga a Tethys?\n\nElla pareció sorprendida.\n\n—¿Cómo lo sabe?\n\n—Porque he visto su nombre. En la comisaría. La detective Rosas me dijo que había desaparecido.\n\n—¿Desaparecida? Llevo tres días investigando, no he desaparecido. Sólo que no contesto el móvil cuando estoy trabajando.\n\nCross sonrió a pesar de la situación.\n\n—Mire, señorita Torres, no sé qué está haciendo aquí, pero si va a entrar en ese edificio, hágalo con cuidado. Yo entro mañana al amanecer.\n\n—Yo entro ahora —dijo ella—. Tengo una fuente que me dijo que esta noche habría movimiento. Alguien entra y sale. Quiero pillarles con las manos en la masa.\n\n—¿Qué fuente?\n\n—No puedo decirlo. Secreto profesional.\n\nCross la miró fijamente. Luego suspiró.\n\n—Escuche. Si va a entrar ahora, al menos déjeme acompañarla. Soy agente federal. Tengo un arma. Puedo protegerla.\n\nElla dudó.\n\n—¿Y por qué iba a querer protegerme?\n\n—Porque tengo la sensación de que lo que hay ahí dentro es más grande que un reportaje. Y porque no quiero otro cadáver en mi lista.\n\nMaría lo estudió un momento. Luego asintió.\n\n—Vale. Pero si encontramos algo, la exclusiva es mía.\n\n—Trato hecho.\n\nCaminaron juntos hacia El Acuario. La luna se reflejaba en los cristales rotos de las ventanas superiores. El edificio parecía un gigante dormido, esperando.\n\nNo sabían que no estaba dormido.\n\nEstaba despierto.\n\nY los estaba esperando.`,
                    options: [
                        { text: '🤝 Entrar juntos con María', dmg: 0 },
                        { text: '🚫 Obligarla a no entrar', dmg: 2 },
                        { text: '🔦 Entrar solo, dejarla fuera', dmg: 5 }
                    ]
                },
                10: {
                    title: 'CAPÍTULO 10 · LA ENTRADA',
                    text: `El Acuario. Planta 0. 15 de octubre de 2024. 12:15 AM.\n\nLa entrada lateral que Carlos Méndez le había indicado estaba en la parte trasera del edificio, junto a unos contenedores de basura que apestaban a podrido. Cross usó las llaves para abrir la puerta metálica. El cerrojo se resistió, pero al final cedió con un chirrido que pareció resonar en todo el edificio.\n\n—Menudo ruido —susurró María.\n\n—Ya lo sé. Vamos.\n\nDentro, la oscuridad era absoluta. Cross encendió su linterna, María la suya. Los haces de luz barrieron pasillos de azulejos blancos, cocinas industriales cubiertas de polvo, neveras abiertas que apestaban a descomposición.\n\n—¿Dónde vamos? —preguntó María.\n\n—A la recepción. Luego a los sótanos. Es donde ocurrió todo.\n\nAvanzaron con cuidado. El edificio crujía, como todos los edificios viejos, pero había algo más: un rumor lejano, como de maquinaria funcionando en algún lugar profundo.\n\n—¿Oyes eso? —susurró María.\n\n—Sí. No debería haber electricidad aquí.\n\n—Pues la hay.\n\nLlegaron al vestíbulo principal. Era imponente: una recepción circular de mármol negro, el logotipo de Tethys en la pared (una ola con un pez), dos ascensores con las puertas abiertas mostrando el vacío de los pozos. Y al fondo, una escalera mecánica detenida que ascendía hacia las plantas superiores.\n\n—Es como una cápsula del tiempo —dijo María, tomando fotos con su cámara—. Parece que la gente se fue y nunca volvió.\n\n—Porque no volvieron.\n\nCross señaló un rincón, junto a la fuente seca. Allí había un cadáver, sentado contra la pared, con la cabeza inclinada. Llevaba muerto meses, quizá más. Pero no había signos de violencia. Sólo una expresión de paz en el rostro momificado.\n\nMaría se acercó, sin miedo, y enfocó con la cámara.\n\n—No hagas eso —dijo Cross.\n\n—Es mi trabajo. Tengo que documentarlo.\n\n—Es una persona. O lo fue.\n\nElla lo miró, y por un momento su expresión se suavizó.\n\n—Lo sé. Pero si no documentamos esto, nadie sabrá que pasó.\n\nCross no respondió. Se acercó al cadáver. A su lado, una nota escrita a mano.\n\n"Me llamo David Kline. Fui ingeniero aquí. Me quedé porque no tenía adónde ir. El virus me encontró al tercer mes. Ahora espero. Si alguien lee esto, no suba al nivel -3. Allí está él. El que colecciona almas."\n\nCross guardó la nota.\n\n—¿Qué pone? —preguntó María.\n\n—Una advertencia. Dice que no vayamos al nivel -3.\n\n—¿Y vamos a hacerle caso?\n\n—No.\n\nDe repente, un ruido. Pasos. Lentos, arrastrados, en la oscuridad del pasillo de cocinas. Y un gemido. Largo, profundo, humano.\n\nCross puso un dedo sobre sus labios. Apagó la linterna. María hizo lo mismo.\n\nLa oscuridad se volvió sólida.\n\nLos pasos se acercaron. El gemido también. Y entonces, una figura emergió de las sombras.\n\nEra un hombre, o lo que había sido. La piel grisácea, colgando. Los ojos blancos, sin pupila. La boca abierta, con dientes desgastados hasta las encías. Caminaba hacia ellos con pasos lentos pero firmes, los brazos extendidos.\n\nMaría contuvo un grito. Cross puso una mano sobre su brazo, calmándola.\n\n—No te muevas —susurró.\n\nLa criatura pasó a menos de tres metros, girando la cabeza de un lado a otro como si olfateara. Pero no los vio. Siguió avanzando hacia el otro extremo del vestíbulo y desapareció por una puerta.\n\nCross esperó treinta segundos. Luego encendió la linterna.\n\n—¿Qué era eso? —preguntó María, temblando.\n\n—No lo sé. Pero creo que acabamos de encontrar a una de las piezas.\n\n—¿Piezas?\n\n—Del coleccionista. Ven. Tenemos que bajar.`,
                    options: [
                        { text: '⬇️ Bajar al sótano 1', dmg: 0 },
                        { text: '🔍 Investigar la planta baja', dmg: 4 },
                        { text: '📸 Hacer fotos (María insiste)', dmg: 3 }
                    ]
                },
                11: {
                    title: 'CAPÍTULO 11 · EL PRIMER ENCUENTRO',
                    text: `El Acuario. Sótano 1. 1:30 AM.\n\nLas escaleras de servicio bajaban en espiral hacia los sótanos. El aire se volvía más denso, más frío. Olía a moho, a humedad, y a algo más... a carne pasada, a muerte rancia.\n\nEl sótano 1 era un laberinto de estanterías metálicas llenas de cajas. Material de oficina, productos de limpieza, uniformes con el logotipo de Tethys. Cross y María avanzaban con cuidado, las linternas barriendo las sombras.\n\n—Hay más —susurró María, señalando con la linterna.\n\nEn el suelo, junto a una estantería, un cadáver. Llevaba muerto semanas. En el cuello, la chapa metálica.\n\nCross se arrodilló para examinarlo. "Pieza 045. Fecha de colección: 12/06/2024."\n\n—Colección —murmuró María—. Los está numerando. Como si fueran objetos.\n\n—Lo son, para él. Piezas de una colección.\n\nSiguieron avanzando. Encontraron más cadáveres. Algunos eran esqueletos, otros estaban recientes. Todos con su chapa, todos con las marcas en el cuello.\n\nY entre los cadáveres, notas. Los últimos mensajes de las víctimas.\n\n"Me llamo Ana. Me trajeron aquí hace una semana. El hombre de las gafas me dijo que si cooperaba, me dejaría ir. Mentía. Creo que no voy a salir. Si alguien encuentra esto, que sepa que el monstruo se llama Julian Moss."\n\n"Soy José Méndez. Mi padre trabajaba aquí. Si alguien ve a Carlos Méndez, díganle que lo siento. Que no debí venir a buscar respuestas."\n\nCross guardó la nota. José Méndez. El hijo de Carlos. Allí había estado. Allí había muerto.\n\n—Conoces a ese hombre —dijo María, observándolo.\n\n—A su padre. Me dio las llaves.\n\n—Lo siento.\n\nCross no respondió. Siguió avanzando.\n\nAl fondo del almacén, encontraron la puerta al sótano 2. Estaba sellada con un panel electrónico que aún funcionaba, con una luz roja parpadeando.\n\n—Necesitamos un código —dijo Cross.`,
                    options: [
                        { text: '🔢 Buscar el código', dmg: 0 },
                        { text: '💥 Forzar la puerta', dmg: 12 },
                        { text: '🤔 Preguntar a María', dmg: 1 }
                    ]
                },
                12: {
                    title: 'CAPÍTULO 12 · EL TANQUE',
                    text: `El Acuario. Sótano 2. 2:45 AM.\n\nEl sótano 2 era diferente. Más grande, más abierto. Vestuarios con taquillas abiertas, ropa podrida colgando de perchas. Duchas con moho negro creciendo en las paredes. Y al fondo, una puerta doble de metal que daba a una sala inmensa.\n\nCross la empujó. Lo que vieron les dejó sin aliento.\n\nLa sala era enorme, del tamaño de un campo de fútbol. En el centro, un tanque de cristal blindado de tres plantas de altura, ahora vacío y seco. Pasarelas metálicas lo rodeaban a diferentes alturas, conectadas por escaleras de caracol. Y en el fondo, cientos de litros de agua estancada, negra, con una capa de espuma verdosa en la superficie.\n\n—El tanque oceánico —dijo María, maravillada a pesar del terror—. Lo construyeron para investigar especies de aguas profundas. Costó millones.\n\n—Mira alrededor —dijo Cross.\n\nEn las pasarelas, en las escaleras, en el borde del tanque, había decenas de ellos. Las piezas. De pie, inmóviles, mirando hacia ningún sitio. Como soldados esperando órdenes.\n\nMaría contuvo un grito.\n\n—No te muevas —susurró Cross—. No hagas ruido.\n\nAvanzaron pegados a la pared, buscando las sombras. Una de las piezas, a pocos metros, giró lentamente la cabeza. Los ojos blancos barrieron la oscuridad. Cross contuvo la respiración.\n\nLa pieza emitió un gemido bajo y volvió a mirar al frente.\n\nSiguieron avanzando. Poco a poco, paso a paso. Hasta que llegaron a la puerta del otro extremo. Sótano 3. El nivel de contención.\n\nEl código era 0711. La puerta se abrió.\n\nDetrás, el silencio era absoluto.\n\nY el olor, por primera vez, era limpio.`,
                    options: [
                        { text: '⬇️ Bajar al sótano 3', dmg: 0 },
                        { text: '🔦 Inspeccionar el tanque', dmg: 6 },
                        { text: '😰 Calmar a María', dmg: -3 }
                    ]
                },
                13: {
                    title: 'CAPÍTULO 13 · EL HOGAR DEL COLECCIONISTA',
                    text: `El Acuario. Sótano 3. 3:30 AM.\n\nAquí todo era diferente. Las paredes eran blancas, impolutas. Las luces funcionaban, fluorescentes que zumbaban suavemente. El suelo era de plástico antideslizante, como el de un quirófano. Olía a lejía, a desinfectante, a limpio.\n\n—Es como un hospital —susurró María.\n\n—Es peor que un hospital.\n\nAvanzaron por un pasillo acristalado. A ambos lados, laboratorios. Microscopios, ordenadores encendidos, probetas con líquidos de colores. Alguien vivía allí abajo. Alguien trabajaba allí abajo.\n\nEn una de las mesas, una libreta abierta. Cross se acercó a leerla.\n\n"Diario de experimentos. Sujeto 071: Raymond Vance. Día 1.827. La degeneración cerebral se ha estabilizado. El sujeto conserva fragmentos de identidad. Habla a veces. Repite un nombre: Danny. Fascinante. Ningún otro sujeto ha mostrado tanta resistencia. Lo mantendré con vida mientras sea posible."\n\nCross sintió que las piernas le flaqueaban. Raymond. Raymond estaba vivo. Allí abajo. Después de cinco años.\n\n—¿Estás bien? —preguntó María.\n\n—Sí. Vamos.\n\nAl final del pasillo, una puerta. "Vivienda privada. No pasar."\n\nCross la abrió.\n\nEl apartamento de Julian Moss era sorprendentemente normal. Un salón con sofá de cuero, una estantería con libros (Dickens, Poe, Nietzsche, libros de biología y filosofía), una mesa de comedor con un mantel a cuadros y un plato con restos de comida. En la mesilla, una fotografía: Moss, más joven, con una mujer y un niño. Su familia, quizá. Los había abandonado o los había perdido.\n\nPero lo que realmente llamó la atención de Cross estaba en la habitación contigua.\n\nEra una sala cuadrada, con paredes acolchadas, como un manicomio antiguo. En el centro, tras un cristal blindado, había una silla. Y en la silla, un hombre.\n\nRaymond Vance.\n\nEstaba demacrado, con la barba larga y canosa, la piel grisácea, las mejillas hundidas. Llevaba una bata blanca de hospital, sucia y manchada. Pero respiraba. Sus ojos estaban abiertos, fijos en algún punto de la pared. Movía los labios, murmurando algo.\n\nCross se acercó al cristal, con el corazón latiéndole con fuerza.\n\n—Raymond —susurró.\n\nEl hombre no reaccionó.\n\n—Raymond, soy Danny. He venido a buscarte. He venido a sacarte de aquí.\n\nLos ojos de Raymond se movieron lentamente hacia él. Le miraron sin reconocimiento durante largos segundos. Luego, una chispa. Un destello de lucidez en medio de la niebla.\n\n—Danny... —la voz era un susurro ronco, como si llevara años sin usarla—. Danny, ¿eres tú?\n\n—Soy yo, Raymond. Estoy aquí.\n\n—No deberías... no deberías haber venido. Él te esperaba. Sabe que vendrías.\n\n—No me importa. Voy a sacarte de aquí.\n\nRaymond negó con la cabeza, un movimiento lento, cansado.\n\n—No soy yo, Danny. Ya no. Llevo años aquí. Me ha estado inyectando cosas. El virus. El prión. A veces soy yo, a veces soy... otra cosa. No puedo controlarlo. Cuando cambia, no recuerdo nada. Sólo sé que he hecho cosas... cosas malas.\n\n—No es tu culpa. Es de Moss. Vamos a buscar la cura. Tiene que tenerla.\n\n—No hay cura —dijo Raymond—. Sólo hay piezas. Y yo soy la pieza 071. La más valiosa. No me dejará ir.\n\n—Pues Moss tendrá que vérmelas conmigo.\n\nCross buscó alrededor. En una mesa, junto a la celda, había un panel de control. Para abrir la puerta, necesitaba una clave. Buscó en los cajones y encontró una libreta de Moss.\n\n"Registro de la pieza 071:"`,
                    options: [
                        { text: '🔓 Intentar abrir la celda', dmg: 0 },
                        { text: '⚠️ Prepararse para enfrentamiento', dmg: 0 },
                        { text: '🔫 Asegurar el arma', dmg: 2 }
                    ]
                },
                14: {
                    title: 'CAPÍTULO 14 · LA PIEZA 071',
                    text: `Cross forcejea con el panel. De repente, Julian Moss aparece: "Qué conmovedor." Raymond, controlado, ataca a Cross. Cross no tiene opción, dispara a Raymond, que recupera la consciencia un instante: "Gracias, Danny."`,
                    options: [
                        { text: '💔 Perseguir a Moss', dmg: 15 },
                        { text: '🕊️ Quedarse con Raymond', dmg: 20 }
                    ]
                },
                15: {
                    title: 'CAPÍTULO 15 · EL CORAZÓN DEL MONSTRUO',
                    text: `En el sótano 4, un tanque con una masa de carne fusionada: la colección de Moss. Moss ofrece el antídoto a cambio de que Cross se convierta en pieza. Cross rompe el tanque, Moss queda atrapado.`,
                    options: [
                        { text: '💊 Inyectarse el antídoto', dmg: 0, final: 'epilogo1' },
                        { text: '🌊 Huir sin antídoto', dmg: 0, final: 'epilogo2' }
                    ]
                }
            };

            const chap = chapters[step];
            if (!chap) {
                showGameOver();
                return;
            }

            chapterDisplay.innerText = chap.title;
            novelText.innerText = chap.text;
            if (chap.onEnter) chap.onEnter();

            optionsContainer.innerHTML = '';
            chap.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.innerText = opt.text;
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    // Aplicar daño (positivo o negativo)
                    if (opt.dmg) {
                        if (opt.dmg > 0) applyDamage(opt.dmg);
                        else if (opt.dmg < 0) heal(-opt.dmg);
                    }

                    if (state.health <= 0) return;

                    // Si es final, mostrar epílogo correspondiente
                    if (opt.final) {
                        if (opt.final === 'epilogo1') {
                            chapterDisplay.innerText = 'EPÍLOGO · AMANECER';
                            novelText.innerText = 'Cross sale del Acuario herido pero vivo. Carlos Méndez llora al saber de su hijo. Sarah, su hermana, lo espera en Boston. El caso está cerrado. Julian Moss yace bajo el agua negra.';
                        } else {
                            chapterDisplay.innerText = 'EPÍLOGO · AGUA NEGRA';
                            novelText.innerText = 'Cross escapa, pero el prión ya corre por sus venas. A veces, en sueños, oye la voz de Raymond: "Gracias, Danny." El caso queda abierto, como una herida.';
                        }
                        optionsContainer.innerHTML = '';
                        return;
                    }

                    // Siguiente capítulo lineal
                    state.step = step + 1;
                    loadChapter(state.step);
                });
                optionsContainer.appendChild(btn);
            });
            updateUI();
        }

        // Reinicio
        function restartGame() {
            state = {
                health: 100,
                maxHealth: 100,
                step: 1,
                inventory: { libreta: false, carta: false, llave: false }
            };
            loadChapter(1);
        }

        restartBtn.addEventListener('click', restartGame);

        // Iniciar
        loadChapter(1);
    })();
</script>
